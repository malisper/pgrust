[build]
# Share dependency artifacts across local worktrees by default.
target-dir = "/tmp/pgrust-target"
rustc-wrapper = "scripts/rustc_sccache_wrapper.sh"

[unstable]
codegen-backend = true

[profile.dev]
# Cranelift miscompiles generated catalog bootstrap rows on aarch64 macOS
# (normal debug bins corrupt Vec<PgOperatorRow> metadata during startup).
# Keep dev builds on LLVM until that backend bug is isolated upstream.
codegen-backend = "llvm"

[profile.test]
# :HACK: rustc_codegen_cranelift still aborts this workspace's database
# tests on aarch64 macOS; keep tests on LLVM while dev builds use Cranelift.
codegen-backend = "llvm"

[target.aarch64-apple-darwin]
# rust-lld can emit malformed release Mach-O binaries for pgrust_server on
# aarch64 macOS; dyld aborts before main while loading rebase opcodes.
linker = "cc"

[target.x86_64-apple-darwin]
linker = "cc"
