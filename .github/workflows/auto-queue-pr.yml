name: auto-queue-pr

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - perf-optimization

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-queue-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    name: enable-auto-merge
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.base.ref == 'perf-optimization' }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for the PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          output="$(gh pr merge "$PR_URL" --auto --match-head-commit "$HEAD_SHA" 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "$output"
            exit 0
          fi

          echo "$output"

          if printf '%s' "$output" | grep -q "Resource not accessible by personal access token (enablePullRequestAutoMerge)"; then
            echo "Auto-merge could not be enabled with this workflow token; leaving the PR unchanged."
            exit 0
          fi

          if printf '%s' "$output" | grep -q "is already queued to merge"; then
            echo "PR is already queued to merge."
            exit 0
          fi

          exit "$status"
