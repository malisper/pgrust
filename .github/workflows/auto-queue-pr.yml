name: auto-queue-pr

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - perf-optimization

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-queue-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    name: enable-auto-merge
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.base.ref == 'perf-optimization' }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for the PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh pr merge "$PR_URL" --auto --merge --match-head-commit "$HEAD_SHA"
