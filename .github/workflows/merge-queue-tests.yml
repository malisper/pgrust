name: merge-queue-tests

on:
  pull_request:
    branches:
      - perf-optimization
  merge_group:
    branches:
      - perf-optimization
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_TEST_OPT_LEVEL: "3"
  RUST_BACKTRACE: "1"

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect code changes
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.event.merge_group.base_sha || github.event.pull_request.base.sha || '' }}
          ref: ${{ github.event.merge_group.head_sha || github.event.pull_request.head.sha || github.ref }}
          filters: |
            code:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - '.config/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'build.rs'

  cargo-fmt-check:
    name: cargo-fmt-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  cargo-test-run:
    name: cargo-test-run
    needs:
      - changes
    if: ${{ github.event_name != 'pull_request' && needs.changes.outputs.code == 'true' }}
    runs-on:
      group: large-runners-like-32x-paid
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run cargo tests
        run: |
          cargo nextest run \
            --locked \
            --lib \
            --profile ci \
            --config-file .config/nextest.toml

      - name: Upload JUnit timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: target/nextest/ci/junit.xml
          if-no-files-found: error
          retention-days: 14

  cargo-test:
    name: cargo-test
    runs-on: ubuntu-latest
    needs:
      - changes
      - cargo-fmt-check
      - cargo-test-run
    if: always()
    steps:
      - name: Pass quickly on pull requests
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "PR-time cargo-test is intentionally a no-op."

      - name: Pass quickly on docs-only merges
        if: ${{ github.event_name != 'pull_request' && needs.changes.outputs.code != 'true' }}
        run: |
          echo "No code changes detected; skipping test aggregation."

      - name: Checkout
        if: ${{ github.event_name != 'pull_request' && needs.changes.outputs.code == 'true' }}
        uses: actions/checkout@v4

      - name: Download JUnit timing reports
        if: ${{ github.event_name != 'pull_request' && needs.changes.outputs.code == 'true' }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: junit-report
          merge-multiple: false

      - name: Summarize test timings
        if: ${{ github.event_name != 'pull_request' && needs.changes.outputs.code == 'true' }}
        run: |
          python3 scripts/github/render_nextest_timings.py artifacts/*/*.xml >>"$GITHUB_STEP_SUMMARY"

      - name: Fail if any required job failed
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          EVENT_NAME: ${{ github.event_name }}
          CODE_CHANGED: ${{ needs.changes.outputs.code }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          event_name = os.environ["EVENT_NAME"]
          code_changed = os.environ["CODE_CHANGED"] == "true"

          # On pull_request, cargo-test-run is intentionally skipped.
          # On docs-only merges, both test jobs are intentionally skipped.
          # In either case, "skipped" is an expected result, not a failure.
          allowed_skipped = set()
          if event_name == "pull_request":
              allowed_skipped.add("cargo-test-run")
          if not code_changed:
              allowed_skipped.add("cargo-test-run")

          failed = {}
          for job_name, info in needs.items():
              result = info["result"]
              if result == "success":
                  continue
              if result == "skipped" and job_name in allowed_skipped:
                  continue
              failed[job_name] = result
          if failed:
              print("The test workflow did not succeed:", file=sys.stderr)
              for job_name, result in failed.items():
                  print(f"  {job_name}: {result}", file=sys.stderr)
              sys.exit(1)
          PY
