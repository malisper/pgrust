name: merge-queue-tests

on:
  pull_request:
    branches:
      - perf-optimization
  merge_group:
    branches:
      - perf-optimization
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_TEST_OPT_LEVEL: "3"
  RUST_BACKTRACE: "1"

jobs:
  cargo-test-run:
    name: cargo-test-run
    if: ${{ github.event_name != 'pull_request' }}
    runs-on:
      labels: 32x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run cargo tests
        run: |
          cargo nextest run \
            --locked \
            --lib \
            --profile ci \
            --config-file .config/nextest.toml

      - name: Upload JUnit timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: target/nextest/ci/junit.xml
          if-no-files-found: error
          retention-days: 14

  cargo-test:
    name: cargo-test
    runs-on: ubuntu-latest
    needs:
      - cargo-test-run
    if: always()
    steps:
      - name: Pass quickly on pull requests
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "PR-time cargo-test is intentionally a no-op."

      - name: Checkout
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/checkout@v4

      - name: Download JUnit timing reports
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: junit-report
          merge-multiple: false

      - name: Summarize test timings
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          python3 scripts/github/render_nextest_timings.py artifacts/*/*.xml >>"$GITHUB_STEP_SUMMARY"

      - name: Fail if test run failed
        if: ${{ github.event_name != 'pull_request' }}
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              job_name: info["result"]
              for job_name, info in needs.items()
              if info["result"] != "success"
          }
          if failed:
              print("The test workflow did not succeed:", file=sys.stderr)
              for job_name, result in failed.items():
                  print(f"  {job_name}: {result}", file=sys.stderr)
              sys.exit(1)
          PY
