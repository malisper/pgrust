name: regression-tests

# Twice-daily scheduled run of the full PostgreSQL regression suite against
# pgrust_server. Results (summary + per-test output + diffs) are pushed to the
# `regression-history` orphan branch and a summary is posted to Slack.
#
# Cron times are UTC. Times will drift by 1 hour around DST transitions; bump
# the cron then if Pacific-local delivery time matters.
on:
  schedule:
    - cron: '30 19 * * *'   # ~12:30 PDT start
    - cron: '45 2 * * *'    # ~7:45pm PDT start
  workflow_dispatch:
    inputs:
      command_timeout:
        description: 'Shard command watchdog, e.g. 75m for normal runs or 2m for abort-path smoke tests'
        required: false
        default: '75m'
      jobs:
        description: 'Number of isolated concurrent regression workers per shard'
        required: false
        default: '4'
      shard_deadline_secs:
        description: 'Seconds before each shard stops scheduling new tests and writes a partial summary'
        required: false
        default: '3000'

permissions:
  contents: write   # required to push to the regression-history branch

concurrency:
  group: regression-tests
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  REGRESS_COMMAND_TIMEOUT: ${{ inputs.command_timeout || '75m' }}
  REGRESS_JOBS: ${{ inputs.jobs || '4' }}
  REGRESS_SHARD_TOTAL: "4"
  REGRESS_SHARD_DEADLINE_SECS: ${{ inputs.shard_deadline_secs || '3000' }}
  REGRESS_FILE_TIMEOUT: "300"
  PGRUST_STATEMENT_TIMEOUT: "15"
  CARGO_TARGET_DIR: ${{ github.workspace }}/pgrust/target
  # Pin to the latest stable PG18 release tag. Do not track master/PG19 here:
  # fixtures (.sql/.out files) define the compatibility target.
  POSTGRES_REF: REL_18_3

jobs:
  build:
    name: build regression binary
    runs-on: 32x
    timeout-minutes: 45
    steps:
      - name: Checkout pgrust
        uses: actions/checkout@v4
        with:
          path: pgrust

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pgrust

      - name: Build pgrust_server (release)
        working-directory: pgrust
        run: cargo build --release --locked --bin pgrust_server

      - name: Upload pgrust_server
        uses: actions/upload-artifact@v4
        with:
          name: pgrust-server-release
          path: pgrust/target/release/pgrust_server
          if-no-files-found: error
          retention-days: 7

  regression-shard:
    name: regression shard ${{ matrix.shard }}
    needs: build
    runs-on: 32x
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      REGRESS_RESULTS_DIR: ${{ github.workspace }}/regress-results
      REGRESS_ARTIFACT_DIR: ${{ github.workspace }}/regress-artifact
    steps:
      - name: Checkout pgrust
        uses: actions/checkout@v4
        with:
          path: pgrust

      - name: Checkout postgres source
        uses: actions/checkout@v4
        with:
          repository: postgres/postgres
          ref: ${{ env.POSTGRES_REF }}
          path: postgres

      - name: Download pgrust_server
        uses: actions/download-artifact@v4
        with:
          name: pgrust-server-release
          path: pgrust/target/release

      - name: Prepare pgrust_server
        run: chmod +x pgrust/target/release/pgrust_server

      - name: Install postgresql-client-18
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18 lsof

      - name: Run regression shard
        id: regress
        continue-on-error: true
        working-directory: pgrust
        env:
          PGRUST_REGRESS_USER: postgres
        run: |
          status=0

          finalize_regression_step() {
            local final_status="$1"

            mkdir -p "$REGRESS_RESULTS_DIR"
            printf '%s\n' "$final_status" > "$REGRESS_RESULTS_DIR/exit_code.txt"
            if [[ ! -f "$REGRESS_RESULTS_DIR/summary.json" ]]; then
              cat > "$REGRESS_RESULTS_DIR/summary.json" <<EOF
          {
            "status": "aborted",
            "shard": {
              "index": ${{ matrix.shard }},
              "total": $REGRESS_SHARD_TOTAL
            },
            "tests": {
              "planned": 0,
              "total": 0,
              "passed": 0,
              "failed": 0,
              "errored": 0,
              "timed_out": 0,
              "pass_rate_pct": 0
            },
            "queries": {
              "total": 0,
              "matched": 0,
              "mismatched": 0,
              "match_rate_pct": 0
            }
          }
          EOF
            fi
            echo "exit_code=$final_status" >> "$GITHUB_OUTPUT"
            if [[ -f "$REGRESS_RESULTS_DIR/summary.json" ]]; then
              echo "## Regression shard summary" >> "$GITHUB_STEP_SUMMARY"
              echo '```json' >> "$GITHUB_STEP_SUMMARY"
              cat "$REGRESS_RESULTS_DIR/summary.json" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          trap 'status=143; finalize_regression_step "$status"; exit 0' TERM
          trap 'status=130; finalize_regression_step "$status"; exit 0' INT

          mkdir -p "$REGRESS_RESULTS_DIR"
          timeout --foreground --signal=TERM --kill-after=30s "$REGRESS_COMMAND_TIMEOUT" \
            scripts/run_regression.sh \
            --skip-build \
            --timeout "$REGRESS_FILE_TIMEOUT" \
            --jobs "$REGRESS_JOBS" \
            --results-dir "$REGRESS_RESULTS_DIR" \
            --shard-index "${{ matrix.shard }}" \
            --shard-total "$REGRESS_SHARD_TOTAL" \
            --deadline-secs "$REGRESS_SHARD_DEADLINE_SECS" || status=$?
          trap - TERM INT
          finalize_regression_step "$status"
          exit 0

      - name: Prepare compact shard artifacts
        if: always() && !cancelled()
        run: |
          set -euo pipefail
          rm -rf "$REGRESS_ARTIFACT_DIR"
          mkdir -p "$REGRESS_ARTIFACT_DIR"

          for file in summary.json summary.md exit_code.txt; do
            if [[ -f "$REGRESS_RESULTS_DIR/$file" ]]; then
              cp "$REGRESS_RESULTS_DIR/$file" "$REGRESS_ARTIFACT_DIR/$file"
            fi
          done

          for dir in output diff status fixtures; do
            if [[ -d "$REGRESS_RESULTS_DIR/$dir" ]]; then
              mkdir -p "$REGRESS_ARTIFACT_DIR/$dir"
              cp -R "$REGRESS_RESULTS_DIR/$dir/." "$REGRESS_ARTIFACT_DIR/$dir/"
            fi
          done

          {
            echo "Compact regression shard artifact bundle."
            echo "Shard: ${{ matrix.shard }}/$REGRESS_SHARD_TOTAL"
            echo "Source results dir: $REGRESS_RESULTS_DIR"
            echo "Included: summary.json, summary.md, exit_code.txt, output/, diff/, status/, fixtures/"
            echo "Excluded: base/, workers/, and tablespaces/ database state"
            echo
            if [[ -d "$REGRESS_RESULTS_DIR" ]]; then
              du -sh "$REGRESS_RESULTS_DIR" || true
            else
              echo "Source results dir was missing."
            fi
            du -sh "$REGRESS_ARTIFACT_DIR" || true
          } > "$REGRESS_ARTIFACT_DIR/artifact_manifest.txt"

      - name: Upload regression shard artifacts
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: regression-shard-${{ matrix.shard }}
          path: ${{ env.REGRESS_ARTIFACT_DIR }}
          if-no-files-found: warn
          retention-days: 90

  aggregate:
    name: aggregate regression shards
    needs: regression-shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REGRESS_RESULTS_DIR: ${{ github.workspace }}/regress-results
      REGRESS_ARTIFACT_DIR: ${{ github.workspace }}/regress-artifact
    steps:
      - name: Checkout pgrust
        uses: actions/checkout@v4
        with:
          path: pgrust

      - name: Download shard artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: regression-shard-*
          path: shard-artifacts
          merge-multiple: false

      - name: Aggregate shard results
        working-directory: pgrust
        run: |
          set -euo pipefail
          scripts/github/aggregate_regression_shards.py \
            "$GITHUB_WORKSPACE/shard-artifacts" \
            "$REGRESS_RESULTS_DIR" \
            "$REGRESS_SHARD_TOTAL"
          echo "## Aggregated regression summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "$REGRESS_RESULTS_DIR/summary.json" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare aggregate artifact
        if: always() && !cancelled()
        run: |
          set -euo pipefail
          rm -rf "$REGRESS_ARTIFACT_DIR"
          mkdir -p "$REGRESS_ARTIFACT_DIR"
          cp -R "$REGRESS_RESULTS_DIR/." "$REGRESS_ARTIFACT_DIR/" 2>/dev/null || true

      - name: Upload aggregated regression artifacts
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: ${{ env.REGRESS_ARTIFACT_DIR }}
          if-no-files-found: warn
          retention-days: 90

      - name: Publish results to regression-history
        id: publish
        if: always() && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULTS_DIR: ${{ env.REGRESS_RESULTS_DIR }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_SHA: ${{ github.sha }}
          RUN_REF: ${{ github.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: pgrust
        run: scripts/github/publish_regression_history.sh

      - name: Notify Slack
        if: always() && !cancelled() && steps.publish.outputs.run_dir_name != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESULTS_DIR: ${{ env.REGRESS_RESULTS_DIR }}
          RUN_DIR_NAME: ${{ steps.publish.outputs.run_dir_name }}
          PREV_DIR_NAME: ${{ steps.publish.outputs.prev_dir_name }}
          PREV_TESTS_PASSED: ${{ steps.publish.outputs.prev_tests_passed }}
          PREV_QUERIES_MATCHED: ${{ steps.publish.outputs.prev_queries_matched }}
          RUN_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_FULL_NAME: ${{ github.repository }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          # Keep this aligned with the rerun policy in regression-tests-rerun.yml
          # (run_attempt < 2). Bump both together if the policy ever changes.
          MAX_ATTEMPTS: "2"
        working-directory: pgrust
        run: scripts/github/notify_slack_regression.sh

      - name: Mark workflow failed only when no aggregate exists
        if: always() && !cancelled()
        run: |
          if [[ ! -f "$REGRESS_RESULTS_DIR/summary.json" ]]; then
            echo "No aggregate summary was produced."
            exit 1
          fi
          if [[ "${{ steps.publish.outcome }}" != "success" ]]; then
            echo "Publish step outcome: ${{ steps.publish.outcome }}"
            exit 1
          fi
          if [[ -f "$REGRESS_RESULTS_DIR/exit_code.txt" ]]; then
            status="$(cat "$REGRESS_RESULTS_DIR/exit_code.txt")"
            echo "Aggregate exit code: $status"
            if [[ "$status" != "0" ]]; then
              exit "$status"
            fi
          fi
