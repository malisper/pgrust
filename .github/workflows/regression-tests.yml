name: regression-tests

# Twice-daily scheduled run of the full PostgreSQL regression suite against
# pgrust_server. Results (summary + per-test output + diffs) are pushed to the
# `regression-history` orphan branch and a summary is posted to Slack.
#
# Cron times are UTC. With a 30-minute build/test head start, results land
# around 1:00pm and 8:15pm Pacific (during PDT). Times will drift by 1 hour
# around DST transitions; bump the cron then.
on:
  schedule:
    - cron: '30 19 * * *'   # ~12:30 PDT start -> ~1:00pm PDT finish
    - cron: '45 2 * * *'    # ~7:45pm PDT start -> ~8:15pm PDT finish
  workflow_dispatch:
    inputs:
      command_timeout:
        description: 'Regression command timeout, e.g. 210m for normal runs or 2m for abort-path smoke tests'
        required: false
        default: '210m'
      jobs:
        description: 'Number of isolated concurrent regression test workers'
        required: false
        default: '4'

permissions:
  contents: write   # required to push to the regression-history branch

concurrency:
  group: regression-tests
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  REGRESS_RESULTS_DIR: ${{ github.workspace }}/regress-results
  REGRESS_ARTIFACT_DIR: ${{ github.workspace }}/regress-artifact
  REGRESS_COMMAND_TIMEOUT: ${{ inputs.command_timeout || '210m' }}
  REGRESS_JOBS: ${{ inputs.jobs || '4' }}
  # Pin to the PG18 SHA the project currently develops against. Bump when the
  # team decides to track a newer upstream — fixtures (.out files) are tied to
  # this revision.
  POSTGRES_REF: 4b2aa4b39cbac71d9795ff760af3991a681eae00

jobs:
  regression:
    name: regression
    # The full suite runs multiple isolated pgrust servers and copies staged
    # database clusters. Standard private-repo runners have been too small and
    # can lose contact with GitHub mid-run under this load.
    runs-on: 32x
    timeout-minutes: 240
    steps:
      - name: Checkout pgrust
        uses: actions/checkout@v4
        with:
          path: pgrust

      - name: Checkout postgres source
        uses: actions/checkout@v4
        with:
          repository: postgres/postgres
          ref: ${{ env.POSTGRES_REF }}
          path: postgres

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pgrust

      - name: Install postgresql-client-18
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18 lsof

      - name: Build pgrust_server (release)
        working-directory: pgrust
        run: cargo build --release --locked --bin pgrust_server

      - name: Run regression tests
        id: regress
        continue-on-error: true
        working-directory: pgrust
        env:
          PGRUST_REGRESS_USER: postgres
        run: |
          status=0

          finalize_regression_step() {
            local final_status="$1"

            mkdir -p "$REGRESS_RESULTS_DIR"
            printf '%s\n' "$final_status" > "$REGRESS_RESULTS_DIR/exit_code.txt"
            if [[ ! -f "$REGRESS_RESULTS_DIR/summary.json" ]]; then
              cat > "$REGRESS_RESULTS_DIR/summary.json" <<EOF
          {
            "status": "aborted",
            "tests": {
              "planned": 0,
              "total": 0,
              "passed": 0,
              "failed": 0,
              "errored": 0,
              "timed_out": 0,
              "pass_rate_pct": 0
            },
            "queries": {
              "total": 0,
              "matched": 0,
              "mismatched": 0,
              "match_rate_pct": 0
            }
          }
          EOF
            fi
            echo "exit_code=$final_status" >> "$GITHUB_OUTPUT"
            if [[ -f "$REGRESS_RESULTS_DIR/summary.json" ]]; then
              echo "## Regression summary" >> "$GITHUB_STEP_SUMMARY"
              echo '```json' >> "$GITHUB_STEP_SUMMARY"
              cat "$REGRESS_RESULTS_DIR/summary.json" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          trap 'status=143; finalize_regression_step "$status"; exit 0' TERM
          trap 'status=130; finalize_regression_step "$status"; exit 0' INT

          mkdir -p "$REGRESS_RESULTS_DIR"
          timeout --signal=TERM --kill-after=30s "$REGRESS_COMMAND_TIMEOUT" \
            scripts/run_regression.sh \
            --skip-build \
            --jobs "$REGRESS_JOBS" \
            --results-dir "$REGRESS_RESULTS_DIR" || status=$?
          trap - TERM INT
          finalize_regression_step "$status"
          exit 0

      - name: Prepare compact regression artifacts
        if: always()
        run: |
          set -euo pipefail
          rm -rf "$REGRESS_ARTIFACT_DIR"
          mkdir -p "$REGRESS_ARTIFACT_DIR"

          for file in summary.json summary.md exit_code.txt; do
            if [[ -f "$REGRESS_RESULTS_DIR/$file" ]]; then
              cp "$REGRESS_RESULTS_DIR/$file" "$REGRESS_ARTIFACT_DIR/$file"
            fi
          done

          for dir in output diff status fixtures; do
            if [[ -d "$REGRESS_RESULTS_DIR/$dir" ]]; then
              mkdir -p "$REGRESS_ARTIFACT_DIR/$dir"
              cp -R "$REGRESS_RESULTS_DIR/$dir/." "$REGRESS_ARTIFACT_DIR/$dir/"
            fi
          done

          {
            echo "Compact regression artifact bundle."
            echo "Source results dir: $REGRESS_RESULTS_DIR"
            echo "Included: summary.json, summary.md, exit_code.txt, output/, diff/, status/, fixtures/"
            echo "Excluded: base/, workers/, and tablespaces/ database state"
            echo
            if [[ -d "$REGRESS_RESULTS_DIR" ]]; then
              du -sh "$REGRESS_RESULTS_DIR" || true
            else
              echo "Source results dir was missing."
            fi
            du -sh "$REGRESS_ARTIFACT_DIR" || true
          } > "$REGRESS_ARTIFACT_DIR/artifact_manifest.txt"

      - name: Upload regression artifacts (workflow run)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: ${{ env.REGRESS_ARTIFACT_DIR }}
          if-no-files-found: warn
          retention-days: 90

      - name: Publish results to regression-history
        id: publish
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULTS_DIR: ${{ env.REGRESS_RESULTS_DIR }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_SHA: ${{ github.sha }}
          RUN_REF: ${{ github.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REGRESS_EXIT_CODE: ${{ steps.regress.outputs.exit_code }}
        working-directory: pgrust
        run: scripts/github/publish_regression_history.sh

      - name: Notify Slack
        if: always() && steps.publish.outputs.run_dir_name != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESULTS_DIR: ${{ env.REGRESS_RESULTS_DIR }}
          RUN_DIR_NAME: ${{ steps.publish.outputs.run_dir_name }}
          PREV_DIR_NAME: ${{ steps.publish.outputs.prev_dir_name }}
          PREV_TESTS_PASSED: ${{ steps.publish.outputs.prev_tests_passed }}
          PREV_QUERIES_MATCHED: ${{ steps.publish.outputs.prev_queries_matched }}
          RUN_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_FULL_NAME: ${{ github.repository }}
        working-directory: pgrust
        run: scripts/github/notify_slack_regression.sh

      - name: Mark workflow failed when regressions fail
        if: always()
        run: |
          status=0
          if [[ -f "$REGRESS_RESULTS_DIR/exit_code.txt" ]]; then
            status="$(cat "$REGRESS_RESULTS_DIR/exit_code.txt")"
          elif [[ "${{ steps.regress.outcome }}" != "success" ]]; then
            status=1
          fi
          echo "Regression exit code: $status"
          if [[ "$status" != "0" ]]; then
            exit "$status"
          fi
