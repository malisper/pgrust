title = "pgrust gitleaks config"

# Extend the default ruleset rather than replace it.
[extend]
useDefault = true

# PostHog project keys (prefix "phc_") are designed for client-side exposure —
# they're meant to be shipped in the browser bundle. Marking them as allowed
# so `gitleaks detect` reports clean.
[[allowlists]]
description = "PostHog public project keys — client-side by design"
regexes = ['''phc_[A-Za-z0-9]{40,}''']

[[allowlists]]
description = "PostgreSQL regression output labels named Key"
condition = "AND"
paths = ['''runs/.*''']
regexes = [
  '''^(tenk1|tenk1_1)\.(fivethous|thousand)$''',
  '''^minmaxtest_5\.f1$''',
  '''^mclparted_[12]\.a$''',
  '''^c12-06-geometry$''',
]

[[allowlists]]
description = "Non-secret isolated test target pool key in task notes"
condition = "AND"
paths = ['''^\.codex/task-notes/''']
regexes = ['''^c12-06-geometry$''']
