[package]
name = "pgrust"
version = "0.1.0"
edition = "2024"

[lib]
name = "pgrust"
path = "src/lib.rs"

[features]
default = []
deadlock_detection = ["parking_lot/deadlock_detection"]

[dependencies]
crc32c = "0.6.8"
itoa = "1"
libc = "0.2"
mimalloc = "0.1.48"
parking_lot = "0.12"
pest = "2.7"
pest_derive = "2.7"
rand = "0.8"
rustc-hash = "2.1.2"

[profile.release]
debug = true
