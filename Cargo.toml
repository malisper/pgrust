[package]
name = "pgrust"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-only"
description = "Multi-threaded PostgreSQL, rewritten from scratch in Rust."
repository = "https://github.com/malisper/pgrust"
readme = "README.md"
autobins = false

[workspace]
members = [
    ".",
    "crates/pgrust_catalog_data",
    "crates/pgrust_catalog_ids",
    "crates/pgrust_core",
    "crates/pgrust_nodes",
    "crates/pgrust_parser",
    "crates/pgrust_plpgsql_grammar",
    "crates/pgrust_sql_grammar",
]

[lib]
name = "pgrust"
path = "src/lib.rs"
crate-type = ["rlib"]

[features]
default = []
deadlock_detection = ["parking_lot/deadlock_detection"]
lz4 = ["dep:lz4_flex"]
tools = []

[[bin]]
name = "pgrust_server"
path = "src/bin/pgrust_server.rs"

[[bin]]
name = "array_subscript_bench"
path = "src/bin/array_subscript_bench.rs"
required-features = ["tools"]

[[bin]]
name = "bench_insert"
path = "src/bin/bench_insert.rs"
required-features = ["tools"]

[[bin]]
name = "btree_pk_build_profile"
path = "src/bin/btree_pk_build_profile.rs"
required-features = ["tools"]

[[bin]]
name = "bufmgr_e2e"
path = "src/bin/bufmgr_e2e.rs"
required-features = ["tools"]

[[bin]]
name = "comment_on_table_bench"
path = "src/bin/comment_on_table_bench.rs"
required-features = ["tools"]

[[bin]]
name = "catalog_ddl_profile"
path = "src/bin/catalog_ddl_profile.rs"
required-features = ["tools"]

[[bin]]
name = "deferred_parent_delete_bench"
path = "src/bin/deferred_parent_delete_bench.rs"
required-features = ["tools"]

[[bin]]
name = "full_scan_bench"
path = "src/bin/full_scan_bench.rs"
required-features = ["tools"]

[[bin]]
name = "gist_include_build_profile"
path = "src/bin/gist_include_build_profile.rs"
required-features = ["tools"]

[[bin]]
name = "heap_scan_demo"
path = "src/bin/heap_scan_demo.rs"
required-features = ["tools"]

[[bin]]
name = "inproc_query_bench"
path = "src/bin/inproc_query_bench.rs"
required-features = ["tools"]

[[bin]]
name = "load_test"
path = "src/bin/load_test.rs"
required-features = ["tools"]

[[bin]]
name = "mvcc_disk_demo"
path = "src/bin/mvcc_disk_demo.rs"
required-features = ["tools"]

[[bin]]
name = "numeric_query_bench"
path = "src/bin/numeric_query_bench.rs"
required-features = ["tools"]

[[bin]]
name = "pgbench_accounts_test_repro"
path = "src/bin/pgbench_accounts_test_repro.rs"
required-features = ["tools"]

[[bin]]
name = "pgbench_like"
path = "src/bin/pgbench_like.rs"
required-features = ["tools"]

[[bin]]
name = "query_exec_demo"
path = "src/bin/query_exec_demo.rs"
required-features = ["tools"]

[[bin]]
name = "query_loop_psql"
path = "src/bin/query_loop_psql.rs"
required-features = ["tools"]

[[bin]]
name = "query_loop_tcp"
path = "src/bin/query_loop_tcp.rs"
required-features = ["tools"]

[[bin]]
name = "query_repl"
path = "src/bin/query_repl.rs"
required-features = ["tools"]

[[bin]]
name = "query_sql_demo"
path = "src/bin/query_sql_demo.rs"
required-features = ["tools"]

[[bin]]
name = "regression_profile"
path = "src/bin/regression_profile.rs"
required-features = ["tools"]

[[bin]]
name = "smgr_demo"
path = "src/bin/smgr_demo.rs"
required-features = ["tools"]

[[bin]]
name = "smgr_inspect"
path = "src/bin/smgr_inspect.rs"
required-features = ["tools"]

[[bin]]
name = "triggers_regression_profile"
path = "src/bin/triggers_regression_profile.rs"
required-features = ["tools"]

[[bin]]
name = "tuple_disk_demo"
path = "src/bin/tuple_disk_demo.rs"
required-features = ["tools"]

[[bin]]
name = "wal_syscall_check"
path = "src/bin/wal_syscall_check.rs"
required-features = ["tools"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(fuzzing)"] }

[dependencies]
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["std"] }
chrono-tz = "0.10"
crc32fast = "1.4"
getrandom = { version = "0.2", features = ["js"] }
hmac = "0.12"
itoa = "1"
libc = "0.2"
num-bigint = "0.4.6"
num-integer = "0.1.46"
num-traits = "0.2.19"
parking_lot = "0.12"
pest = "2.7"
pbkdf2 = "0.12"
pgrust_catalog_data = { path = "crates/pgrust_catalog_data" }
pgrust_core = { path = "crates/pgrust_core" }
pgrust_nodes = { path = "crates/pgrust_nodes" }
pgrust_parser = { path = "crates/pgrust_parser" }
pgrust_plpgsql_grammar = { path = "crates/pgrust_plpgsql_grammar" }
rand = "0.8"
regex = "1"
rustc-hash = "2.1.2"
ryu = "1"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["arbitrary_precision"] }
sha2 = "0.10"
stacker = "0.1.23"
encoding_rs = "0.8"
md-5 = "0.10"
rust-stemmers = "1"
lz4_flex = { version = "0.11", optional = true }
quick-xml = "0.38"
unicode-normalization = "0.1.25"
unicode-general-category = "1.1.0"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
mimalloc = "0.1.48"

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1"
wasm-bindgen = "0.2"
web-time = "1"

[profile.dev]
debug = "line-tables-only"
split-debuginfo = "unpacked"

[profile.test]
opt-level = 0
split-debuginfo = "unpacked"

[profile.release]
debug = true
split-debuginfo = "unpacked"
