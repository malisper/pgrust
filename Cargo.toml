[package]
name = "pgrust"
version = "0.1.0"
edition = "2024"

[lib]
name = "pgrust"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[features]
default = []
deadlock_detection = ["parking_lot/deadlock_detection"]
[dependencies]
base64 = "0.22"
crc32c = "0.6.8"
crc32fast = "1.4"
getrandom = { version = "0.2", features = ["js"] }
itoa = "1"
libc = "0.2"
num-bigint = "0.4.6"
num-integer = "0.1.46"
num-traits = "0.2.19"
parking_lot = "0.12"
pest = "2.7"
pest_derive = "2.7"
rand = "0.8"
regex = "1"
rustc-hash = "2.1.2"
ryu = "1"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["arbitrary_precision"] }
sha2 = "0.10"
stacker = "0.1.23"
encoding_rs = "0.8"
md-5 = "0.10"
rust-stemmers = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
mimalloc = "0.1.48"

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1"
wasm-bindgen = "0.2"
web-time = "1"

[profile.release]
debug = true
