[package]
name = "pgrust"
version = "0.1.0"
edition = "2024"

[lib]
name = "pgrust"
path = "src/lib.rs"

[features]
default = []
deadlock_detection = ["parking_lot/deadlock_detection"]
[dependencies]
crc32c = "0.6.8"
itoa = "1"
libc = "0.2"
mimalloc = "0.1.48"
num-bigint = "0.4.6"
num-integer = "0.1.46"
num-traits = "0.2.19"
parking_lot = "0.12"
pest = "2.7"
pest_derive = "2.7"
rand = "0.8"
regex = "1"
rustc-hash = "2.1.2"
ryu = "1"
serde_json = { version = "1", features = ["arbitrary_precision"] }

[profile.release]
debug = true
