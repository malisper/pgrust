[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
edition = "2021"
publish = false

# Linking dominates build time on this kind of workspace; keep debuginfo light.
[profile.dev]
debug = "line-tables-only"
split-debuginfo = "unpacked"

[profile.dev.build-override]
debug = 0
codegen-units = 256

[profile.fast-check]
inherits = "dev"
debug = 0
split-debuginfo = "off"
incremental = false

[profile.release]
debug = 0
strip = "debuginfo"
lto = "thin"
codegen-units = 1
