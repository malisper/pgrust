[package]
name = "nodes"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "nodes"
path = "src/lib.rs"

[features]
# Node-opaque migration P3 pre-flip codegen (docs/proposals/node-opaque-migration.md
# §6.5 step 1). When enabled, compiles the generated `NodePayload` adapter + impl
# set (`$OUT_DIR/node_payload_impls.rs`, emitted by `build.rs::emit_node_payload_impls`)
# into the `node_payload_gen` module. OFF BY DEFAULT: the normal build
# (`cargo build --bin postgres`) leaves the live `Node` enum byte-untouched; this
# feature only exists to validate that the codegen compiles ahead of the atomic
# flip. At the flip the gate is removed and the module becomes the live rep.
node_payload_codegen = []

[dependencies]
types_core = { path = "../types_core" }
# The `std` fmgr ABI call-frame carrier (`FunctionCallInfoBaseData`): the
# executor `Func` step owns one persistent carrier (C's `op->d.func.fcinfo_data`,
# allocated once at `ExecInitFunc`), filled in place and dispatched directly each
# tuple. `fmgr` deps only the leaf type crates (types_core/datum/types_error/
# types_tuple/mcx) — none reach `nodes` — so the edge is acyclic. (This is why
# `nodes` is now `std` rather than `#![no_std]`.)
fmgr = { path = "../fmgr" }
types_acl = { path = "../types_acl" }
types_error = { path = "../types_error" }
types_scan = { path = "../types_scan" }
snapshot = { path = "../snapshot" }
datum = { path = "../datum" }
types_resowner = { path = "../types_resowner" }
types_sortsupport = { path = "../types_sortsupport" }
rel = { path = "../rel" }
types_trigger = { path = "../types_trigger" }
types_tuple = { path = "../types_tuple" }
types_slot = { path = "../types_slot" }
mcx = { path = "../../mcx" }
types_storage = { path = "../types_storage" }
opclass = { path = "../opclass" }
condvar = { path = "../condvar" }
execparallel = { path = "../execparallel" }
types_parallel = { path = "../types_parallel" }
tidbitmap = { path = "../tidbitmap" }
# Table-AM scan-descriptor vocabulary (`TableScanDesc`), named by the relocated
# `TidScanState` / `BitmapHeapScanState` node-state structs (their
# `ss_currentScanDesc` field). `types-tableam` deps only the leaf type crates
# (core/error/tuple/slot/rel/scan/snapshot/storage/tidbitmap) — none of which
# reach `types-nodes` — so this edge is acyclic (the slot-vocab F0 "Edge A").
types_tableam = { path = "../types_tableam" }
# JSON column-IO coercion cache (`ColumnIOData`) carried by the
# `EEOP_JSONEXPR_COERCION` step's persistent `json_coercion_cache`
# (`JsonCoercionCache` in execExpr.h). `types-jsonfuncs` deps only leaf type
# crates (core/fmgr/tuple/json/jsonb/datum) — none reach `types-nodes` — so the
# edge is acyclic.
types_jsonfuncs = { path = "../types_jsonfuncs" }
# Node-support runtime traits + the `#[derive(PgNode)]` proc-macro consumed by
# the leaf node families (value.h / bitmapset / list) and by the central
# build.rs-generated `node_tree` dispatch. `node-support` is a LEAF crate
# (depends only on `mcx` + `types-error`), so this introduces no cycle.
node_support = { path = "../../../backend/nodes/node_support" }
macros = { path = "../../../backend/nodes/macros" }
