# relcache (utils/rel.h) — RelationNeedsWAL.
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
# xloginsert (xloginsert.c) — XLogBeginInsert / XLogRegister* / XLogInsert.
backend-access-transam-xloginsert-seams = { path = "../backend-access-transam-xloginsert-seams" }
# predicate (predicate.c) — PredicateLockPageSplit.
backend-storage-lmgr-predicate-seams = { path = "../backend-storage-lmgr-predicate-seams" }
# ginutil (ginutil.c) — GinNewBuffer.
backend-access-gin-ginutil-seams = { path = "../backend-access-gin-ginutil-seams" }

[dev-dependencies]
