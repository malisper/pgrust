[package]
name = "backend-access-gin-ginscan"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_access_gin_ginscan"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-rel = { path = "../types-rel" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
types-scan = { path = "../types-scan" }
types-gin = { path = "../types-gin" }
types-tableam = { path = "../types-tableam" }
types-tidbitmap = { path = "../types-tidbitmap" }

# owned engine layers (direct deps — acyclic: ginscan owns ginscan.c,
# consumes ginutil/gin-core-probe which it does not call back into)
backend-access-gin-ginutil = { path = "../backend-access-gin-ginutil" }
backend-access-gin-core-probe = { path = "../backend-access-gin-core-probe" }

# cross-owner seam crates
backend-access-gin-ginutil-seams = { path = "../backend-access-gin-ginutil-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-utils-activity-pgstat-seams = { path = "../backend-utils-activity-pgstat-seams" }
backend-utils-error = { path = "../backend-utils-error" }

[dev-dependencies]
