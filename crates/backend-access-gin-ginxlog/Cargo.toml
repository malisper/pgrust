[package]
name = "backend-access-gin-ginxlog"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_access_gin_ginxlog"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
types-wal = { path = "../types-wal" }
types-gin = { path = "../types-gin" }

# Owns these rmgr-table callbacks (gin_redo / gin_xlog_startup /
# gin_xlog_cleanup / gin_mask); installs them on landing.
backend-access-gin-core-seams = { path = "../backend-access-gin-core-seams" }

# Critical-section count / ereport (miscadmin.h, elog.c).
backend-utils-error = { path = "../backend-utils-error" }

# Page-byte primitives (bufpage.c): PageAddItemExtended / PageIndexTupleDelete /
# PageGetItem / PageGetItemId / PageSetLSN / PageIsEmpty.
backend-storage-page = { path = "../backend-storage-page" }

# GIN page-byte substrate (already-merged sibling crates).
backend-access-gin-gindatapage = { path = "../backend-access-gin-gindatapage" }
backend-access-gin-ginutil = { path = "../backend-access-gin-ginutil" }
backend-access-gin-core-probe = { path = "../backend-access-gin-core-probe" }

# WAL-recovery substrate.
backend-access-transam-xlogutils = { path = "../backend-access-transam-xlogutils" }
backend-access-transam-xlogreader-seams = { path = "../backend-access-transam-xlogreader-seams" }

# Buffer manager (bufmgr.c) — page access during redo.
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }

# Page masking for WAL consistency checking (bufmask.c).
backend-access-common-bufmask-seams = { path = "../backend-access-common-bufmask-seams" }

[dev-dependencies]
seams-init = { path = "../seams-init" }
