[package]
name = "backend-access-gist-build"
version = "0.1.0"
edition = "2021"

# Every fallible function here returns the project-wide `types_error::PgResult`.

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
types-rel = { path = "../types-rel" }
types-nodes = { path = "../types-nodes" }
types-tableam = { path = "../types-tableam" }
types-gist = { path = "../types-gist" }

# libm: pow / rint for the buffering-switch arithmetic (math.h in C).
libm = "0.2"

# ereport / elog (miscadmin.h, elog.c).
backend-utils-error = { path = "../backend-utils-error" }

# Page-byte primitives (bufpage.c): PageRef / PageMut / PageGetItem /
# PageGetItemId / PageGetMaxOffsetNumber / PageGetFreeSpace / PageAddItemExtended.
backend-storage-page = { path = "../backend-storage-page" }

# GiST core (gist.c / gistutil.c / gistsplit.c): gistdoinsert, gistplacetopage,
# gistSplit, gistFormTuple, gistCompressValues, gistgetadjusted, gistDeCompressAtt,
# gistpenalty, gistchoose, gistcheckpage, initGISTstate, gistNewBuffer,
# GISTInitBuffer, gistinitpage, gistfillbuffer, gistextractpage, gistjoinvector,
# gistunion, gistfillitupvec + page accessors.
backend-access-gist-core = { path = "../backend-access-gist-core" }

# Build-dispatch seams (gistbuild/gistbuildempty `ambuild`/`ambuildempty`): the
# GiST AM vtable lives in the lower gist-core crate, which reaches these entries
# (above it in the dep graph) through these seams; gist-build installs them from
# its `init_seams`. Acyclic — gist-am-seams is a leaf seam crate (types-only
# deps), and gist-core already sits above it.
backend-access-gist-am-seams = { path = "../backend-access-gist-am-seams" }

# Buffer manager (bufmgr.c): ReadBuffer / LockBuffer / UnlockReleaseBuffer /
# BufferGetPage / BufferGetBlockNumber / MarkBufferDirty / PageSetLSN.
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }

# Bulk page writer (bulk_write.c): smgr_bulk_start_rel / get_buf / write / finish.
backend-storage-smgr-bulkwrite-seams = { path = "../backend-storage-smgr-bulkwrite-seams" }

# Buffered temp files (buffile.c): BufFileCreateTemp / Close / SeekBlock /
# ReadExact / Write.
backend-storage-file-buffile-seams = { path = "../backend-storage-file-buffile-seams" }

# WAL insert (xloginsert.c): log_newpage_range (post-build WAL emit).
backend-access-transam-xloginsert-seams = { path = "../backend-access-transam-xloginsert-seams" }

# smgr (smgr.c): smgrnblocks (auto-mode cache-fit check).
backend-storage-smgr-seams = { path = "../backend-storage-smgr-seams" }

# Index AM support-procedure resolution (indexam.c): index_getprocid
# (GIST_SORTSUPPORT_PROC probe for the sorted-build mode decision).
backend-access-index-indexam-seams = { path = "../backend-access-index-indexam-seams" }

# table-AM heap-scan provider (tableam.c): table_index_build_scan.
backend-access-table-tableam-seams = { path = "../backend-access-table-tableam-seams" }

# Relcache (rel.h): RelationNeedsWAL (post-build WAL emit decision).
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }

# maintenance_work_mem GUC (vacuumlazy seam carries it) + effective_cache_size.
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# Critical section START/END (miscinit.c).
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }

# CHECK_FOR_INTERRUPTS (parallel-rt seam).
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }

# tuplesort (tuplesort.c): tuplesort_begin_index_gist + putindextuplevalues +
# performsort + getindextuple + end (sorted-build leg; uninstalled -> panics
# until the tuplesort tower lands).
backend-utils-sort-tuplesort-seams = { path = "../backend-utils-sort-tuplesort-seams" }
