[package]
name = "backend-access-gist-core"
version = "0.1.0"
edition = "2021"

# Every fallible function here returns the project-wide `types_error::PgResult`.

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
types-rel = { path = "../types-rel" }
types-gist = { path = "../types-gist" }

# ereport / elog (miscadmin.h, elog.c).
backend-utils-error = { path = "../backend-utils-error" }

# Page-byte primitives (bufpage.c): PageInit / PageAddItemExtended /
# PageGetSpecialPointer / PageGetSpecialSize / PageIsNew / PageXLogRecPtr*.
backend-storage-page = { path = "../backend-storage-page" }

# Buffer manager (bufmgr.c): with_buffer_page / buffer_get_block_number.
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }

# Index-tuple formation (indextuple.c): index_form_tuple_desc.
backend-access-common-indextuple-seams = { path = "../backend-access-common-indextuple-seams" }

# Tuple-descriptor truncation (tupdesc.c): CreateTupleDescTruncatedCopy.
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }

# Index AM support-procedure resolution (indexam.c): index_getprocinfo /
# index_getprocid (resolved FmgrInfo / proc OID per index column).
backend-access-index-indexam-seams = { path = "../backend-access-index-indexam-seams" }

# GiST opclass support-procedure dispatch (per-opclass typed seams installed by
# backend-access-gist-proc): gist_compress / gist_decompress / gist_union ...
backend-access-gist-dispatch-seams = { path = "../backend-access-gist-dispatch-seams" }

# Single-attribute index-tuple deform (indextuple.c): nocache_index_getattr.
backend-access-common-indextuple = { path = "../backend-access-common-indextuple" }

# Heap-tuple formation (heaptuple.c): heap_form_tuple for gistFetchTuple.
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }

# Index FSM (indexfsm.c): GetFreeIndexPage for gistNewBuffer recycling.
backend-storage-freespace-seams = { path = "../backend-storage-freespace-seams" }

# WAL state (xlog.c): XLogStandbyInfoActive (gistNewBuffer recycle WAL leg).
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }

# Relcache (rel.h): RelationNeedsWAL (gistNewBuffer recycle WAL leg).
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }

# Visibility horizons (procarray.c): GlobalVisCheckRemovableFullXid for
# gistPageRecyclable.
backend-storage-ipc-procarray-seams = { path = "../backend-storage-ipc-procarray-seams" }

# Backend PRNG (pg_prng.c): pg_prng_bool for gistchoose's tie-break.
pg-prng = { path = "../pg-prng" }

# gistxlog.c seams (unported F7 sibling): gistXLogPageReuse / gistXLogSplit /
# gistXLogUpdate / gistXLogDelete / gistGetFakeLSN (reached by the insert spine).
backend-access-gist-core-seams = { path = "../backend-access-gist-core-seams" }

# Predicate locking (predicate.c): CheckForSerializableConflictIn /
# PredicateLockPageSplit (insert spine conflict points).
backend-storage-lmgr-predicate-seams = { path = "../backend-storage-lmgr-predicate-seams" }

# Heap AM (heapam_visibility / heapam.c): index_compute_xid_horizon_for_tuples
# (gistprunepage snapshot conflict horizon).
backend-access-heap-heapam-seams = { path = "../backend-access-heap-heapam-seams" }

# Recursion guard (postgres.c): check_stack_depth (gistSplit recursion).
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }

# --- F2-scan deps (gistscan.c / gistget.c) ---

# Unified index-AM vocabulary (amapi.h): IndexAmRoutine, IndexScanDescData,
# AmOpaque carrier, ScanKeyData, ScanDirection, IndexOrderByDistance.
types-amapi = { path = "../types-amapi" }
types-tableam = { path = "../types-tableam" }
types-scan = { path = "../types-scan" }
types-tidbitmap = { path = "../types-tidbitmap" }

# Search-queue pairing heap (lib/pairingheap.h).
backend-lib-pairingheap = { path = "../backend-lib-pairingheap" }

# GiST opclass consistent/distance dispatch is already deps'd above
# (backend-access-gist-dispatch-seams).

# GiST AM insert/vacuum vtable callbacks (unported owners): gistinsert /
# gistbulkdelete / gistvacuumcleanup.
backend-access-gist-am-seams = { path = "../backend-access-gist-am-seams" }

# tidbitmap (tidbitmap.c): tbm_add_tuples for gistgetbitmap.
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }

# Predicate page lock (predicate.c): PredicateLockPage for gistScanPage.
# (predicate-seams already deps'd above.)

# pgstat (pgstat.h): pgstat_count_index_scan.
backend-utils-activity-pgstat-seams = { path = "../backend-utils-activity-pgstat-seams" }

# lsyscache (lsyscache.c): get_func_rettype for gistrescan order-by types;
# get_opfamily_proc / get_index_column_opclass / get_opclass_opfamily_and_input_type
# for gistproperty / gisttranslatecmptype.
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }

# reloptions (reloptions.c): build_reloptions_gist for gistoptions.
backend-access-common-reloptions-seams = { path = "../backend-access-common-reloptions-seams" }

# fmgr (fmgr.c): OidFunctionCall1Coll for gisttranslatecmptype.
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }

# --- F5-vacuum deps (gistvacuum.c) ---

# IntegerSet (lib/integerset.c): the internal/empty leaf page sets.
backend-lib-integerset = { path = "../backend-lib-integerset" }

# VACUUM delay (vacuum.c via heap vacuum lazy): vacuum_delay_point.
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }

# ReadNextFullTransactionId (varsup.c): the deleted-page recycle XID stamp.
backend-access-transam-varsup-seams = { path = "../backend-access-transam-varsup-seams" }

# IndexBulkDeleteCallback dead-TID test (vacuum.c): vacuum_tid_is_dead.
backend-commands-vacuum-seams = { path = "../backend-commands-vacuum-seams" }

# Relation-extension lock (lmgr.c): Lock/UnlockRelationForExtension.
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }

# RELATION_IS_LOCAL (hio.c): relation_is_local for the extension-lock skip.
backend-access-heap-hio-seams = { path = "../backend-access-heap-hio-seams" }

# ereport(LOG) for the legacy invalid-inner-tuple notice (elog.c).
backend-utils-error-elog-seams = { path = "../backend-utils-error-elog-seams" }

[dev-dependencies]
