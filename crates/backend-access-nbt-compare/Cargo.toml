[package]
name = "backend-access-nbt-compare"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_access_nbt_compare"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-datum = { path = "../types-datum" }
types-sortsupport = { path = "../types-sortsupport" }

# fmgr builtin fast-path registration (the btree BTORDER_PROC comparators).
types-fmgr = { path = "../types-fmgr" }
types-error = { path = "../types-error" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }

# Outward seam crate: the sort/skip substrate installs the comparator /
# increment / decrement field writes; nbtcompare only calls them.
backend-access-nbt-compare-seams = { path = "../backend-access-nbt-compare-seams" }

[dev-dependencies]
# Tests build a `SortSupportData` (needs a memory context) and install
# recording stubs into the OUTWARD seams to verify dispatch.
mcx = { path = "../mcx" }
