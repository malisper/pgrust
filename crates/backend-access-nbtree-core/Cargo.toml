[package]
name = "backend-access-nbtree-core"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

# Port of the mutually-recursive B-tree core cluster: nbtsearch.c +
# nbtinsert.c + nbtpage.c + nbtutils.c + nbtsplitloc.c + nbtpreprocesskeys.c
# (PostgreSQL 18.3). Installs the seams declared in
# backend-access-nbtree-core-seams (except bt_form_posting, owned by nbtdedup).

[lib]
name = "backend_access_nbtree_core"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
pg-prng = { path = "../pg-prng" }
backend-utils-activity-pgstat-seams = { path = "../backend-utils-activity-pgstat-seams" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nbtree = { path = "../types-nbtree" }
types-rel = { path = "../types-rel" }
types-scan = { path = "../types-scan" }
types-snapshot = { path = "../types-snapshot" }
types-storage = { path = "../types-storage" }
types-tableam = { path = "../types-tableam" }
types-tuple = { path = "../types-tuple" }
types-wal = { path = "../types-wal" }
types-fmgr = { path = "../types-fmgr" }
types-amapi = { path = "../types-amapi" }

backend-storage-page = { path = "../backend-storage-page" }
backend-access-nbt-dedup = { path = "../backend-access-nbt-dedup" }
backend-utils-error = { path = "../backend-utils-error" }

# This crate owns these seams (installs them in init_seams()).
backend-access-nbtree-core-seams = { path = "../backend-access-nbtree-core-seams" }
# Inward seams the search loop calls for parallel-scan coordination (installed by
# the sibling backend-access-nbtree-nbtree unit across the module cycle).
backend-access-nbtree-nbtree-seams = { path = "../backend-access-nbtree-nbtree-seams" }
# This crate also owns the nbtsort.c build-helper seams (nbtutils.c bodies).
backend-access-nbtree-build-seams = { path = "../backend-access-nbtree-build-seams" }

# Outward seam crates (callees in not-yet-ported owners).
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
# `table_index_fetch_tuple_check` (tableam dispatch) — `_bt_check_unique`'s
# heap-visibility probe; owner = backend-access-table-tableam (depending on it
# directly would cycle, as the dispatch reaches the heap AM which depends on
# nbtree).
backend-access-table-tableam-seams = { path = "../backend-access-table-tableam-seams" }
# SSI predicate-locking hooks: nbtree manages its own predicate locks
# (`ampredlocks = true`). `_bt_search`/`_bt_first`/`_bt_readnextpage` take
# `PredicateLockRelation`/`PredicateLockPage`; `_bt_doinsert`/`_bt_check_unique`
# take `CheckForSerializableConflictIn`; page split takes
# `PredicateLockPageSplit`. Seam-only dep (predicate.c body installs them).
backend-storage-lmgr-predicate-seams = { path = "../backend-storage-lmgr-predicate-seams" }
# `IsolationIsSerializable()` (== `XactIsoLevel == XACT_SERIALIZABLE`) — gates
# the empty-index relation-lock retry in `_bt_first`. Reached via `xact_iso_level`.
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
# `BTreeShmemSize`/`BTreeShmemInit` (nbtutils.c) seams summed/called by ipci.c.
backend-access-nbtree-seams = { path = "../backend-access-nbtree-seams" }
backend-access-transam-xloginsert-seams = { path = "../backend-access-transam-xloginsert-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-access-common-indextuple-seams = { path = "../backend-access-common-indextuple-seams" }
backend-access-index-genam-seams = { path = "../backend-access-index-genam-seams" }
backend-storage-freespace-seams = { path = "../backend-storage-freespace-seams" }
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }
backend-storage-smgr-seams = { path = "../backend-storage-smgr-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-access-index-indexam-seams = { path = "../backend-access-index-indexam-seams" }
backend-utils-adt-arrayfuncs-seams = { path = "../backend-utils-adt-arrayfuncs-seams" }
backend-utils-adt-datum-seams = { path = "../backend-utils-adt-datum-seams" }
# `PrepareSkipSupportFromOpclass` (utils/adt/skipsupport.c) — skip-array support.
backend-utils-adt-skipsupport-seams = { path = "../backend-utils-adt-skipsupport-seams" }
# `sksup->increment(...)` / `sksup->decrement(...)` skip-support callbacks
# (utils/sort/sortsupport.c substrate; called by the skip-array strategy code).
backend-access-nbt-compare-seams = { path = "../backend-access-nbt-compare-seams" }
types-sortsupport = { path = "../types-sortsupport" }
# btoptions: build_reloptions(RELOPT_KIND_BTREE, BTOptions) dispatch (nbtutils.c).
backend-access-common-reloptions-seams = { path = "../backend-access-common-reloptions-seams" }
types-datum = { path = "../types-datum" }

# nbtpage.c outward seams.
backend-access-transam-varsup-seams = { path = "../backend-access-transam-varsup-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-storage-ipc-procarray-seams = { path = "../backend-storage-ipc-procarray-seams" }
backend-storage-smgr-bulkwrite-seams = { path = "../backend-storage-smgr-bulkwrite-seams" }
backend-utils-error-elog-seams = { path = "../backend-utils-error-elog-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
# nbtutils.c BTVacInfo shared state: BtreeVacuumLock interlock (lwlock) +
# "BTree Vacuum State" ShmemInitStruct / add_size / mul_size carving.
backend-storage-lmgr-lwlock = { path = "../backend-storage-lmgr-lwlock" }
backend-storage-ipc-shmem-seams = { path = "../backend-storage-ipc-shmem-seams" }
# BTreeShmemInit seeds the cycle counter with time(NULL).
libc = "0.2"

[target.'cfg(target_family = "wasm")'.dependencies]
wasm-libc-shim = { path = "../wasm-libc-shim" }
