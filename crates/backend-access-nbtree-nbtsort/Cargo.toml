[package]
name = "backend-access-nbtree-nbtsort"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_access_nbtree_nbtsort"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nbtree = { path = "../types-nbtree" }
types-rel = { path = "../types-rel" }
types-scan = { path = "../types-scan" }
types-nodes = { path = "../types-nodes" }
types-tuple = { path = "../types-tuple" }
types-tableam = { path = "../types-tableam" }

backend-storage-page = { path = "../backend-storage-page" }

# Outward seam crates (callees in not-yet-ported sibling / owner units).
backend-access-nbtree-core-seams = { path = "../backend-access-nbtree-core-seams" }
backend-access-nbtree-build-seams = { path = "../backend-access-nbtree-build-seams" }
backend-utils-sort-tuplesort-seams = { path = "../backend-utils-sort-tuplesort-seams" }
backend-storage-smgr-bulkwrite-seams = { path = "../backend-storage-smgr-bulkwrite-seams" }
backend-utils-activity-small = { path = "../backend-utils-activity-small" }
# The serial heap build scan (`table_index_build_scan`, the closure-carrying
# build seam; provider = heap AM, installed concurrently by wf-buildscan), the
# index-fork block-count check, and `maintenance_work_mem` for sizing the sort.
backend-access-table-tableam-seams = { path = "../backend-access-table-tableam-seams" }
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }

[dev-dependencies]
types-storage = { path = "../types-storage" }
