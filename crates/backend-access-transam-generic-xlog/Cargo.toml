[package]
name = "backend-access-transam-generic-xlog"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_access_transam_generic_xlog"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-rel = { path = "../types-rel" }
types-storage = { path = "../types-storage" }
types-wal = { path = "../types-wal" }

# Owns these rmgr-table callbacks; installs them on landing.
backend-access-transam-generic-xlog-seams = { path = "../backend-access-transam-generic-xlog-seams" }

# Critical-section count (miscadmin.h START/END_CRIT_SECTION); stored in elog.c.
backend-utils-error = { path = "../backend-utils-error" }

# Outward calls to not-yet-ported owners go through their seam crates.
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
backend-access-transam-xloginsert-seams = { path = "../backend-access-transam-xloginsert-seams" }
backend-access-transam-xlogutils-seams = { path = "../backend-access-transam-xlogutils-seams" }
backend-access-common-bufmask-seams = { path = "../backend-access-common-bufmask-seams" }

[dev-dependencies]
seams-init = { path = "../seams-init" }
