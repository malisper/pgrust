[package]
name = "backend-access-transam-parallel"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_access_transam_parallel"
path = "src/lib.rs"

[dependencies]
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-postmaster-bgworker-seams = { path = "../backend-postmaster-bgworker-seams" }
libc = "0.2"
backend-executor-execParallel-seams = { path = "../backend-executor-execParallel-seams" }
backend-storage-ipc-dsm-core-seams = { path = "../backend-storage-ipc-dsm-core-seams" }
types-signal = { path = "../types-signal" }
interfaces-libpq-legacy-pqsignal = { path = "../interfaces-libpq-legacy-pqsignal" }
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
types-core = { path = "../types-core" }
types-tuple = { path = "../types-tuple" }
types-error = { path = "../types-error" }
types-execparallel = { path = "../types-execparallel" }
types-nodes = { path = "../types-nodes" }
types-parallel = { path = "../types-parallel" }
types-storage = { path = "../types-storage" }
mcx = { path = "../mcx" }
backend-utils-error = { path = "../backend-utils-error" }
# GetCurrentSubTransactionId(): the parallel rt-seam delegates to the xact-owned
# accessor seam (installed by backend-access-transam-xact in production).
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
# HoldInterrupts/ResumeInterrupts/INTERRUPTS_CAN_BE_PROCESSED: the parallel
# rt-seams delegate to the init-small-owned accessor seams (installed in
# production by backend-utils-init-small).
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-storage-ipc-dsm-core = { path = "../backend-storage-ipc-dsm-core" }
backend-storage-ipc-shm-toc = { path = "../backend-storage-ipc-shm-toc" }
backend-storage-lmgr-s-lock = { path = "../backend-storage-lmgr-s-lock" }
backend-storage-ipc-shm-mq-seams = { path = "../backend-storage-ipc-shm-mq-seams" }
backend-access-transam-parallel-seams = { path = "../backend-access-transam-parallel-seams" }
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }
backend-access-common-session-seams = { path = "../backend-access-common-session-seams" }
backend-utils-mmgr-mcxt-seams = { path = "../backend-utils-mmgr-mcxt-seams" }
backend-commands-matview-deps-seams = { path = "../backend-commands-matview-deps-seams" }
backend-catalog-namespace-seams = { path = "../backend-catalog-namespace-seams" }
backend-commands-variable-seams = { path = "../backend-commands-variable-seams" }
backend-commands-user-seams = { path = "../backend-commands-user-seams" }
backend-storage-lmgr-predicate-seams = { path = "../backend-storage-lmgr-predicate-seams" }
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
backend-commands-vacuum-seams = { path = "../backend-commands-vacuum-seams" }
backend-executor-execParallel-support-seams = { path = "../backend-executor-execParallel-support-seams" }
backend-executor-execUtils-seams = { path = "../backend-executor-execUtils-seams" }
backend-executor-instrument = { path = "../backend-executor-instrument" }

[dev-dependencies]
backend-storage-ipc-dsm-core = { path = "../backend-storage-ipc-dsm-core", features = ["test-bringup"] }
backend-storage-lmgr-lwlock = { path = "../backend-storage-lmgr-lwlock" }
backend-utils-mmgr-freepage = { path = "../backend-utils-mmgr-freepage" }
backend-storage-ipc-shm-mq = { path = "../backend-storage-ipc-shm-mq" }
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }
backend-postmaster-bgworker-seams = { path = "../backend-postmaster-bgworker-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
types-storage = { path = "../types-storage" }

[target.'cfg(target_family = "wasm")'.dependencies]
wasm-libc-shim = { path = "../wasm-libc-shim" }
