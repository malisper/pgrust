[package]
name = "backend-access-transam-xlogrecovery"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_access_transam_xlogrecovery"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-wal = { path = "../types-wal" }
types-control = { path = "../types-control" }
types-storage = { path = "../types-storage" }
types-condvar = { path = "../types-condvar" }
types-error = { path = "../types-error" }
mcx = { path = "../mcx" }

backend-utils-error = { path = "../backend-utils-error" }

backend-access-transam-xlogrecovery-seams = { path = "../backend-access-transam-xlogrecovery-seams" }
backend-access-transam-xlogprefetcher-seams = { path = "../backend-access-transam-xlogprefetcher-seams" }
backend-access-transam-xlogreader-seams = { path = "../backend-access-transam-xlogreader-seams" }
backend-access-transam-xlogreader = { path = "../backend-access-transam-xlogreader" }
# The recovery reader/prefetcher holder (walrecovery.rs) owns a live
# XLogPrefetcher wrapping the reader and drives it on the ReadRecord loop.
backend-access-transam-xlogprefetcher = { path = "../backend-access-transam-xlogprefetcher" }
# XLogPrefetcherReadRecord reads maintenance_io_concurrency (bufmgr GUC) and
# io_direct_flags (fd global); sourced off those owners.
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
backend-storage-file-fd = { path = "../backend-storage-file-fd" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-timeline-seams = { path = "../backend-access-transam-timeline-seams" }
backend-access-transam-xlogarchive-seams = { path = "../backend-access-transam-xlogarchive-seams" }
backend-postmaster-startup-seams = { path = "../backend-postmaster-startup-seams" }
backend-postmaster-checkpointer-seams = { path = "../backend-postmaster-checkpointer-seams" }
backend-replication-walreceiver-seams = { path = "../backend-replication-walreceiver-seams" }
backend-storage-ipc-shmem-seams = { path = "../backend-storage-ipc-shmem-seams" }
backend-storage-ipc-latch = { path = "../backend-storage-ipc-latch" }
backend-storage-ipc-procarray-seams = { path = "../backend-storage-ipc-procarray-seams" }
backend-storage-lmgr-s-lock = { path = "../backend-storage-lmgr-s-lock" }
backend-storage-lmgr-condition-variable-seams = { path = "../backend-storage-lmgr-condition-variable-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-replication-walreceiverfuncs-seams = { path = "../backend-replication-walreceiverfuncs-seams" }
backend-utils-activity-pgstat-io-seams = { path = "../backend-utils-activity-pgstat-io-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-misc-more-seams = { path = "../backend-utils-misc-more-seams" }
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }
# FinishWalRecovery: kill the WAL receiver / slot-sync worker and turn off
# streaming before writing end-of-recovery WAL.
backend-replication-logical-slotsync-seams = { path = "../backend-replication-logical-slotsync-seams" }

# Recovery-target GUC check/assign hooks (guc.rs): slot-name validation,
# pg_lsn / timestamp parsing, and the GUC check-error reporting protocol.
backend-replication-slot-seams = { path = "../backend-replication-slot-seams" }
backend-utils-adt-timestamp-seams = { path = "../backend-utils-adt-timestamp-seams" }
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
backend-utils-adt-lsn-trigfuncs = { path = "../backend-utils-adt-lsn-trigfuncs" }
# GUC `conf->variable` accessor slots for this unit's file-static recovery /
# streaming GUC globals (gucvars.rs installs `GucVarAccessors` on the matching
# `vars::*` slots from `init_seams`).
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# Replay family (replay.rs): the rmgr redo-dispatch table + the cross-owner
# seams the redo loop drives (varsup nextXid advance, standby/procarray
# KnownAssignedXids, xlogutils invalid-page check, pmsignal recovery signals,
# walsender wakeup, ipc proc_exit, variable-seams prefetch reconfigure,
# tablespace allow_in_place GUC, pg_rusage timing).
backend-access-transam-rmgr = { path = "../backend-access-transam-rmgr" }
backend-access-rmgrdesc-xactdesc = { path = "../backend-access-rmgrdesc-xactdesc" }
backend-access-transam-varsup-seams = { path = "../backend-access-transam-varsup-seams" }
backend-access-transam-xlogutils-seams = { path = "../backend-access-transam-xlogutils-seams" }
backend-storage-ipc-ipc-seams = { path = "../backend-storage-ipc-ipc-seams" }
backend-storage-ipc-pmsignal-seams = { path = "../backend-storage-ipc-pmsignal-seams" }
backend-replication-walsender-seams = { path = "../backend-replication-walsender-seams" }
backend-commands-variable-seams = { path = "../backend-commands-variable-seams" }
backend-commands-tablespace-globals-seams = { path = "../backend-commands-tablespace-globals-seams" }
backend-utils-misc-pg-rusage = { path = "../backend-utils-misc-pg-rusage" }
