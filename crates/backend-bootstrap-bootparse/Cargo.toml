[package]
name = "backend-bootstrap-bootparse"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_bootstrap_bootparse"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-catalog = { path = "../types-catalog" }
types-cluster = { path = "../types-cluster" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-rel = { path = "../types-rel" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
backend-utils-error = { path = "../backend-utils-error" }
# Own seam crate: installs boot_yylex_init / boot_yyparse.
backend-bootstrap-bootparse-seams = { path = "../backend-bootstrap-bootparse-seams" }
# Direct (leaf) lexer dependency.
backend-bootstrap-bootscanner = { path = "../backend-bootstrap-bootscanner" }
# Loader callbacks + per-backend bootstrap globals.
backend-bootstrap-bootstrap = { path = "../backend-bootstrap-bootstrap" }
# catalog/heap.c heap_create + heap_create_with_catalog (seam) + args struct.
backend-catalog-heap = { path = "../backend-catalog-heap" }
backend-catalog-heap-seams = { path = "../backend-catalog-heap-seams" }
# access/common/tupdesc.c CreateTupleDesc.
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }
# access/common/relation.c relation_open (to re-open the just-created heap rel).
backend-access-common-relation = { path = "../backend-access-common-relation" }
# catalog/namespace.c RangeVarGetRelid (seam).
backend-catalog-namespace-seams = { path = "../backend-catalog-namespace-seams" }
# catalog/toasting.c BootstrapToastTable.
backend-catalog-toasting = { path = "../backend-catalog-toasting" }
# commands/indexcmds.c DefineIndex (seam; owner not yet ported).
backend-commands-indexcmds-seams = { path = "../backend-commands-indexcmds-seams" }
