[package]
name = "backend-catalog-index"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_catalog_index"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-rel = { path = "../types-rel" }
types-nodes = { path = "../types-nodes" }
types-tableam = { path = "../types-tableam" }

# This unit's own inward seam declarations (installed by `init_seams`).
backend-catalog-index-seams = { path = "../backend-catalog-index-seams" }

# Relcache reads (`rd_index`/`rd_rel`/`rd_indam` fields, the index-AM vtable via
# `relation_rd_indam`, and the `pg_node_tree`-decoding `RelationGetIndex-
# {Expressions,Predicate}` / `RelationGetExclusionInfo`) used by
# `BuildIndexInfo` and `index_build`.
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
# Raw (non-planner-flattened) index expr/pred decode for
# `index_concurrently_create_copy`.
backend-utils-cache-relcache-nodexform-seams = { path = "../backend-utils-cache-relcache-nodexform-seams" }
# Processing-mode reads (`IsNormalProcessingMode`).
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
# `GetUserIdAndSecContext` (matview-deps owns the getter).
backend-commands-matview-deps-seams = { path = "../backend-commands-matview-deps-seams" }
# GUC nest level / RestrictSearchPath / AtEOXact_GUC.
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
# pgstat progress (CREATE INDEX phase report).
backend-utils-activity-backend-progress-seams = { path = "../backend-utils-activity-backend-progress-seams" }

# The reindex parallel-state transfer seams (owned by parallel.c's seam crate;
# this unit installs the index.c bodies — EstimateReindexStateSpace /
# SerializeReindexState / RestoreReindexState).
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }

# `UpdateIndexRelation`: pg_index INSERT carrier + the catalog-indexing
# `catalog_tuple_insert_pg_index` writer (keystone #341), `table_open`/
# `table_close` of pg_index, and the `nodeToString` (outfuncs) image of the
# index expressions / predicate (`make_ands_explicit` is a real fn in
# backend-nodes-core).
types-catalog = { path = "../types-catalog" }
backend-access-table-table-seams = { path = "../backend-access-table-table-seams" }
backend-catalog-indexing-seams = { path = "../backend-catalog-indexing-seams" }
backend-commands-comment-seams = { path = "../backend-commands-comment-seams" }
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
backend-nodes-core = { path = "../backend-nodes-core" }
# `BuildSpeculativeIndexInfo`: per-key unique-operator lookup.
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-access-index-amapi-seams = { path = "../backend-access-index-amapi-seams" }
backend-access-index-indexam-seams = { path = "../backend-access-index-indexam-seams" }
backend-access-index-indexam = { path = "../backend-access-index-indexam" }
backend-access-table-tableam-seams = { path = "../backend-access-table-tableam-seams" }
backend-utils-sort-tuplesort-seams = { path = "../backend-utils-sort-tuplesort-seams" }
backend-commands-vacuum-seams = { path = "../backend-commands-vacuum-seams" }
backend-storage-page = { path = "../backend-storage-page" }

# ConstructTupleDescriptor: index AM vtable lookup (amkeytype), the heap
# TupleDesc reads, CheckAttributeType, CreateTemplateTupleDesc /
# populate_compact_attribute, get_base_element_type, and AppendAttributeTuples.
backend-catalog-heap-seams = { path = "../backend-catalog-heap-seams" }
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }
types-tuple = { path = "../types-tuple" }
# CompareIndexInfo: map_variable_attnos over the index expression/predicate
# lists + equal().
backend-rewrite-rewritemanip-seams = { path = "../backend-rewrite-rewritemanip-seams" }
backend-nodes-equalfuncs-seams = { path = "../backend-nodes-equalfuncs-seams" }
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }

# Seam crates for not-yet-ported (or cyclic) owners.
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }

# index_create / index_constraint_create / index_set_state_flags:
# heap_create + InsertPgClassTuple (creating the index relcache entry + pg_class
# row), the dependency engine (column/collation/opclass/expression deps + the
# constraint's internal dep), pg_constraint entry + name check, pg_inherits
# (partition-index parent link), the deferrable-constraint recheck trigger, the
# AccessExclusiveLock on the new index, relcache/object-access invalidation +
# hooks, GetNewRelFileNumber / IsBinaryUpgrade / GLOBALTABLESPACE, the catalog
# system-table checks, the partition parent's relhassubclass, and the
# bootstrap-mode index_register / RelationInitIndexAccessInfo legs.
backend-catalog-catalog-seams = { path = "../backend-catalog-catalog-seams" }
backend-catalog-dependency-seams = { path = "../backend-catalog-dependency-seams" }
backend-catalog-pg-constraint-seams = { path = "../backend-catalog-pg-constraint-seams" }
backend-catalog-pg-inherits-seams = { path = "../backend-catalog-pg-inherits-seams" }
backend-catalog-pg-depend-seams = { path = "../backend-catalog-pg-depend-seams" }
backend-catalog-partition-seams = { path = "../backend-catalog-partition-seams" }
backend-commands-trigger-seams = { path = "../backend-commands-trigger-seams" }
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }
backend-catalog-objectaccess-seams = { path = "../backend-catalog-objectaccess-seams" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
backend-commands-tablecmds-seams = { path = "../backend-commands-tablecmds-seams" }
backend-commands-tablespace-globals-seams = { path = "../backend-commands-tablespace-globals-seams" }
backend-bootstrap-bootstrap-seams = { path = "../backend-bootstrap-bootstrap-seams" }
types-cluster = { path = "../types-cluster" }
types-storage = { path = "../types-storage" }

# reindex_index / reindex_relation: index/heap open+lock (index_open via indexam,
# try_table_open via table.c), RelationSetNewRelfilenumber + RelationGetIndexList
# (relcache), TransferPredicateLocksToHeapRelation (predicate), CheckTableNotInUse
# (matview-deps), get_index_isvalid (tablecmds), CommandCounterIncrement (xact),
# the toast-skip WARNING/INFO ereport channel, the EventTriggerCollectSimpleCommand
# leg, and IsToastNamespace (catalog).
backend-storage-lmgr-predicate-seams = { path = "../backend-storage-lmgr-predicate-seams" }
backend-commands-event-trigger-seams = { path = "../backend-commands-event-trigger-seams" }
backend-utils-error-seams = { path = "../backend-utils-error-seams" }
types-pgstat = { path = "../types-pgstat" }

# index_drop: RelationDropStorage (schedule index storage unlink at commit),
# pgstat_drop_relation (drop the per-relation stats entry transactionally), the
# PushActiveSnapshot/GetTransactionSnapshot bracket around the pg_index delete,
# and the DROP INDEX CONCURRENTLY session-lock / locker-drain leg.
backend-catalog-storage-seams = { path = "../backend-catalog-storage-seams" }
backend-utils-activity-pgstat-seams = { path = "../backend-utils-activity-pgstat-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
# FormIndexDatum: slot_getattr / slot_getsysattr (execTuples), index-expression
# eval (execExpr ExecPrepareExprList / ExecEvalExprSwitchContext), and the
# per-tuple expression context (execUtils GetPerTupleExprContext).
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
backend-executor-execUtils-seams = { path = "../backend-executor-execUtils-seams" }
# The word-model result Datum the form_index_datum seam yields.
types-datum = { path = "../types-datum" }
