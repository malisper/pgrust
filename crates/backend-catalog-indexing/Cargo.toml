[package]
name = "backend-catalog-indexing"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_catalog_indexing"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-rel = { path = "../types-rel" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
types-tableam = { path = "../types-tableam" }
types-storage = { path = "../types-storage" }

# Own inward-seam declarations (installed by this crate's init_seams()).
backend-catalog-indexing-seams = { path = "../backend-catalog-indexing-seams" }

# index_update_stats (catalog/index.c) dependency seams: IsBinaryUpgrade
# (init-small), AutoVacuumingActive (autovacuum), visibilitymap_count
# (vacuumlazy), all leaf seam crates with no edge back to this crate.
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-postmaster-autovacuum-seams = { path = "../backend-postmaster-autovacuum-seams" }
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }

# Engine callees — direct deps (the C indexing.c includes executor.h /
# access/heapam.h / access/genam.h / catalog/index.h, calling these directly).
backend-access-index-indexam = { path = "../backend-access-index-indexam" }
backend-executor-execTuples = { path = "../backend-executor-execTuples" }

# Engine callees crossed as seams (owners are sibling-spine deps).
backend-catalog-index-seams = { path = "../backend-catalog-index-seams" }
backend-access-heap-heapam-seams = { path = "../backend-access-heap-heapam-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }

# F1 per-catalog typed-insert seam bodies: form the catalog tuple from the
# crossed *InsertRow (heap_form_tuple over the catalog tupdesc), allocate row
# OIDs (GetNewOidWithIndex), then call the F0 engine above. The catalog-row
# constant/carrier types live in types-catalog. No dependency cycle: neither
# backend-catalog-catalog nor backend-access-common-heaptuple depends on this
# crate (verified via cargo tree).
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }
types-authid = { path = "../types-authid" }
backend-catalog-catalog = { path = "../backend-catalog-catalog" }
types-catalog = { path = "../types-catalog" }

# CreateStatistics' variable-length pg_statistic_ext columns: the char[] stxkind
# array (construct_array) and the buildint2vector / CStringGetTextDatum image
# bytes. arrayfuncs depends only on lsyscache-seams (no cycle).
backend-utils-adt-arrayfuncs = { path = "../backend-utils-adt-arrayfuncs" }
types-datum = { path = "../types-datum" }

# F2 syscache-copy / array-decode / owner-change seam bodies: the genam
# systable scan iterator (re-fetch a tuple by OID over the caller's open
# relation — the SearchSysCacheCopy1 stand-in for a catalog held open), the
# ScanKeyInit eager-fmgr key build, the table-AM relation open (sequence DML
# opens its own pg_sequence), the aclnewowner ACL rewrite for the owner-change
# legs, the pg_class relcache invalidation (SetRelationRuleStatus), and the
# InvokeObjectPostAlterHook object-access hook. The deformed-row carriers live
# in types-foreigncmds / types-cluster / types-acl. None of these owners
# depends on backend-catalog-indexing (verified: acl/arrayfuncs/genam/table/
# inval-seams/objectaccess-seams carry no edge to this crate).
backend-access-index-genam-seams = { path = "../backend-access-index-genam-seams" }
backend-access-common-scankey = { path = "../backend-access-common-scankey" }
backend-access-table-table = { path = "../backend-access-table-table" }
backend-commands-functioncmds-seams = { path = "../backend-commands-functioncmds-seams" }
backend-utils-activity-pgstat-function = { path = "../backend-utils-activity-pgstat-function" }
backend-utils-adt-acl = { path = "../backend-utils-adt-acl" }
# Heavyweight tuple-tag lock for get_catalog_object_by_oid_extended's locktuple
# path + the generic owner-tuple write's UnlockTuple (lmgr.c LockTuple/UnlockTuple).
# lmgr-seams carries no edge to this crate (verified: no cycle).
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }
# pg_get_acl's pg_attribute (objsubid) branch: SearchSysCache2(ATTNUM) +
# SysCacheGetAttr(attacl). syscache carries no edge to this crate (no cycle).
backend-utils-cache-syscache = { path = "../backend-utils-cache-syscache" }
types-cache = { path = "../types-cache" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
backend-catalog-objectaccess-seams = { path = "../backend-catalog-objectaccess-seams" }
types-foreigncmds = { path = "../types-foreigncmds" }
types-cluster = { path = "../types-cluster" }
types-acl = { path = "../types-acl" }
types-array = { path = "../types-array" }
types-scan = { path = "../types-scan" }
types-snapshot = { path = "../types-snapshot" }
