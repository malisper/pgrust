[package]
name = "backend-catalog-indexing"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_catalog_indexing"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-rel = { path = "../types-rel" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
types-tableam = { path = "../types-tableam" }
types-storage = { path = "../types-storage" }

# Own inward-seam declarations (installed by this crate's init_seams()).
backend-catalog-indexing-seams = { path = "../backend-catalog-indexing-seams" }

# Engine callees — direct deps (the C indexing.c includes executor.h /
# access/heapam.h / access/genam.h / catalog/index.h, calling these directly).
backend-access-index-indexam = { path = "../backend-access-index-indexam" }
backend-executor-execTuples = { path = "../backend-executor-execTuples" }

# Engine callees crossed as seams (owners are sibling-spine deps).
backend-catalog-index-seams = { path = "../backend-catalog-index-seams" }
backend-access-heap-heapam-seams = { path = "../backend-access-heap-heapam-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
