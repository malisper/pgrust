[package]
name = "backend-catalog-pg-collation"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_catalog_pg_collation"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
backend-utils-error = { path = "../backend-utils-error" }
types-rel = { path = "../types-rel" }
types-tuple = { path = "../types-tuple" }
types-catalog = { path = "../types-catalog" }
types-cache = { path = "../types-cache" }
types-datum = { path = "../types-datum" }
types-storage = { path = "../types-storage" }

# The inward seam this crate INSTALLS (CollationCreate), declared alongside
# collationcmds' other externals.
backend-commands-collationcmds-seams = { path = "../backend-commands-collationcmds-seams" }

# The catalog-mutation engine (F0, indexing.c) — CatalogTupleInsert keystone,
# consumed as `pub` functions exactly as the pg_database / indexing F1 family
# does (no dependency cycle).
backend-catalog-indexing = { path = "../backend-catalog-indexing" }

# heap_form_tuple (forming the pg_collation tuple) — direct call into the common
# heaptuple unit.
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }

# GetNewOidWithIndex (catalog.c) — direct dep on the catalog OID-allocation
# owner.
backend-catalog-catalog = { path = "../backend-catalog-catalog" }

# Duplicate-name probe: GetSysCacheOid3(COLLNAMEENCNSP, ...).
backend-utils-cache-syscache = { path = "../backend-utils-cache-syscache" }

# Dependency recording (recordDependencyOn / recordDependencyOnCurrentExtension /
# checkMembershipInCurrentExtension / recordDependencyOnOwner) — direct calls, as
# pg_database does. No cycle: these crates do not depend on this one.
backend-catalog-pg-depend = { path = "../backend-catalog-pg-depend" }
backend-catalog-pg-shdepend = { path = "../backend-catalog-pg-shdepend" }

# Outward callees crossed as seams.
backend-access-table-table-seams = { path = "../backend-access-table-table-seams" }
backend-catalog-objectaccess-seams = { path = "../backend-catalog-objectaccess-seams" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
common-encnames-seams = { path = "../common-encnames-seams" }
