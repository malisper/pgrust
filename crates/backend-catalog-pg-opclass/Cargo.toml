[package]
name = "backend-catalog-pg-opclass"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_catalog_pg_opclass"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-catalog = { path = "../types-catalog" }
types-scan = { path = "../types-scan" }
# This unit's own seam decl (get_default_opclass).
backend-catalog-pg-opclass-seams = { path = "../backend-catalog-pg-opclass-seams" }
# table_open / table_close over pg_opclass (AccessShareLock).
backend-access-table-table = { path = "../backend-access-table-table" }
# systable_beginscan / systable_getnext / endscan over the catalog.
backend-access-index-genam-seams = { path = "../backend-access-index-genam-seams" }
# heap_deform_tuple — read Form_pg_opclass columns.
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }
# getBaseType (domain -> base type) for the default-opclass scan.
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
# TypeCategory / IsPreferredType / IsBinaryCoercible (parse_coerce.c).
backend-parser-coerce = { path = "../backend-parser-coerce" }
# ScanKeyInit (access/common/scankey) — opcmethod = am_id filter.
backend-access-common-scankey = { path = "../backend-access-common-scankey" }
# format_type_be (error message on inconsistent pg_opclass).
backend-utils-adt-format-type = { path = "../backend-utils-adt-format-type" }
# AccessShareLock.
types-storage = { path = "../types-storage" }
# Datum (deformed column reads) + FmgrInfo / F_OIDEQ for the scan key.
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
