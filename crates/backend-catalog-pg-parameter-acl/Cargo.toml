[package]
name = "backend-catalog-pg-parameter-acl"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_catalog_pg_parameter_acl"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
backend-utils-error = { path = "../backend-utils-error" }
types-catalog = { path = "../types-catalog" }
types-cache = { path = "../types-cache" }
types-datum = { path = "../types-datum" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }

# The inward seams this crate INSTALLS (ParameterAclLookup / ParameterAclCreate).
backend-catalog-pg-parameter-acl-seams = { path = "../backend-catalog-pg-parameter-acl-seams" }

# The catalog-mutation engine (F0, indexing.c) — CatalogTupleInsert keystone,
# consumed as `pub` functions exactly as the pg_database / pg_collation family
# does (no dependency cycle).
backend-catalog-indexing = { path = "../backend-catalog-indexing" }

# heap_form_tuple (forming the pg_parameter_acl tuple).
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }

# GetNewOidWithIndex (catalog.c) — catalog OID allocation.
backend-catalog-catalog = { path = "../backend-catalog-catalog" }

# GetSysCacheOid1(PARAMETERACLNAME, ...) — the name->oid probe.
backend-utils-cache-syscache = { path = "../backend-utils-cache-syscache" }

# convert_GUC_name_for_parameter_acl (guc.c) — direct call, the canonical pub
# helper the GUC crate exposes. No cycle (guc does not depend on this crate).
backend-utils-misc-guc = { path = "../backend-utils-misc-guc" }

# check_GUC_name_for_parameter_acl (guc.c) — crosses as a seam (guc-internal
# logic over find_option / assignable_custom_variable_name, installed by guc).
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }

# table_open / table_close crossed as seams.
backend-access-table-table-seams = { path = "../backend-access-table-table-seams" }

# cstring_to_text — build the parname text Datum.
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
