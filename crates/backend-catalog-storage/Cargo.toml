[package]
name = "backend-catalog-storage"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_catalog_storage"
path = "src/lib.rs"

[dependencies]
# Lazy-vacuum driver's RelationTruncate seam homes in vacuumlazy-seams;
# catalog/storage.c is its real owner.
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-wal = { path = "../types-wal" }
types-rel = { path = "../types-rel" }
types-cluster = { path = "../types-cluster" }
types-syscache = { path = "../types-syscache" }

# Own seam declarations (installed by init_seams()).
backend-catalog-storage-seams = { path = "../backend-catalog-storage-seams" }

# Cycle-safe direct deps (real fns).
backend-storage-smgr-smgr = { path = "../backend-storage-smgr-smgr" }
backend-access-transam-xloginsert = { path = "../backend-access-transam-xloginsert" }
backend-access-transam-xlogutils = { path = "../backend-access-transam-xlogutils" }
backend-storage-freespace = { path = "../backend-storage-freespace" }
backend-access-heap-visibilitymap = { path = "../backend-access-heap-visibilitymap" }
backend-storage-page = { path = "../backend-storage-page" }
backend-common-relpath = { path = "../backend-common-relpath" }
backend-access-table-table = { path = "../backend-access-table-table" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# Outward calls through owner -seams crates (panic until the owner lands).
backend-storage-smgr-seams = { path = "../backend-storage-smgr-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-catalog-indexing-seams = { path = "../backend-catalog-indexing-seams" }
backend-storage-smgr-bulkwrite-seams = { path = "../backend-storage-smgr-bulkwrite-seams" }
backend-utils-activity-pgstat-seams = { path = "../backend-utils-activity-pgstat-seams" }
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
