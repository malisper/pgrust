[package]
name = "backend-commands-alter"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_alter"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
mcx = { path = "../mcx" }
backend-utils-error = { path = "../backend-utils-error" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-acl = { path = "../types-acl" }
types-cache = { path = "../types-cache" }
types-catalog = { path = "../types-catalog" }
types-nodes = { path = "../types-nodes" }
types-rel = { path = "../types-rel" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
types-datum = { path = "../types-datum" }

# Directly ported foundation crates (no cycle).
backend-access-table-table = { path = "../backend-access-table-table" }
backend-access-common-relation = { path = "../backend-access-common-relation" }
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }
backend-catalog-objectaddress = { path = "../backend-catalog-objectaddress" }
backend-catalog-indexing = { path = "../backend-catalog-indexing" }
backend-catalog-namespace = { path = "../backend-catalog-namespace" }
backend-catalog-pg-depend = { path = "../backend-catalog-pg-depend" }
backend-utils-cache-syscache = { path = "../backend-utils-cache-syscache" }

# Per-type ALTER subroutines that ARE ported (called directly; acyclic).
backend-commands-user = { path = "../backend-commands-user" }
backend-commands-schemacmds = { path = "../backend-commands-schemacmds" }
backend-commands-tablespace = { path = "../backend-commands-tablespace" }
backend-commands-foreigncmds = { path = "../backend-commands-foreigncmds" }
backend-commands-functioncmds = { path = "../backend-commands-functioncmds" }
backend-commands-collationcmds = { path = "../backend-commands-collationcmds" }
backend-commands-opclasscmds = { path = "../backend-commands-opclasscmds" }
backend-rewrite-rewriteDefine = { path = "../backend-rewrite-rewriteDefine" }
backend-utils-adt-acl = { path = "../backend-utils-adt-acl" }
backend-utils-misc-more = { path = "../backend-utils-misc-more" }
backend-utils-init-miscinit = { path = "../backend-utils-init-miscinit" }
backend-catalog-aclchk = { path = "../backend-catalog-aclchk" }
backend-catalog-objectaccess = { path = "../backend-catalog-objectaccess" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }

# Cross-subsystem externals via their owners' -seams crates (owners unported or
# would cycle): the per-type ALTER subroutines living in other command files,
# the generic owner-tuple catalog mutator, the shdepend owner-dep update, the
# publication/subscription post-rename tasks, and MyDatabaseId.
backend-catalog-indexing-seams = { path = "../backend-catalog-indexing-seams" }
backend-catalog-pg-shdepend-seams = { path = "../backend-catalog-pg-shdepend-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-commands-tablecmds-seams = { path = "../backend-commands-tablecmds-seams" }
backend-commands-typecmds-seams = { path = "../backend-commands-typecmds-seams" }
backend-commands-dbcommands-seams = { path = "../backend-commands-dbcommands-seams" }
backend-commands-extension-seams = { path = "../backend-commands-extension-seams" }
backend-commands-trigger-seams = { path = "../backend-commands-trigger-seams" }
backend-commands-policy-seams = { path = "../backend-commands-policy-seams" }
backend-commands-event-trigger-seams = { path = "../backend-commands-event-trigger-seams" }
backend-commands-publicationcmds-seams = { path = "../backend-commands-publicationcmds-seams" }
backend-commands-subscriptioncmds-seams = { path = "../backend-commands-subscriptioncmds-seams" }
backend-replication-logical-worker-seams = { path = "../backend-replication-logical-worker-seams" }
backend-commands-tablespace-globals-seams = { path = "../backend-commands-tablespace-globals-seams" }
backend-utils-adt-arrayfuncs-seams = { path = "../backend-utils-adt-arrayfuncs-seams" }
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }
types-parsenodes = { path = "../types-parsenodes" }

# ProcessUtility / ProcessUtilitySlow RENAME-and-ALTER dispatch arms install the
# ALTER drivers (ExecRenameStmt, ExecAlterObjectDependsStmt, …) into the tcop
# utility out-seams. Pure seam crate (depends only on types/seam-core) — no cycle.
backend-tcop-utility-out-seams = { path = "../backend-tcop-utility-out-seams" }
# `rich_node_to_parse` converts the owned `types_nodes` `object` sub-node of a
# RenameStmt into the `types_parsenodes::Node` the ALTER drivers consume (only
# -seams deps below it — no cycle).
backend-parser-parse-type = { path = "../backend-parser-parse-type" }

# Inward seam this unit owns (consumed by pg_shdepend's shdepReassignOwned).
backend-commands-alter-seams = { path = "../backend-commands-alter-seams" }
