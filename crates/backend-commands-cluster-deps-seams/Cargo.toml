[package]
name = "backend-commands-cluster-deps-seams"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_cluster_deps_seams"
path = "src/lib.rs"

# NOTE (design debt, see audits/backend-commands-cluster.md): this crate
# consolidates the outward seam declarations for several unported owners that
# do not yet have a `-seams` crate (catalog/heap, catalog/toasting,
# commands/vacuum, catalog/pg_inherits, optimizer plan_cluster_use_sort, the
# relcache rd_rel/rd_index accessors, the pg_class/pg_index catalog-row
# read/update pair, the namespace RangeVar maintains-table callback, and the
# heapam pg_index indisclustered scan). Per AGENTS.md these belong in per-owner
# `-seams` crates; they are grouped here to land the cluster logic with loud
# panics, and split to their owners when those units are ported.
[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-rel = { path = "../types-rel" }
types-cluster = { path = "../types-cluster" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
