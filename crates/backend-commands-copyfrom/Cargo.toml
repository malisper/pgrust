[package]
name = "backend-commands-copyfrom"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_copyfrom"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-rel = { path = "../types-rel" }
types-nodes = { path = "../types-nodes" }
types-copy = { path = "../types-copy" }
types-fmgr = { path = "../types-fmgr" }
types-slot = { path = "../types-slot" }
types-parsenodes = { path = "../types-parsenodes" }
types-tableam = { path = "../types-tableam" }

# The COPY-FROM input parser (its only caller is this driver — acyclic).
backend-commands-copyfromparse = { path = "../backend-commands-copyfromparse" }
# This driver's own inward seam crate (installed from init_seams).
backend-commands-copyfrom-seams = { path = "../backend-commands-copyfrom-seams" }

# Direct deps (no cycle): error vocabulary, executor state lifecycle, table AM,
# heap bulk-insert state, index/constraint machinery reachable directly.
backend-utils-error = { path = "../backend-utils-error" }
backend-executor-execUtils = { path = "../backend-executor-execUtils" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-executor-execTuples = { path = "../backend-executor-execTuples" }
backend-access-transam-xact = { path = "../backend-access-transam-xact" }

backend-access-table-tableam = { path = "../backend-access-table-tableam" }
backend-access-heap-heapam = { path = "../backend-access-heap-heapam" }

# libpq frontend: COPY FROM STDIN over the wire (ReceiveCopyBegin CopyInResponse
# + the COPY_FRONTEND CopyData/CopyDone receive leg).
backend-libpq-pqcomm = { path = "../backend-libpq-pqcomm" }
backend-libpq-pqformat = { path = "../backend-libpq-pqformat" }
types-dest = { path = "../types-dest" }
types-stringinfo = { path = "../types-stringinfo" }

# Outward seams (would cycle as direct deps).
backend-commands-copy-seams = { path = "../backend-commands-copy-seams" }
backend-executor-execMain-seams = { path = "../backend-executor-execMain-seams" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
backend-executor-execIndexing-seams = { path = "../backend-executor-execIndexing-seams" }
backend-executor-execPartition-seams = { path = "../backend-executor-execPartition-seams" }
backend-executor-nodeModifyTable-seams = { path = "../backend-executor-nodeModifyTable-seams" }
backend-commands-trigger-seams = { path = "../backend-commands-trigger-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
backend-rewrite-rewritehandler-seams = { path = "../backend-rewrite-rewritehandler-seams" }
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
backend-optimizer-util-clauses-seams = { path = "../backend-optimizer-util-clauses-seams" }
backend-catalog-namespace-seams = { path = "../backend-catalog-namespace-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-utils-activity-backend-progress-seams = { path = "../backend-utils-activity-backend-progress-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
