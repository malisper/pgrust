[package]
name = "backend-commands-copyto"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_copyto"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-rel = { path = "../types-rel" }
types-nodes = { path = "../types-nodes" }
types-copy = { path = "../types-copy" }
types-stringinfo = { path = "../types-stringinfo" }
types-pgstat = { path = "../types-pgstat" }
types-dest = { path = "../types-dest" }

# Direct deps (no cycle): error vocabulary, libpq message assembly, table-slot
# creation, and this crate's own inward seam crate.
backend-utils-error = { path = "../backend-utils-error" }
backend-libpq-pqformat = { path = "../backend-libpq-pqformat" }
backend-access-table-tableam = { path = "../backend-access-table-tableam" }
backend-commands-copyto-seams = { path = "../backend-commands-copyto-seams" }
# The tcop-dest receiver router: CreateCopyDestReceiver registers copyto's
# vtable here (no cycle — dest depends only on copyto-*seams*).
backend-tcop-dest = { path = "../backend-tcop-dest" }

# Outward seams (would cycle as direct deps).
backend-commands-copy-seams = { path = "../backend-commands-copy-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-executor-execMain-seams = { path = "../backend-executor-execMain-seams" }
backend-utils-activity-backend-progress-seams = { path = "../backend-utils-activity-backend-progress-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-libpq-pqcomm-seams = { path = "../backend-libpq-pqcomm-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-parser-analyze-seams = { path = "../backend-parser-analyze-seams" }
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-access-table-tableam-seams = { path = "../backend-access-table-tableam-seams" }
port-path-seams = { path = "../port-path-seams" }
