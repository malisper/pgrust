[package]
name = "backend-commands-explain"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_explain"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-explain = { path = "../types-explain" }
types-nodes = { path = "../types-nodes" }
types-scan = { path = "../types-scan" }
types-snapshot = { path = "../types-snapshot" }

# Sibling EXPLAIN crates (emitters + option parsing).
backend-commands-explain-format = { path = "../backend-commands-explain-format" }

# Inward seam crate this unit installs.
backend-commands-explain-seams = { path = "../backend-commands-explain-seams" }

# Owner seam crates (calls into other owners; panic until installed).
backend-executor-execMain-seams = { path = "../backend-executor-execMain-seams" }
backend-executor-instrument = { path = "../backend-executor-instrument" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
portability-instr-time = { path = "../portability-instr-time" }
