[package]
name = "backend-commands-explain"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_explain"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-explain = { path = "../types-explain" }
types-nodes = { path = "../types-nodes" }
types-scan = { path = "../types-scan" }
types-snapshot = { path = "../types-snapshot" }
types-tuple = { path = "../types-tuple" }

# Sibling EXPLAIN crates (emitters + option parsing).
backend-commands-explain-format = { path = "../backend-commands-explain-format" }

# make_ands_explicit for the qual `Filter:` line (show_scan_qual).
backend-nodes-core = { path = "../backend-nodes-core" }

# Catalog name lookups + identifier quoting for the scan/modify target relation
# names (ExplainTargetRel / explain_get_index_name). No expression deparse, no
# cycle (neither crate depends on explain).
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
backend-utils-adt-ruleutils = { path = "../backend-utils-adt-ruleutils" }

# Inward seam crate this unit installs.
backend-commands-explain-seams = { path = "../backend-commands-explain-seams" }

# ExplainOneUtility CTAS leg: CreateTableAsRelExists (createas-seams).
backend-commands-createas-seams = { path = "../backend-commands-createas-seams" }

# ExplainResultDesc: tcop-utility out-seam this unit installs + the tupdesc
# constructor + the format-option string accessor.
backend-tcop-utility-out-seams = { path = "../backend-tcop-utility-out-seams" }
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }
backend-commands-define-seams = { path = "../backend-commands-define-seams" }

# SQL-EXPLAIN driver: option parsing (state crate), rewriter + planner entries,
# and the tuple-output sink that writes the plan text to the dest receiver.
backend-commands-explain-state = { path = "../backend-commands-explain-state" }
backend-rewrite-rewritehandler-seams = { path = "../backend-rewrite-rewritehandler-seams" }
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
backend-executor-execTuples = { path = "../backend-executor-execTuples" }
# tuplesort_method_name / tuplesort_space_type_name for show_incremental_sort_info.
backend-utils-sort-tuplesort = { path = "../backend-utils-sort-tuplesort" }
# tuplesort_get_stats seam for show_sort_info (plain Sort node EXPLAIN ANALYZE).
backend-utils-sort-tuplesort-seams = { path = "../backend-utils-sort-tuplesort-seams" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
backend-utils-error = { path = "../backend-utils-error" }
types-slot = { path = "../types-slot" }

# es->memory: planner-context create/switch + MemoryContextMemConsumed
# (commands/explain.c ExplainOnePlan's mem_counters leg). The fgram mmgr unit
# carries its own (fgram) error world, bridged to this crate's PgError at the
# call sites.
backend-utils-mmgr-fgram = { path = "../backend-utils-mmgr-fgram" }
mmgr-error = { package = "backend-utils-error-fgram", path = "../backend-utils-error-fgram" }

# Owner seam crates (calls into other owners; panic until installed).
backend-executor-execMain-seams = { path = "../backend-executor-execMain-seams" }
backend-executor-instrument = { path = "../backend-executor-instrument" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
portability-instr-time = { path = "../portability-instr-time" }
