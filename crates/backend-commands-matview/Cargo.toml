[package]
name = "backend-commands-matview"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_matview"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
types-catalog = { path = "../types-catalog" }
types-matview = { path = "../types-matview" }
types-dest = { path = "../types-dest" }
types-nodes = { path = "../types-nodes" }
types-rel = { path = "../types-rel" }
types-tableam = { path = "../types-tableam" }
backend-utils-error = { path = "../backend-utils-error" }

# The DR_transientrel receiver is owned in-crate (mirroring createas's
# DR_intorel): the tcop-dest value-router + the real table-AM / heap
# bulk-insert / xact owners its callbacks reach directly.
backend-tcop-dest = { path = "../backend-tcop-dest" }
backend-access-table-table = { path = "../backend-access-table-table" }
backend-access-table-tableam = { path = "../backend-access-table-tableam" }
backend-access-index-indexam = { path = "../backend-access-index-indexam" }
backend-access-heap-heapam = { path = "../backend-access-heap-heapam" }
backend-access-transam-xact = { path = "../backend-access-transam-xact" }

# The relcache/index-AM/catalog read-bundle de-tokenization: real owners the
# matview body reads off its open relations (no OID-token re-resolution).
backend-utils-cache-relcache = { path = "../backend-utils-cache-relcache" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
backend-utils-activity-pgstat-relation = { path = "../backend-utils-activity-pgstat-relation" }

# ruleutils (quote_qualified_identifier) — unported, seam panics until it lands;
# tablecmds (CheckTableNotInUse) — a real ported owner (takes the real Relation).
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
backend-commands-tablecmds-seams = { path = "../backend-commands-tablecmds-seams" }

# matview's own inward seams (it installs every one of these)
backend-commands-matview-seams = { path = "../backend-commands-matview-seams" }

# outward seams into the (mostly unported) owners matview drives
backend-commands-matview-deps-seams = { path = "../backend-commands-matview-deps-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
