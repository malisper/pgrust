[package]
name = "backend-commands-matview"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_matview"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
types-catalog = { path = "../types-catalog" }
types-matview = { path = "../types-matview" }
backend-utils-error = { path = "../backend-utils-error" }

# matview's own inward seams (it installs every one of these)
backend-commands-matview-seams = { path = "../backend-commands-matview-seams" }

# outward seams into the (mostly unported) owners matview drives
backend-commands-matview-deps-seams = { path = "../backend-commands-matview-deps-seams" }
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
