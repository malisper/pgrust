[package]
name = "backend-commands-proclang"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_proclang"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-catalog = { path = "../types-catalog" }
types-nodes = { path = "../types-nodes" }
types-storage = { path = "../types-storage" }

# Catalog write + dependency recording (direct deps, no cycle: proclang is a
# leaf command that nothing in the catalog layer depends on).
backend-access-table-table = { path = "../backend-access-table-table" }
backend-catalog-dependency = { path = "../backend-catalog-dependency" }
backend-catalog-pg-depend = { path = "../backend-catalog-pg-depend" }
backend-catalog-pg-shdepend = { path = "../backend-catalog-pg-shdepend" }

# Own seam crate (installed by init_seams).
backend-commands-proclang-seams = { path = "../backend-commands-proclang-seams" }

# Cross-cycle externals, consumed through the owners' seam crates.
backend-catalog-indexing-seams = { path = "../backend-catalog-indexing-seams" }
backend-catalog-objectaccess-seams = { path = "../backend-catalog-objectaccess-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-utils-misc-superuser-seams = { path = "../backend-utils-misc-superuser-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-parser-parse-func-seams = { path = "../backend-parser-parse-func-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
