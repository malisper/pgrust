[package]
name = "backend-commands-vacuum"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_vacuum"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-vacuum = { path = "../types-vacuum" }
types-tuple = { path = "../types-tuple" }
types-storage = { path = "../types-storage" }
types-rel = { path = "../types-rel" }
types-nodes = { path = "../types-nodes" }
types-parsenodes = { path = "../types-parsenodes" }
types-cluster = { path = "../types-cluster" }

backend-utils-error = { path = "../backend-utils-error" }
# GUC `conf->variable` slots: vacuum.c owns these globals, so it installs the
# GucVarAccessors over its own backing store.
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# own seam crate (inward)
backend-commands-vacuum-seams = { path = "../backend-commands-vacuum-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }

# ProcessUtility dispatch arm (installs the VacuumStmt forwarding seam).
backend-tcop-utility-out-seams = { path = "../backend-tcop-utility-out-seams" }

# owner seam crates (outward / inward-install targets)
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }
backend-access-common-tidstore-seams = { path = "../backend-access-common-tidstore-seams" }
backend-commands-analyze-seams = { path = "../backend-commands-analyze-seams" }
backend-commands-define-seams = { path = "../backend-commands-define-seams" }
backend-parser-small1-seams = { path = "../backend-parser-small1-seams" }

# L1 re-home targets (rebind to already-installed owners)
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-access-table-table-seams = { path = "../backend-access-table-table-seams" }
backend-commands-async-seams = { path = "../backend-commands-async-seams" }
backend-commands-cluster-seams = { path = "../backend-commands-cluster-seams" }
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }
backend-storage-lmgr-lwlock-seams = { path = "../backend-storage-lmgr-lwlock-seams" }
backend-storage-ipc-procarray-seams = { path = "../backend-storage-ipc-procarray-seams" }
backend-access-transam-varsup-seams = { path = "../backend-access-transam-varsup-seams" }
backend-catalog-pg-inherits-seams = { path = "../backend-catalog-pg-inherits-seams" }
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }

# L4 export+rehome targets (xact owners)
backend-access-transam-clog-seams = { path = "../backend-access-transam-clog-seams" }
backend-access-transam-commit-ts-seams = { path = "../backend-access-transam-commit-ts-seams" }
backend-access-transam-multixact-seams = { path = "../backend-access-transam-multixact-seams" }
