[package]
name = "backend-commands-vacuumparallel"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_vacuumparallel"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-vacuum = { path = "../types-vacuum" }
types-storage = { path = "../types-storage" }
types-dsa = { path = "../types-dsa" }
types-execparallel = { path = "../types-execparallel" }

backend-utils-error = { path = "../backend-utils-error" }

# own seam crate is the shared vacuum hub; inward consumer contract lives in
# the vacuumlazy seam crate.
backend-commands-vacuum-seams = { path = "../backend-commands-vacuum-seams" }
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }

# parallel-query infrastructure seams.
backend-access-transam-parallel = { path = "../backend-access-transam-parallel" }
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }

# Outward-dependency owners for the vacuumparallel.c `*_pv` seams whose
# subsystems have landed with real value-typed providers. Installed as thin
# marshal+delegate wrappers from this crate's init_seams().
backend-access-common-tidstore = { path = "../backend-access-common-tidstore" }
backend-executor-instrument = { path = "../backend-executor-instrument" }
backend-tcop-postgres = { path = "../backend-tcop-postgres" }
backend-utils-init-small = { path = "../backend-utils-init-small" }
backend-utils-activity-status = { path = "../backend-utils-activity-status" }
backend-utils-activity-small = { path = "../backend-utils-activity-small" }

# `GetAccessStrategyWithSize`/`FreeAccessStrategy` (freelist.c) — the worker's
# own VACUUM ring.
backend-storage-buffer-support = { path = "../backend-storage-buffer-support" }
# `MyProc->statusFlags` PROC_IN_VACUUM accessor (proc.c).
backend-storage-lmgr-proc = { path = "../backend-storage-lmgr-proc" }

# Value-typed Relation reopen + accessors for the 6 worker/leader seams:
#  * `table_open(mcx, oid, lockmode)` — the worker/leader Relation reopen;
#  * `GetIndexAmRoutineByAmId` — the index-AM options;
#  * `RelationGetNumberOfBlocks` — relcache/smgr block count.
# (`get_namespace_name` rides the vacuumlazy seam hub already depended on.)
backend-access-table-table-seams = { path = "../backend-access-table-table-seams" }
backend-access-index-amapi-seams = { path = "../backend-access-index-amapi-seams" }
backend-access-index-indexam-seams = { path = "../backend-access-index-indexam-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
