[package]
name = "backend-commands-variable"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_variable"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-guc = { path = "../types-guc" }
types-datetime = { path = "../types-datetime" }
common-string = { path = "../common-string" }
backend-utils-error = { path = "../backend-utils-error" }

# GUC framework: error-recording helpers + the typed hook/var slots this unit
# installs into. (Acyclic: guc/guc-tables do not depend on this crate.)
backend-utils-misc-guc = { path = "../backend-utils-misc-guc" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# This unit's own cross-subsystem adapter seams.
backend-commands-variable-seams = { path = "../backend-commands-variable-seams" }

# Owner seam crates this unit calls into directly.
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-parallel-seams = { path = "../backend-access-transam-parallel-seams" }
backend-utils-adt-acl-seams = { path = "../backend-utils-adt-acl-seams" }
backend-utils-misc-superuser-seams = { path = "../backend-utils-misc-superuser-seams" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
backend-utils-mb-mbutils = { path = "../backend-utils-mb-mbutils" }
common-encnames-seams = { path = "../common-encnames-seams" }
common-extra-encnames-fgram = { path = "../common-extra-encnames-fgram" }
common-path-seams = { path = "../common-path-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }

# Ported owners this unit's adapter seams delegate to in init_seams().
backend-timezone-pgtz = { path = "../backend-timezone-pgtz" }
backend-timezone-localtime = { path = "../backend-timezone-localtime" }
# timezone_abbreviations: load_tzoffsets (tzparser.c) + InstallTimeZoneAbbrevs
# (datetime.c) — fused into the load_and_install_tz_abbrevs owner seam.
backend-utils-misc-timeout = { path = "../backend-utils-misc-timeout" }
backend-utils-adt-datetime = { path = "../backend-utils-adt-datetime" }
state-pgtz = { path = "../state-pgtz" }
backend-utils-time-snapmgr = { path = "../backend-utils-time-snapmgr" }
backend-utils-init-miscinit = { path = "../backend-utils-init-miscinit" }
backend-utils-init-small = { path = "../backend-utils-init-small" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-access-transam-xlogprefetcher = { path = "../backend-access-transam-xlogprefetcher" }
backend-postmaster-syslogger = { path = "../backend-postmaster-syslogger" }
backend-libpq-pqcomm = { path = "../backend-libpq-pqcomm" }
