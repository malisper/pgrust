[package]
name = "backend-commands-view"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_commands_view"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-rel = { path = "../types-rel" }
types-nodes = { path = "../types-nodes" }
types-catalog = { path = "../types-catalog" }
types-tuple = { path = "../types-tuple" }
types-storage = { path = "../types-storage" }

# Error vocabulary.
backend-utils-error = { path = "../backend-utils-error" }

# This crate's seam crate (inward `define_view` + the outward tablecmds /
# rewriteHandler seams it owns the declaration of).
backend-commands-view-seams = { path = "../backend-commands-view-seams" }

# Direct deps (no cycle): node construction / inspection, the relcache/table
# access layer, the rewriter's `DefineQueryRewrite`, parse analysis, the
# temp-relation walker, the catalog/namespace lookups, dependency recording,
# format-type / collation lookups, and `CommandCounterIncrement`.
backend-nodes-core = { path = "../backend-nodes-core" }
backend-access-common-relation = { path = "../backend-access-common-relation" }
backend-rewrite-rewriteDefine = { path = "../backend-rewrite-rewriteDefine" }
backend-parser-analyze = { path = "../backend-parser-analyze" }
backend-parser-relation = { path = "../backend-parser-relation" }
backend-catalog-namespace = { path = "../backend-catalog-namespace" }
backend-catalog-pg-depend = { path = "../backend-catalog-pg-depend" }
backend-utils-adt-format-type = { path = "../backend-utils-adt-format-type" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
backend-access-transam-xact = { path = "../backend-access-transam-xact" }

# Outward seam: `CheckTableNotInUse` (tablecmds.c) is declared on tablecmds' own
# seam crate; the replace path calls it across the cycle.
backend-commands-tablecmds-seams = { path = "../backend-commands-tablecmds-seams" }
