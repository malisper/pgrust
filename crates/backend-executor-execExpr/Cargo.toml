[package]
name = "backend-executor-execExpr"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_execExpr"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
# ACL vocabulary (AclResult / ACL_EXECUTE) the per-column ACL_EXECUTE check in
# the grouping/param equality builders compares against.
types-acl = { path = "../types-acl" }
# Seam crate this unit OWNS (installs every decl from its own init_seams()).
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
# Outward seams routed through owner crates (panic until the owner lands):
#   execExprInterp (the cycle partner: ExecReadyInterpretedExpr + eval dispatch)
#   execUtils (ResetExprContext)
backend-executor-execExprInterp-seams = { path = "../backend-executor-execExprInterp-seams" }
backend-executor-execUtils-seams = { path = "../backend-executor-execUtils-seams" }
# execTuples owns the TupleTableSlot accessors (slot_getattr / natts /
# ExecClearTuple) the SubPlan projection-slot seams route through.
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
# lsyscache owns the catalog operator lookups (get_compatible_hash_operators /
# get_opcode / get_op_hash_functions) the hashed-subplan combining-op
# resolution routes through.
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
# fmgr_info(funcid) -> FmgrInfo (fn_strict/fn_stats/fn_addr) for the Func / agg /
# hash / IOcoerce / rowcompare / minmax / scalararrayop opcode selection and
# fn_addr stamp (ExecInitFunc and friends read flinfo->fn_strict after lookup).
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
# nodeFuncs owns exprType()/exprTypmod()/exprCollation() — pure node-type
# inspections ExecBuildProjectionInfo / ExecBuildUpdateProjection read to pick
# the ASSIGN_TMP[_MAKE_RO] opcode and to run the ExecCheckPlanOutput-equivalent
# type-mismatch checks.
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }
# bitmapset owns bms_add_member/bms_is_member — ExecBuildUpdateProjection builds
# the assignedCols set to drive the old-column copy-over loop.
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
# aclchk owns object_aclcheck / aclcheck_error — ExecBuildGroupingEqual /
# ExecBuildParamSetEqual check ACL_EXECUTE on each per-column equality function
# (object_aclcheck(ProcedureRelationId, foid, GetUserId(), ACL_EXECUTE)).
backend-catalog-aclchk-seams = { path = "../backend-catalog-aclchk-seams" }
# objectaccess owns the object_access_hook gate — the InvokeFunctionExecuteHook
# macro those builders run after the ACL check fires only when a hook is present.
backend-catalog-objectaccess-seams = { path = "../backend-catalog-objectaccess-seams" }
# miscinit owns GetUserId() — the role the per-function ACL_EXECUTE check uses.
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
