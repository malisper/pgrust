[package]
name = "backend-executor-execExprInterp"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_execExprInterp"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
mcx = { path = "../mcx" }
# item_pointer_bytes: build the ctid Datum for EEOP_*_SYSVAR ctid fetch.
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }

# Own seam crate: the interpreter installs the dispatch entry points
# (ExecReadyInterpretedExpr / ExecEvalExprSwitchContext) that execExpr + the
# executor nodes reach through these seams.
backend-executor-execExprInterp-seams = { path = "../backend-executor-execExprInterp-seams" }

# Seams into unported owners the interpreter calls.
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
# AggStateData + AggStatePer* now live in their real owner nodeAgg (relocated out
# of types-nodes for the logtape registry retire). nodeAgg deps only the SEAM
# crates of execExpr*/execProcnode etc., not these owner crates, so no cycle.
backend-executor-nodeAgg = { path = "../backend-executor-nodeAgg" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
# MakeExpandedObjectReadOnlyInternal (expandeddatum.c) for EEOP_ASSIGN_TMP_MAKE_RO.
backend-utils-adt-misc2-seams = { path = "../backend-utils-adt-misc2-seams" }
backend-executor-nodeSubplan-seams = { path = "../backend-executor-nodeSubplan-seams" }
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-sort-tuplesort-seams = { path = "../backend-utils-sort-tuplesort-seams" }
backend-utils-adt-datum-seams = { path = "../backend-utils-adt-datum-seams" }
# Hashed-SAOP build path: deconstruct the array const and read its element
# type's storage attributes (arrayfuncs / lsyscache owners).
backend-utils-adt-arrayfuncs-seams = { path = "../backend-utils-adt-arrayfuncs-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
# jsonb subscripting execution bodies (jsonbsubs.c) reached per-callback.
backend-utils-adt-jsonbsubs-seams = { path = "../backend-utils-adt-jsonbsubs-seams" }
# SQL/JSON path evaluation (jsonpath_exec.c) for EEOP_JSONEXPR_PATH:
# JsonPathExists/Query/Value + JsonbValueToJsonb + json_populate_type coercion.
# These are leaf adt units with no executor deps, so the edges are acyclic.
backend-utils-adt-jsonpath-exec = { path = "../backend-utils-adt-jsonpath-exec" }
backend-utils-adt-jsonb-util = { path = "../backend-utils-adt-jsonb-util" }
backend-utils-adt-jsonb = { path = "../backend-utils-adt-jsonb" }
backend-utils-adt-numeric = { path = "../backend-utils-adt-numeric" }
backend-utils-adt-jsonfuncs = { path = "../backend-utils-adt-jsonfuncs" }
# EEOP_SQLVALUEFUNCTION date/time arms: GetSQLCurrent*/GetSQLLocal* helpers
# (the role/user/catalog/schema arms go through function_call_invoke_datum).
backend-utils-adt-datetime = { path = "../backend-utils-adt-datetime" }
# xml.c value workers (xmlconcat/xmlserialize/xmlparse/xmlpi/xmlroot/
# xml_is_document) for EEOP_XMLEXPR. A leaf adt unit (types-* only deps).
backend-utils-adt-xml = { path = "../backend-utils-adt-xml" }
# exprType() of XMLELEMENT content args (seam crate; acyclic).
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }
types-jsonb = { path = "../types-jsonb" }
