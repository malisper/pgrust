[package]
name = "backend-executor-execJunk"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_execJunk"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
# execTuples owns the cleaned-descriptor computation (ExecCleanTypeFromTL); a
# direct dep is acyclic (execTuples does not reach execJunk).
backend-executor-execTuples = { path = "../backend-executor-execTuples" }
# execTuples owns the slot pool ops (ExecSetSlotDescriptor, the virtual-slot
# alloc/fill/store, slot_getattr); reached through its seam crate (pool-id
# payload ops are still seam-and-panic until the slot payload model is wired
# into the EState pool).
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
