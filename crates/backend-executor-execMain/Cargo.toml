[package]
name = "backend-executor-execMain"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_execMain"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
types-error = { path = "../types-error" }
types-core = { path = "../types-core" }
types-execparallel = { path = "../types-execparallel" }
backend-executor-execParallel-support-seams = { path = "../backend-executor-execParallel-support-seams" }
types-nodes = { path = "../types-nodes" }
types-acl = { path = "../types-acl" }
types-tuple = { path = "../types-tuple" }
types-snapshot = { path = "../types-snapshot" }
types-scan = { path = "../types-scan" }
types-tableam = { path = "../types-tableam" }
mcx = { path = "../mcx" }

# Driver-loop dependencies: the node-dispatch seams (ExecInitNode / ExecProcNode
# / ExecEndNode / ExecShutdownNode), the EState helpers (ExecInitRangeTable /
# ExecResetTupleTable / ExecClose*Relations + ResetExprContext), the junk filter
# (ExecInitJunkFilter / ExecFilterJunk), and the DestReceiver dispatch.
backend-executor-execProcnode-seams = { path = "../backend-executor-execProcnode-seams" }
backend-executor-execUtils = { path = "../backend-executor-execUtils" }
backend-executor-execUtils-seams = { path = "../backend-executor-execUtils-seams" }
backend-executor-execJunk = { path = "../backend-executor-execJunk" }
backend-tcop-dest-seams = { path = "../backend-tcop-dest-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }

# Seam crate this unit OWNS (the executor-driver / EvalPlanQual / constraint /
# CteScan-leader surface). F0a installs only the self-contained
# `exec_check_permissions_select`; the rest stay declared-but-uninstalled
# (mirror-and-panic) until the matching family of #166 lands — the unit is
# CATALOG `needs-decomp`, so the seam-install recurrence guard exempts them.
backend-executor-execMain-seams = { path = "../backend-executor-execMain-seams" }

# ExecCheckPermissions ACL/get-rel dependencies (all landed owners).
backend-catalog-aclchk-seams = { path = "../backend-catalog-aclchk-seams" }
backend-catalog-objectaddress-seams = { path = "../backend-catalog-objectaddress-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }

# ExecutorRewind's ExecReScan(planstate) dispatch.
backend-executor-execAmi-seams = { path = "../backend-executor-execAmi-seams" }

# ExecSupportsBackwardScan body lives in execAmi (execAmi.c); execMain owns the
# execMain-seams `exec_supports_backward_scan` decl (its caller, portalcmds,
# passes the whole PlannedStmt) and delegates to execAmi's planTree walker.
# execAmi does not depend on execMain(-seams), so this is acyclic.
backend-executor-execAmi = { path = "../backend-executor-execAmi" }

# ExecUpdateLockMode reads the relation's key-column bitmap via the relcache.
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
# ExecGetAllUpdatedCols / bms_overlap for ExecUpdateLockMode.
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
