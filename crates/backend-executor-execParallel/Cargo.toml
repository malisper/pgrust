[package]
name = "backend-executor-execParallel"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_execParallel"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-storage = { path = "../types-storage" }
types-scan = { path = "../types-scan" }
types-execparallel = { path = "../types-execparallel" }

backend-executor-execParallel-seams = { path = "../backend-executor-execParallel-seams" }
backend-executor-execParallel-support-seams = { path = "../backend-executor-execParallel-support-seams" }
backend-access-transam-parallel-seams = { path = "../backend-access-transam-parallel-seams" }
backend-storage-ipc-shm-mq-seams = { path = "../backend-storage-ipc-shm-mq-seams" }
backend-utils-mmgr-dsa-seams = { path = "../backend-utils-mmgr-dsa-seams" }
backend-executor-tqueue-seams = { path = "../backend-executor-tqueue-seams" }

# Executor driver + recursive-teardown/tuple-bound (called directly — owned).
backend-executor-execMain = { path = "../backend-executor-execMain" }
backend-executor-execProcnode = { path = "../backend-executor-execProcnode" }

# Per-node parallel methods — called directly on the owned node-state structs
# (the F0a owned parallel fns), mirroring execProcnode's direct ExecEnd* calls.
backend-executor-nodeSeqscan = { path = "../backend-executor-nodeSeqscan" }
backend-executor-nodeIndexscan = { path = "../backend-executor-nodeIndexscan" }
backend-executor-nodeIndexonlyscan = { path = "../backend-executor-nodeIndexonlyscan" }
backend-executor-nodeBitmapIndexscan = { path = "../backend-executor-nodeBitmapIndexscan" }
backend-executor-nodeAppend = { path = "../backend-executor-nodeAppend" }
backend-executor-nodeBitmapHeapscan = { path = "../backend-executor-nodeBitmapHeapscan" }
backend-executor-nodeHashjoin = { path = "../backend-executor-nodeHashjoin" }
backend-executor-nodeHash = { path = "../backend-executor-nodeHash" }
backend-executor-nodeSort = { path = "../backend-executor-nodeSort" }
backend-executor-nodeMemoize = { path = "../backend-executor-nodeMemoize" }
