[package]
name = "backend-executor-execPartition"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_execPartition"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-nodes = { path = "../types-nodes" }
types-rel = { path = "../types-rel" }
types-tuple = { path = "../types-tuple" }

# Seam crates for the unported owners this unit calls (bodies dispatch through
# these; they panic until the owner lands).
backend-partitioning-core-seams = { path = "../backend-partitioning-core-seams" }
backend-partitioning-partbounds-seams = { path = "../backend-partitioning-partbounds-seams" }
backend-partitioning-partprune-seams = { path = "../backend-partitioning-partprune-seams" }
backend-utils-cache-partcache-seams = { path = "../backend-utils-cache-partcache-seams" }
backend-catalog-partition-seams = { path = "../backend-catalog-partition-seams" }
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-executor-execMain-seams = { path = "../backend-executor-execMain-seams" }
backend-executor-nodeModifyTable-seams = { path = "../backend-executor-nodeModifyTable-seams" }
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-adt-acl-seams = { path = "../backend-utils-adt-acl-seams" }
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }

# Direct dependency (no cycle): execUtils owns CreateExprContext and
# ExecGetRangeTableRelation, both consumed by the pruning family.
backend-executor-execUtils = { path = "../backend-executor-execUtils" }
