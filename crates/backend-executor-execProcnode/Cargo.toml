[package]
name = "backend-executor-execProcnode"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_execProcnode"
path = "src/lib.rs"

[dependencies]
pgrust-trace = { path = "../pgrust-trace" }
seam-core = { path = "../seam-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
# MultiExecProcNode's owned seam returns a TIDBitmap (the lone landed multiexec
# consumer, nodeBitmapHeapscan, always demands one).
types-tidbitmap = { path = "../types-tidbitmap" }
mcx = { path = "../mcx" }
# check_stack_depth() seam (utils/misc/stack_depth.c), unported owner.
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }
# Seam crate this unit OWNS (installs every decl from its own init_seams()).
backend-executor-execProcnode-seams = { path = "../backend-executor-execProcnode-seams" }
# Landed node units this dispatch routes ExecInitNode/ExecEndNode (and
# MultiExecProcNode) to directly. Each owner depends only on
# backend-executor-execProcnode-seams (the seam crate), never on this crate, so
# routing to them directly is acyclic — exactly as for nodeLimit.
backend-executor-nodeLimit = { path = "../backend-executor-nodeLimit" }
backend-executor-nodeAppend = { path = "../backend-executor-nodeAppend" }
backend-executor-nodeMergeAppend = { path = "../backend-executor-nodeMergeAppend" }
backend-executor-nodeSeqscan = { path = "../backend-executor-nodeSeqscan" }
backend-executor-nodeIndexonlyscan = { path = "../backend-executor-nodeIndexonlyscan" }
backend-executor-nodeTableFuncscan = { path = "../backend-executor-nodeTableFuncscan" }
backend-executor-nodeForeignscan = { path = "../backend-executor-nodeForeignscan" }
backend-executor-nodeNestloop = { path = "../backend-executor-nodeNestloop" }
backend-executor-nodeMergejoin = { path = "../backend-executor-nodeMergejoin" }
backend-executor-nodeGather = { path = "../backend-executor-nodeGather" }
backend-executor-nodeHashjoin = { path = "../backend-executor-nodeHashjoin" }
backend-executor-nodeMaterial = { path = "../backend-executor-nodeMaterial" }
backend-executor-nodeSort = { path = "../backend-executor-nodeSort" }
backend-executor-nodeIncrementalSort = { path = "../backend-executor-nodeIncrementalSort" }
backend-executor-nodeMemoize = { path = "../backend-executor-nodeMemoize" }
backend-executor-nodeHash = { path = "../backend-executor-nodeHash" }
backend-executor-nodeResult = { path = "../backend-executor-nodeResult" }
backend-executor-nodeProjectSet = { path = "../backend-executor-nodeProjectSet" }
backend-executor-nodeModifyTable = { path = "../backend-executor-nodeModifyTable" }
backend-executor-nodeRecursiveunion = { path = "../backend-executor-nodeRecursiveunion" }
backend-executor-nodeBitmapAnd = { path = "../backend-executor-nodeBitmapAnd" }
backend-executor-nodeIndexscan = { path = "../backend-executor-nodeIndexscan" }
backend-executor-nodeBitmapIndexscan = { path = "../backend-executor-nodeBitmapIndexscan" }
backend-executor-nodeSubqueryscan = { path = "../backend-executor-nodeSubqueryscan" }
backend-executor-nodeValuesscan = { path = "../backend-executor-nodeValuesscan" }
backend-executor-nodeCtescan = { path = "../backend-executor-nodeCtescan" }
backend-executor-nodeCustom = { path = "../backend-executor-nodeCustom" }
backend-executor-nodeGroup = { path = "../backend-executor-nodeGroup" }
backend-executor-nodeAgg = { path = "../backend-executor-nodeAgg" }
backend-executor-nodeUnique = { path = "../backend-executor-nodeUnique" }
backend-executor-nodeGatherMerge = { path = "../backend-executor-nodeGatherMerge" }
backend-executor-nodeSetOp = { path = "../backend-executor-nodeSetOp" }
backend-executor-nodeBitmapOr = { path = "../backend-executor-nodeBitmapOr" }
backend-executor-nodeBitmapHeapscan = { path = "../backend-executor-nodeBitmapHeapscan" }
backend-executor-nodeTidscan = { path = "../backend-executor-nodeTidscan" }
backend-executor-nodeTidrangescan = { path = "../backend-executor-nodeTidrangescan" }
backend-executor-nodeWindowAgg = { path = "../backend-executor-nodeWindowAgg" }
backend-executor-nodeWorktablescan = { path = "../backend-executor-nodeWorktablescan" }
# ExecInitSubPlan (nodeSubplan.c) — the ExecInitNode initPlan walk (#328) routes
# each Plan.initPlan SubPlan to its ExecInitSubPlan. Acyclic: nodeSubplan depends
# only on the seam crates, never on this dispatch crate.
backend-executor-nodeSubplan = { path = "../backend-executor-nodeSubplan" }
# Per-owner seam crates for the unported neighbours this dispatch routes through
# (loud panic until each owner wires its init_seams()).
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
backend-executor-execAmi-seams = { path = "../backend-executor-execAmi-seams" }
backend-executor-instrument-seams = { path = "../backend-executor-instrument-seams" }
# cte_leader_is_self / ExecShutdown* / planstate_tree_walker seams routed by the
# ExecEndCteScan leader test and ExecShutdownNode walker (loud panic until owner).
backend-executor-execMain-seams = { path = "../backend-executor-execMain-seams" }
