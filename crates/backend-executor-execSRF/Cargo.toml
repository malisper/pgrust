[package]
name = "backend-executor-execSRF"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_execSRF"
path = "src/lib.rs"

[dependencies]
# The set-returning-function evaluation seams this owner installs.
backend-executor-execSRF-seams = { path = "../backend-executor-execSRF-seams" }

# Outward calls through per-owner seam crates.
# Argument-expression compile/eval (execExpr/execExprInterp), result-type and
# expression-type lookups (nodes-core / lsyscache), descriptor construction
# (tupdesc), the materialized tuplestore (sort-storage), the cross-call SRF
# call-frame machinery (funcapi: init/per/end MultiFuncCall), and the work_mem
# budget (init-small).
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }
backend-utils-sort-storage-seams = { path = "../backend-utils-sort-storage-seams" }
# Materialize-mode tuplestore drain: the funcResultSlot pool slot
# (ExecInitExtraTupleSlot), per-row fetch (slot_getattr /
# ExecFetchSlotHeapTupleDatum) and descriptor copy.
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
# check_stack_depth (postgres.c) guarding the targetlist-SRF recursion.
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
# By-OID fmgr dispatch fall-through for a USER (plpgsql/SQL) SETOF function:
# `function_call_invoke_datum` resolves the OID and routes to fmgr_sql /
# plpgsql_call_handler, threading the live materialize sink (types_fmgr::mat_srf).
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }

# The generate_series(int4/int8) SRFs registered in the executor-frame table:
# their value cores + the value-per-call funcapi machinery.
backend-utils-fmgr-funcapi = { path = "../backend-utils-fmgr-funcapi" }
backend-utils-adt-int = { path = "../backend-utils-adt-int" }
backend-utils-adt-int8 = { path = "../backend-utils-adt-int8" }
# generate_series(timestamp/timestamptz) value cores: interval sign / finite
# test, timestamp comparison, and the timestamp/timestamptz + interval
# arithmetic (incl. the named-zone variant).
backend-utils-adt-datetime = { path = "../backend-utils-adt-datetime" }
types-datetime = { path = "../types-datetime" }

# pg_input_error_info(text, text) RETURNS record (OID 6211): its soft-error
# value core (misc), the text<->cstring varlena marshalling, and heap tuple
# form/deform for the composite result + the composite table-function store path.
backend-utils-adt-misc = { path = "../backend-utils-adt-misc" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }

# unnest(anyarray) (OID 2331) + generate_subscripts(anyarray, int4 [, bool])
# (OIDs 1191/1192): the value-per-call SRF element-deconstruction / subscript
# cores (array_unnest / generate_subscripts) and the ArrayElementDatum carrier.
backend-utils-adt-arrayfuncs = { path = "../backend-utils-adt-arrayfuncs" }
types-array = { path = "../types-array" }

# regexp_split_to_table(text, text [, text]) (OIDs 2765/2766): the glob match +
# split value core (regexp_split_to_table / build_regexp_split_result), and
# regexp_matches(text, text [, text]) (OIDs 2763/2764): the per-match text[]
# build core (setup_regexp_matches / build_regexp_match_result).
backend-utils-adt-regexp = { path = "../backend-utils-adt-regexp" }

# generate_series(numeric, numeric [, numeric]) (OIDs 3259/3260): the numeric
# value core (set_var_from_num / cmp_var / add_var / make_result) over NumericVar.
backend-utils-adt-numeric = { path = "../backend-utils-adt-numeric" }
types-numeric = { path = "../types-numeric" }

# string_to_table(text, text [, text]) (OIDs 6160/6161): the split-field value
# core (split_text) emitting one text field per call.
backend-utils-adt-varlena = { path = "../backend-utils-adt-varlena" }

# unnest(tsvector) (OID 3322): the (lexeme, positions, weights) row materializer
# (tsvector_unnest), and its int2[] / text[] (`"char"[]`) array constructors.
backend-utils-adt-tsvector-core = { path = "../backend-utils-adt-tsvector-core" }
backend-utils-adt-array-more-seams = { path = "../backend-utils-adt-array-more-seams" }
backend-utils-adt-xid8funcs = { path = "../backend-utils-adt-xid8funcs" }

# json_array_elements / json_array_elements_text / json_object_keys (OIDs
# 3955/3969/3957): the json (text) SAX-callback collection cores (elements_worker
# / json_object_keys_worker).
backend-utils-adt-jsonfuncs = { path = "../backend-utils-adt-jsonfuncs" }

# jsonb_path_query / _tz (OIDs 4006/1179): the set-returning jsonpath query value
# cores (jsonb_path_query[_tz] -> Vec<jsonb image>), materialized one row per item.
backend-utils-adt-jsonpath-exec = { path = "../backend-utils-adt-jsonpath-exec" }

# unnest(anymultirange) (OID 1293): the member-range materializer
# (multirange_unnest_images) over multirange_get_typcache + multirange_get_range.
backend-utils-adt-multirangetypes = { path = "../backend-utils-adt-multirangetypes" }

# pg_get_multixact_members(xid) (OID 3819): the (xid, mode) member resolver
# (GetMultiXactIdMembers + mxstatus_to_string).
backend-access-transam-multixact = { path = "../backend-access-transam-multixact" }

# pg_listening_channels() (OID 3035): the listenChannels collector
# (pg_listening_channels_rows).
backend-commands-async = { path = "../backend-commands-async" }

# pg_options_to_table(text[]) (OID 2289): the (option_name, option_value)
# materialize-mode SRF body (untransformRelOptions + materialized_srf_putvalues).
backend-foreign-foreign = { path = "../backend-foreign-foreign" }

# pg_prepared_statement() (OID 2510): the prepared-statement catalog materialize-
# mode SRF body (the PREPARED_QUERIES hash scan + materialized_srf_putvalues).
backend-commands-prepare = { path = "../backend-commands-prepare" }

# pg_control_system/checkpoint/recovery/init (OIDs 3441-3444): the pg_controldata.c
# control-file projection cores (typed result structs), and pg_stat_file /
# pg_stat_file_1arg (OIDs 3307/2623): the genfile.c stat → 6-column record core.
# These return a single composite row through the executor-frame
# (ExprSingleResult) path, like the json_to_record family.
backend-utils-misc-more = { path = "../backend-utils-misc-more" }
backend-utils-adt-misc2 = { path = "../backend-utils-adt-misc2" }
# pg_event_trigger_dropped_objects() (OID 3566): the sql_drop SRF core lives in
# its event_trigger.c owner; this crate drives it over the executor frame.
backend-commands-event-trigger = { path = "../backend-commands-event-trigger" }
# pg_get_catalog_foreign_keys() (OID 6159): the sys_fk_relationships[] render core
# (its fk/pk text[] columns built via construct_text_array).
# pg_partition_tree/pg_partition_ancestors (OIDs 3423/3425): the partition-tree
# traversal cores (find_all_inheritors / get_partition_ancestors) + the
# relkind/relispartition guard seams (syscache / lsyscache).
backend-catalog-pg-inherits-seams = { path = "../backend-catalog-pg-inherits-seams" }
backend-catalog-partition-seams = { path = "../backend-catalog-partition-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
types-storage = { path = "../types-storage" }
# pg_get_shmem_allocations_numa() (OID 4100): the materialize-mode NUMA
# shmem-allocations SRF core (over the executor frame) + the huge_pages_status
# GUC the body reads as a global.
backend-storage-ipc-shmem = { path = "../backend-storage-ipc-shmem" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
# pg_prepared_xact() (OID 1065): the locked snapshot-and-project core over the
# live TwoPhaseState (pg_prepared_xact_rows / with_twophase_state).
backend-access-transam-twophase = { path = "../backend-access-transam-twophase" }
# aclexplode(aclitem[]) (OID 1689): the per-bit privilege expansion core
# (acl_ops::aclexplode) + the AclItem image decoder.
backend-utils-adt-acl = { path = "../backend-utils-adt-acl" }
types-acl = { path = "../types-acl" }

# Shared type stack + allocator + error.
allocator-api2 = { version = "0.2", default-features = false, features = ["alloc"] }
backend-utils-error = { path = "../backend-utils-error" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-fmgr = { path = "../types-fmgr" }
types-datum = { path = "../types-datum" }
types-nodes = { path = "../types-nodes" }
types-tuple = { path = "../types-tuple" }
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }

[dev-dependencies]
