[package]
name = "backend-executor-functions"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_functions"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-error = { path = "../types-error" }
types-core = { path = "../types-core" }
types-datum = { path = "../types-datum" }
types-fmgr = { path = "../types-fmgr" }
types-nodes = { path = "../types-nodes" }
types-parsenodes = { path = "../types-parsenodes" }
types-tuple = { path = "../types-tuple" }
types-dest = { path = "../types-dest" }
types-snapshot = { path = "../types-snapshot" }
types-scan = { path = "../types-scan" }
types-slot = { path = "../types-slot" }

# own inward seam crate (installed from init_seams)
backend-executor-functions-seams = { path = "../backend-executor-functions-seams" }

# direct deps (no cycle: none of these depend on this crate or its seam)
backend-executor-execMain = { path = "../backend-executor-execMain" }
backend-executor-execTuples = { path = "../backend-executor-execTuples" }
backend-parser-analyze = { path = "../backend-parser-analyze" }
backend-parser-driver = { path = "../backend-parser-driver" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-tcop-dest = { path = "../backend-tcop-dest" }

# outward seam crates (cyclic owners)
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
backend-rewrite-rewritehandler-seams = { path = "../backend-rewrite-rewritehandler-seams" }
backend-optimizer-util-clauses-seams = { path = "../backend-optimizer-util-clauses-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
