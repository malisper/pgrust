[package]
name = "backend-executor-nodeBitmapHeapscan"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_nodeBitmapHeapscan"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
types-rel = { path = "../types-rel" }
types-tableam = { path = "../types-tableam" }
types-tidbitmap = { path = "../types-tidbitmap" }
types-condvar = { path = "../types-condvar" }
types-storage = { path = "../types-storage" }
types-execparallel = { path = "../types-execparallel" }
# The keystone `shared_dsm_object` carries its `'seg` lifetime via
# `types_parallel::DsmSegmentHandle`; `pcxt_seg` hands us the execParallel
# `DsmSegmentHandle` whose `.0` is the same segment id (the parallel crate's own
# `pcxt_seg`/`seg_to_exec` bridge it identically).
types-parallel = { path = "../types-parallel" }

# Inward seam crate: the executor parallel dispatch reaches this node's
# parallel methods through these declarations.
backend-executor-nodeBitmapHeapscan-seams = { path = "../backend-executor-nodeBitmapHeapscan-seams" }

# Outward seam crates (callees owned by other units, reached across a cycle).
backend-executor-execProcnode-seams = { path = "../backend-executor-execProcnode-seams" }
backend-executor-execAmi-seams = { path = "../backend-executor-execAmi-seams" }
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-executor-execUtils-seams = { path = "../backend-executor-execUtils-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-access-table-tableam-bm-seams = { path = "../backend-access-table-tableam-bm-seams" }
backend-nodes-core-tidbitmap-seams = { path = "../backend-nodes-core-tidbitmap-seams" }

# Direct deps on ported owners (acyclic).
# The execParallel keystone's typed-shared-DSM-object primitive
# (`shared_dsm_object`) lives in this crate's impl; the parallel subsystem sits
# below the executor (it depends only on `types-nodes`), so this edge is acyclic.
backend-access-transam-parallel = { path = "../backend-access-transam-parallel" }
backend-executor-execUtils = { path = "../backend-executor-execUtils" }
backend-access-table-tableam = { path = "../backend-access-table-tableam" }
backend-storage-lmgr-condition-variable = { path = "../backend-storage-lmgr-condition-variable" }
backend-storage-lmgr-s-lock = { path = "../backend-storage-lmgr-s-lock" }

[dev-dependencies]
mcx = { path = "../mcx" }
