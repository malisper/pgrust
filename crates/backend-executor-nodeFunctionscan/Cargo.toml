[package]
name = "backend-executor-nodeFunctionscan"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_nodeFunctionscan"
path = "src/lib.rs"

[dependencies]
# Outward calls through per-owner seam crates (owners not yet ported / cyclic).
# The set-returning-function evaluation (ExecInitTableFunctionResult /
# ExecMakeTableFunctionResult) is owned by execSRF; the generic scan driver by
# execScan; descriptor construction by tupdesc/toastdesc; result-type lookup by
# nodes-core; slot ops/result-type setup by execTuples/execUtils; qual init by
# execExpr; the materialized tuplestore by sort-storage; exprCollation by
# nodeFuncs.
backend-access-common-toastdesc-seams = { path = "../backend-access-common-toastdesc-seams" }
backend-access-common-tupdesc-seams = { path = "../backend-access-common-tupdesc-seams" }
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
backend-executor-execScan-seams = { path = "../backend-executor-execScan-seams" }
backend-executor-execSRF-seams = { path = "../backend-executor-execSRF-seams" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-executor-execUtils-seams = { path = "../backend-executor-execUtils-seams" }
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }
backend-utils-sort-storage-seams = { path = "../backend-utils-sort-storage-seams" }

# Shared type stack + allocator + error.
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-tuple = { path = "../types-tuple" }
mcx = { path = "../mcx" }

[dev-dependencies]
seam-core = { path = "../seam-core" }
