[package]
name = "backend-executor-nodeSeqscan"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_nodeSeqscan"
path = "src/lib.rs"

[dependencies]
# This crate's own inward seams (the parallel-scan entry points other units
# call into).
backend-executor-nodeSeqscan-seams = { path = "../backend-executor-nodeSeqscan-seams" }

# Outward calls through per-owner seam crates (owners not yet ported / cyclic).
backend-access-table-tableam-seams = { path = "../backend-access-table-tableam-seams" }
backend-executor-execScan-seams = { path = "../backend-executor-execScan-seams" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-executor-execUtils-seams = { path = "../backend-executor-execUtils-seams" }
backend-executor-execExpr-seams = { path = "../backend-executor-execExpr-seams" }
backend-executor-execAmi-seams = { path = "../backend-executor-execAmi-seams" }
backend-executor-execMain-seams = { path = "../backend-executor-execMain-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-access-transam-parallel-seams = { path = "../backend-access-transam-parallel-seams" }
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }

# Direct cargo deps (acyclic): the table-AM crate's parallel-scan helpers and
# slot-callbacks, plus the shared type stack.
backend-access-table-tableam = { path = "../backend-access-table-tableam" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-rel = { path = "../types-rel" }
types-tableam = { path = "../types-tableam" }
types-snapshot = { path = "../types-snapshot" }
types-execparallel = { path = "../types-execparallel" }
mcx = { path = "../mcx" }
