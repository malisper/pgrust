[package]
name = "backend-executor-tqueue"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_executor_tqueue"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-dest = { path = "../types-dest" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
types-execparallel = { path = "../types-execparallel" }
types-parallel = { path = "../types-parallel" }
backend-utils-error = { path = "../backend-utils-error" }
backend-executor-tqueue-seams = { path = "../backend-executor-tqueue-seams" }
backend-storage-ipc-shm-mq-seams = { path = "../backend-storage-ipc-shm-mq-seams" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
# The TupleQueue DestReceiver registers its vtable into the single tcop-dest
# router (mirroring copyto's `CreateCopyDestReceiver`), so the executor's
# `dest->receiveSlot` dispatch reaches `tqueueReceiveSlot`. (No cycle:
# backend-tcop-dest depends only on owner *-seams crates, not on tqueue.)
backend-tcop-dest = { path = "../backend-tcop-dest" }
