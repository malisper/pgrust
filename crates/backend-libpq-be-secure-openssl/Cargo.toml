[package]
name = "backend-libpq-be-secure-openssl"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_libpq_be_secure_openssl"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-error = { path = "../types-error" }
types-net = { path = "../types-net" }
types-storage = { path = "../types-storage" }
backend-utils-error = { path = "../backend-utils-error" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# This unit installs the be_tls_get_* accessors of the be-secure seam contract
# (consumed by postinit / backend-startup). The be_tls_init/open_server/read/
# write/close/destroy entry points are called directly by be-secure.c (which
# depends on this crate), so they need no seam.
backend-libpq-be-secure-seams = { path = "../backend-libpq-be-secure-seams" }

# be-secure-common.c helpers (run_ssl_passphrase_command / check_ssl_key_file_permissions).
backend-libpq-be-secure-common-seams = { path = "../backend-libpq-be-secure-common-seams" }

# guc.c GetConfigOption (the "%s setting %s not supported" reports).
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }

# The OpenSSL C library FFI boundary: panic-until-bound (no openssl owner).
backend-libpq-be-secure-openssl-ffi-seams = { path = "../backend-libpq-be-secure-openssl-ffi-seams" }
