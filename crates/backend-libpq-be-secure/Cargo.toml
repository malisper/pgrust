[package]
name = "backend-libpq-be-secure"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_libpq_be_secure"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-error = { path = "../types-error" }
types-net = { path = "../types-net" }
types-storage = { path = "../types-storage" }
backend-utils-error = { path = "../backend-utils-error" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# This unit owns the secure_*/ssl_*/be_tls_get_* inward seam contract.
backend-libpq-be-secure-seams = { path = "../backend-libpq-be-secure-seams" }

# The #ifdef USE_SSL TLS backend (be-secure-openssl.c). be-secure.c calls its
# be_tls_init/open_server/read/write/close/destroy directly. Acyclic: the
# openssl crate does not depend on this one.
backend-libpq-be-secure-openssl = { path = "../backend-libpq-be-secure-openssl" }

# FeBeWaitSet modify + combined wait (pqcomm owns FeBeWaitSet).
backend-libpq-pqcomm-seams = { path = "../backend-libpq-pqcomm-seams" }

# ResetLatch(MyLatch).
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }

# ProcessClientReadInterrupt / ProcessClientWriteInterrupt (tcop/postgres.c).
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }

libc = "0.2"
