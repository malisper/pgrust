[package]
name = "backend-libpq-hba"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_libpq_hba"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
# Inward seam crates (this crate installs their seams).
backend-libpq-auth-seams = { path = "../backend-libpq-auth-seams" }
backend-libpq-hba-seams = { path = "../backend-libpq-hba-seams" }
backend-libpq-oauth-seams = { path = "../backend-libpq-oauth-seams" }

# Outward seam crates / owner crates.
backend-utils-error = { path = "../backend-utils-error" }
backend-utils-adt-acl-seams = { path = "../backend-utils-adt-acl-seams" }
backend-commands-user-seams = { path = "../backend-commands-user-seams" }
backend-replication-walsender-seams = { path = "../backend-replication-walsender-seams" }
backend-utils-misc-guc = { path = "../backend-utils-misc-guc" }
backend-regex-core-seams = { path = "../backend-regex-core-seams" }
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
backend-utils-adt-varlena = { path = "../backend-utils-adt-varlena" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
backend-utils-adt-arrayfuncs-seams = { path = "../backend-utils-adt-arrayfuncs-seams" }
backend-utils-adt-network = { path = "../backend-utils-adt-network" }
backend-utils-fmgr-funcapi-seams = { path = "../backend-utils-fmgr-funcapi-seams" }
backend-utils-init-miscinit = { path = "../backend-utils-init-miscinit" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-libpq-ifaddr = { path = "../backend-libpq-ifaddr" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-utils-misc-conffiles-seams = { path = "../backend-utils-misc-conffiles-seams" }
common-ip = { path = "../common-ip" }

# Type vocabulary.
types-core = { path = "../types-core" }
types-net = { path = "../types-net" }
types-error = { path = "../types-error" }
types-regex = { path = "../types-regex" }
types-nodes = { path = "../types-nodes" }
types-tuple = { path = "../types-tuple" }
mcx = { path = "../mcx" }
allocator-api2 = { version = "0.2", default-features = false, features = ["alloc"] }
libc = "0.2"
