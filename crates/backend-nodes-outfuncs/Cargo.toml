[package]
name = "backend-nodes-outfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_nodes_outfuncs"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
# The `node_to_string_with_locations` inward seam this unit owns is declared on
# the `backend-nodes-core` owner's seam crate (it was re-homed there so the
# install guard can track it); installing it here retires the live panic the
# `print` family drives it through.
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
