[package]
name = "backend-optimizer-path-allpaths"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_path_allpaths"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }

# Sibling optimizer owners + their seam crates.
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
backend-optimizer-util-relnode-seams = { path = "../backend-optimizer-util-relnode-seams" }
backend-optimizer-util-appendinfo-seams = { path = "../backend-optimizer-util-appendinfo-seams" }
backend-optimizer-path-costsize = { path = "../backend-optimizer-path-costsize" }
backend-optimizer-path-costsize-seams = { path = "../backend-optimizer-path-costsize-seams" }
backend-optimizer-path-pathkeys = { path = "../backend-optimizer-path-pathkeys" }
backend-optimizer-path-pathkeys-seams = { path = "../backend-optimizer-path-pathkeys-seams" }
backend-optimizer-path-equivclass = { path = "../backend-optimizer-path-equivclass" }
backend-optimizer-path-equivclass-seams = { path = "../backend-optimizer-path-equivclass-seams" }
backend-optimizer-path-equivclass-ext-seams = { path = "../backend-optimizer-path-equivclass-ext-seams" }
backend-optimizer-path-joinrels = { path = "../backend-optimizer-path-joinrels" }
backend-optimizer-path-indxpath = { path = "../backend-optimizer-path-indxpath" }
backend-optimizer-path-small = { path = "../backend-optimizer-path-small" }
backend-optimizer-rte-seams = { path = "../backend-optimizer-rte-seams" }
backend-geqo-all = { path = "../backend-geqo-all" }
backend-geqo-all-seams = { path = "../backend-geqo-all-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
# allpaths.c owns the `min_parallel_index_scan_size` GUC; vacuumparallel reads
# it through this accessor seam, which allpaths installs in `init_seams`.
backend-commands-vacuum-seams = { path = "../backend-commands-vacuum-seams" }
