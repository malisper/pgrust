[package]
name = "backend-optimizer-path-costsize"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_path_costsize"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
backend-optimizer-path-joinpath-seams = { path = "../backend-optimizer-path-joinpath-seams" }
backend-optimizer-path-costsize-seams = { path = "../backend-optimizer-path-costsize-seams" }
backend-optimizer-util-relnode-seams = { path = "../backend-optimizer-util-relnode-seams" }
backend-optimizer-util-relnode-ext-seams = { path = "../backend-optimizer-util-relnode-ext-seams" }
backend-optimizer-plan-planner-pc-seams = { path = "../backend-optimizer-plan-planner-pc-seams" }
backend-utils-adt-selfuncs-seams = { path = "../backend-utils-adt-selfuncs-seams" }
types-selfuncs = { path = "../types-selfuncs" }
# cost_qual_eval_walker dispatches on the Expr node vocabulary (nodeFuncs.c
# expression_tree_walker / exprType), resolves opfuncid via get_opcode and type
# I/O funcs (lsyscache.c), and reads array lengths (clauses.c
# estimate_array_length over an inline &Expr). These owners depend only on
# *-seams leaves of costsize, never on this owner crate — no cycle.
backend-nodes-core = { path = "../backend-nodes-core" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
# costsize.c owns the scan/join `enable_*` cost GUCs; this crate installs their
# guc-table slots (process-private backing cells) so allpaths.c/joinrels.c can
# read them through `vars::enable_*.read()`.
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
# costsize.c owns the `random_page_cost`/`seq_page_cost` GUC defaults that
# spccache.c's `get_tablespace_page_costs` falls back to; this crate installs
# the `get_tablespace_page_costs` cost seam, delegating to spccache with those
# defaults + `MyDatabaseTableSpace` (init-small global).
backend-utils-cache-spccache = { path = "../backend-utils-cache-spccache" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
