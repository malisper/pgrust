[package]
name = "backend-optimizer-plan-analyzejoins"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_plan_analyzejoins"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
# pathnode.c `create_unique_path` reaches the subquery-distinctness probe via the
# pathnode-side outward seam. pathnode-seams is a leaf seam crate — no cycle.
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-rewrite-core = { path = "../backend-rewrite-core" }
backend-optimizer-util-relnode = { path = "../backend-optimizer-util-relnode" }
backend-optimizer-util-joininfo = { path = "../backend-optimizer-util-joininfo" }
backend-optimizer-path-equivclass = { path = "../backend-optimizer-path-equivclass" }

# Seam crates we INSTALL into (inward seams owned by analyzejoins.c):
backend-optimizer-plan-init-subselect-seams = { path = "../backend-optimizer-plan-init-subselect-seams" }
backend-optimizer-path-joinpath-seams = { path = "../backend-optimizer-path-joinpath-seams" }

# Seam crates we CALL (outward deps, real owner elsewhere):
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }
backend-optimizer-path-indxpath = { path = "../backend-optimizer-path-indxpath" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
backend-optimizer-util-vars = { path = "../backend-optimizer-util-vars" }
backend-optimizer-util-joininfo-ext-seams = { path = "../backend-optimizer-util-joininfo-ext-seams" }
backend-optimizer-path-equivclass-ext-seams = { path = "../backend-optimizer-path-equivclass-ext-seams" }
backend-optimizer-rte-seams = { path = "../backend-optimizer-rte-seams" }
backend-optimizer-util-plancat-ext-seams = { path = "../backend-optimizer-util-plancat-ext-seams" }
types-tuple = { path = "../types-tuple" }
backend-optimizer-plan-small-seams = { path = "../backend-optimizer-plan-small-seams" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
