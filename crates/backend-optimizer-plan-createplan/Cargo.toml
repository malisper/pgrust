[package]
name = "backend-optimizer-plan-createplan"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_plan_createplan"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
# expression_tree_mutator over the arena Expr tree (replace_nestloop_params).
backend-nodes-core = { path = "../backend-nodes-core" }
# This unit's own per-converter seam decls (the dispatch arms).
backend-optimizer-plan-createplan-seams = { path = "../backend-optimizer-plan-createplan-seams" }
# cost_qual_eval + cpu_operator_cost (order_qual_clauses); installed by costsize.
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
# replace_nestloop_param_var / _placeholdervar (paramassign.c, #297).
backend-optimizer-util-paramassign-seams = { path = "../backend-optimizer-util-paramassign-seams" }
# find_placeholder_info (placeholder.c).
backend-optimizer-util-placeholder-seams = { path = "../backend-optimizer-util-placeholder-seams" }
# relids_is_member / relids_is_subset over Relids (relnode.c).
backend-optimizer-util-relnode-seams = { path = "../backend-optimizer-util-relnode-seams" }
# make_tlist_from_pathtarget / apply_pathtarget_labeling_to_tlist (tlist.c).
backend-optimizer-util-vars = { path = "../backend-optimizer-util-vars" }
# extract_actual_clauses (restrictinfo.c).
backend-optimizer-util-joininfo = { path = "../backend-optimizer-util-joininfo" }
# build_physical_tlist (plancat.c).
backend-optimizer-util-plancat = { path = "../backend-optimizer-util-plancat" }
# CommuteOpExpr (clauses.c) — get_switched_clauses in the join converters.
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
# equal_expr (equalfuncs.c) — list_difference over the OR-clause in tidscan.
backend-nodes-equalfuncs-seams = { path = "../backend-nodes-equalfuncs-seams" }
# is_redundant_derived_clause (equivclass.c) — tidscan single-tidqual dedup.
backend-optimizer-path-equivclass-seams = { path = "../backend-optimizer-path-equivclass-seams" }
# find_ec_member_matching_expr / find_computable_ec_member (equivclass.c) —
# prepare_sort_from_pathkeys matches pathkey ECs to tlist entries.
backend-optimizer-path-equivclass = { path = "../backend-optimizer-path-equivclass" }
# get_opfamily_member_for_cmptype (lsyscache.c) — the sort operator for a PathKey.
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
# CompareType (pathkey pk_cmptype) for the sort-operator lookup.
types-amapi = { path = "../types-amapi" }
# enable_sort GUC (make_sort disabled_nodes accounting).
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
# clamp_cardinality_to_long (costsize.c) — make_agg numGroups reduction.
backend-optimizer-path-costsize-seams = { path = "../backend-optimizer-path-costsize-seams" }
