[package]
name = "backend-optimizer-plan-init-subselect"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_plan_init_subselect"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }

# Seam homes this crate installs INTO (it owns these initsplan.c functions):
backend-optimizer-plan-small-seams = { path = "../backend-optimizer-plan-small-seams" }
backend-optimizer-path-equivclass-ext-seams = { path = "../backend-optimizer-path-equivclass-ext-seams" }
backend-optimizer-util-joininfo-ext-seams = { path = "../backend-optimizer-util-joininfo-ext-seams" }

# Inward seams of ported owners this crate calls (installed at runtime):
backend-optimizer-util-relnode-seams = { path = "../backend-optimizer-util-relnode-seams" }
backend-optimizer-path-equivclass-seams = { path = "../backend-optimizer-path-equivclass-seams" }
backend-optimizer-path-small-seams = { path = "../backend-optimizer-path-small-seams" }
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }

# Outward seams for unported / not-acyclically-reachable callees this crate
# declares + uses (loud-panic until installed):
backend-optimizer-plan-init-subselect-ext-seams = { path = "../backend-optimizer-plan-init-subselect-ext-seams" }

# Directly-depended ported owners (acyclic: nothing depends on this new crate):
backend-optimizer-util-relnode = { path = "../backend-optimizer-util-relnode" }
backend-optimizer-path-equivclass = { path = "../backend-optimizer-path-equivclass" }
backend-optimizer-path-pathkeys = { path = "../backend-optimizer-path-pathkeys" }
backend-optimizer-util-joininfo = { path = "../backend-optimizer-util-joininfo" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-rewrite-core = { path = "../backend-rewrite-core" }
