[package]
name = "backend-optimizer-plan-planagg"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_plan_planagg"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }

# Already-ported subsystems called directly (no cycle, no seam):
# nodeFuncs (expr_type), clauses (contain_mutable_functions).
backend-nodes-core = { path = "../backend-nodes-core" }
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }

# Cross-unit catalog seams this unit consumes (installed by their owners):
# type_is_rowtype (lsyscache), agg_form_by_oid -> aggsortop (syscache).
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
