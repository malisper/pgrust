# estimate_num_groups (get_number_of_groups GROUP BY estimate).
backend-utils-adt-selfuncs-seams = { path = "../backend-utils-adt-selfuncs-seams" }
# CheckSelectLocking.
backend-parser-analyze = { path = "../backend-parser-analyze" }
# has_subclass.
backend-catalog-pg-inherits = { path = "../backend-catalog-pg-inherits" }
# GetFdwRoutineByRelId (select_rowmark_type FDW branch).
backend-foreign-foreign = { path = "../backend-foreign-foreign" }
# guc consts (DEBUG_PARALLEL_OFF / DEFAULT_CURSOR_TUPLE_FRACTION).
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
backend-utils-init-small = { path = "../backend-utils-init-small" }
backend-catalog-index-seams = { path = "../backend-catalog-index-seams" }
# expand_grouping_sets (GROUPING SETS expansion in subquery_planner).
backend-parser-parse-agg-seams = { path = "../backend-parser-parse-agg-seams" }
