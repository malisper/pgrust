[package]
name = "backend-optimizer-plan-planner"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_plan_planner"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
types-parsenodes = { path = "../types-parsenodes" }
backend-nodes-core = { path = "../backend-nodes-core" }
# equal() over PathTarget expr handles (scanjoin_target_same_exprs test).
backend-nodes-equalfuncs-seams = { path = "../backend-nodes-equalfuncs-seams" }
# This unit's own inward seams (pg_plan_query / plan_cluster_use_sort).
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
# plancache's slice of the planner (expression_planner_with_deps value seam).
backend-optimizer-plan-planner-pc-seams = { path = "../backend-optimizer-plan-planner-pc-seams" }
types-plancache = { path = "../types-plancache" }
# plan_set_operations (prepunion.c — no crate yet).
backend-optimizer-prep-prepunion-seams = { path = "../backend-optimizer-prep-prepunion-seams" }
# create_plan dispatch spine.
backend-optimizer-plan-createplan = { path = "../backend-optimizer-plan-createplan" }
# create_plan-tail apply_tlist_labeling seam (createplan calls it on the topmost plan).
backend-optimizer-plan-createplan-seams = { path = "../backend-optimizer-plan-createplan-seams" }
# set_plan_references.
backend-optimizer-plan-setrefs = { path = "../backend-optimizer-plan-setrefs" }
# record_inval_item seam: planner installs it (computes the syscache hash, pushes
# the concrete PlanInvalItem onto glob->invalItems for the PlannedStmt producer).
backend-optimizer-plan-setrefs-seams = { path = "../backend-optimizer-plan-setrefs-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
# query_planner.
backend-optimizer-plan-small = { path = "../backend-optimizer-plan-small" }
# SS_* (subselect.c) incl. SS_process_ctes.
backend-optimizer-plan-init-subselect = { path = "../backend-optimizer-plan-init-subselect" }
# replace_empty_jointree (prepjointree.c, ported in subselect-pullup).
backend-optimizer-plan-subselect-pullup = { path = "../backend-optimizer-plan-subselect-pullup" }
# ExecSupportsBackwardScan / materialize_finished_plan outward seams.
backend-optimizer-plan-init-subselect-ext-seams = { path = "../backend-optimizer-plan-init-subselect-ext-seams" }
# prepjointree spine (pull_up_*, reduce_outer_joins, remove_useless_result_rtes, ...).
backend-optimizer-prep-prepjointree = { path = "../backend-optimizer-prep-prepjointree" }
# prepjointree per-fn seams: preprocess_function_rtes / pull_up_subqueries /
# expand_virtual_generated_columns / flatten_simple_union_all are exposed only
# through the seam crate (planner is a consumer, not the owner).
backend-optimizer-prep-prepjointree-seams = { path = "../backend-optimizer-prep-prepjointree-seams" }
# preprocess_targetlist.
backend-optimizer-prep-preptlist = { path = "../backend-optimizer-prep-preptlist" }
# preprocess_aggrefs.
backend-optimizer-prep-prepagg = { path = "../backend-optimizer-prep-prepagg" }
backend-optimizer-plan-planagg = { path = "../backend-optimizer-plan-planagg" }
# canonicalize_qual / make_ands_implicit live in prepqual / nodes-core.
backend-optimizer-prep-prepqual = { path = "../backend-optimizer-prep-prepqual" }
# fetch_upper_rel.
backend-optimizer-util-relnode = { path = "../backend-optimizer-util-relnode" }
# set_cheapest.
backend-optimizer-util-pathnode = { path = "../backend-optimizer-util-pathnode" }
# assign_special_exec_param (ModifyTable epqParam).
backend-optimizer-util-paramassign-seams = { path = "../backend-optimizer-util-paramassign-seams" }
# AggClauseCostsLite carrier (create_agg_path / cost_agg cost input).
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
# get_cheapest_fractional_path (allpaths seam).
backend-optimizer-path-allpaths = { path = "../backend-optimizer-path-allpaths" }
# make_pathkeys_for_sortclauses.
backend-optimizer-path-pathkeys = { path = "../backend-optimizer-path-pathkeys" }
# eval_const_expressions / estimate_expression_value / contain_* / is_parallel_safe / convert_saop.
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
# get_sortgroupref_clause / make_pathtarget_from_tlist / copy_pathtarget.
backend-optimizer-util-vars = { path = "../backend-optimizer-util-vars" }
# set_pathtarget_cost_width (the create_pathtarget macro tail).
backend-optimizer-path-costsize = { path = "../backend-optimizer-path-costsize" }
# get_sortgroupclause_expr (get_number_of_groups GROUP BY estimate).
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }
# estimate_num_groups (get_number_of_groups GROUP BY estimate).
backend-utils-adt-selfuncs-seams = { path = "../backend-utils-adt-selfuncs-seams" }
# CheckSelectLocking.
backend-parser-analyze = { path = "../backend-parser-analyze" }
# has_subclass.
backend-catalog-pg-inherits = { path = "../backend-catalog-pg-inherits" }
# GetFdwRoutineByRelId (select_rowmark_type FDW branch).
backend-foreign-foreign = { path = "../backend-foreign-foreign" }
# guc consts (DEBUG_PARALLEL_OFF / DEFAULT_CURSOR_TUPLE_FRACTION).
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
