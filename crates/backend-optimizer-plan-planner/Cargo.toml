# make_pathkeys_for_sortclauses.
backend-optimizer-path-pathkeys = { path = "../backend-optimizer-path-pathkeys" }
# eval_const_expressions / estimate_expression_value / contain_* / is_parallel_safe / convert_saop.
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
# get_sortgroupref_clause / make_pathtarget_from_tlist / copy_pathtarget.
backend-optimizer-util-vars = { path = "../backend-optimizer-util-vars" }
# flatten_join_alias_vars seam (installed by backend-optimizer-util-vars).
backend-rewrite-rewritemanip-seams = { path = "../backend-rewrite-rewritemanip-seams" }
# set_pathtarget_cost_width (the create_pathtarget macro tail).
backend-optimizer-path-costsize = { path = "../backend-optimizer-path-costsize" }
