[package]
name = "backend-optimizer-prep-prepjointree"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_prep_prepjointree"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }
backend-rewrite-core = { path = "../backend-rewrite-core" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
# FAMILY 6 (preprocess_function_rtes): inline_set_returning_function seam.
backend-optimizer-util-clauses-seams = { path = "../backend-optimizer-util-clauses-seams" }
# FAMILY 6 (pull_up_constant_function): get_expr_result_type.
backend-utils-fmgr-funcapi = { path = "../backend-utils-fmgr-funcapi" }

# FAMILY 1 (pull_up_sublinks) calls the re-keyed SubLink → join conversions.
backend-optimizer-plan-subselect-pullup-seams = { path = "../backend-optimizer-plan-subselect-pullup-seams" }

# FAMILY 2 (pull_up_subqueries): pull_varnos/contain_vars_of_level, PlaceHolderVar
# creation, flatten_join_alias_vars, and CombineRangeTables/replace_empty_jointree.
backend-optimizer-util-vars = { path = "../backend-optimizer-util-vars" }
backend-optimizer-util-placeholder-seams = { path = "../backend-optimizer-util-placeholder-seams" }
backend-rewrite-rewritemanip-seams = { path = "../backend-rewrite-rewritemanip-seams" }
backend-optimizer-plan-subselect-pullup = { path = "../backend-optimizer-plan-subselect-pullup" }

# expand_virtual_generated_columns relcache leg: table_open + RelationGetDescr,
# then build_generation_expression (rewriteHandler.c, via its seam) + makeVar to
# build the virtual-generated-column replacement targetlist.
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-rewrite-rewritehandler-seams = { path = "../backend-rewrite-rewritehandler-seams" }
types-rel = { path = "../types-rel" }
types-tuple = { path = "../types-tuple" }

# Inward seams this unit owns + installs.
backend-optimizer-prep-prepjointree-seams = { path = "../backend-optimizer-prep-prepjointree-seams" }
