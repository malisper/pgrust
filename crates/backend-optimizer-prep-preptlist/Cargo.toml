[package]
name = "backend-optimizer-prep-preptlist"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_prep_preptlist"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }

# Inward seam this unit owns + installs (preprocess_targetlist).
backend-optimizer-prep-preptlist-seams = { path = "../backend-optimizer-prep-preptlist-seams" }

# Cross-unit seam this unit owns (get_plan_rowmark, consumed by indxpath as
# `has_plan_rowmark`).
backend-optimizer-util-restrictinfo-seams = { path = "../backend-optimizer-util-restrictinfo-seams" }
