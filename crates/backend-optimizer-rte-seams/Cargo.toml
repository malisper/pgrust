[package]
name = "backend-optimizer-rte-seams"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_rte_seams"
path = "src/lib.rs"

[features]
# Exposes `synthetic::install_synthetic_rte_table` to non-test downstream
# crates that want to drive the optimizer against a hand-built RT space (the
# real planner-entry install is unported). Always on inside this crate's own
# `cargo test`.
synthetic = []

[dependencies]
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-pathnodes = { path = "../types-pathnodes" }

[dev-dependencies]
# Needed by the synthetic fixture's tests to build an (empty) PlannerRun in an
# Mcx so the re-signed `(run, root, rti)` seams can be called.
mcx = { path = "../mcx" }
