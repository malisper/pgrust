edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_util_clauses"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-tuple = { path = "../types-tuple" }
types-pathnodes = { path = "../types-pathnodes" }
types-datum = { path = "../types-datum" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-optimizer-path-costsize-seams = { path = "../backend-optimizer-path-costsize-seams" }
backend-optimizer-util-clauses-seams = { path = "../backend-optimizer-util-clauses-seams" }
backend-optimizer-plan-init-subselect-ext-seams = { path = "../backend-optimizer-plan-init-subselect-ext-seams" }
backend-optimizer-path-equivclass-ext-seams = { path = "../backend-optimizer-path-equivclass-ext-seams" }
backend-optimizer-util-joininfo-ext-seams = { path = "../backend-optimizer-util-joininfo-ext-seams" }
backend-optimizer-util-var-seams = { path = "../backend-optimizer-util-var-seams" }
backend-optimizer-prep-prepqual-seams = { path = "../backend-optimizer-prep-prepqual-seams" }
backend-utils-adt-arrayfuncs-seams = { path = "../backend-utils-adt-arrayfuncs-seams" }
# clauses.c's is_pseudo_constant_clause{,_relids} predicates — declared in
# path-small-seams (path-small.c's clause-classification consumers), owned here.
backend-optimizer-path-small-seams = { path = "../backend-optimizer-path-small-seams" }
# joinpath.c's contain_volatile_functions(node/reltarget/rinfo) legs — declared
# in joinpath-seams; clauses.c owns the predicate.
backend-optimizer-path-joinpath-seams = { path = "../backend-optimizer-path-joinpath-seams" }
# clauses.c's is_parallel_safe(root, node) — declared in pathnode-seams (the
# pathnode create_*_path/gather parallel-safety checks ride it), owned here.
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
# inline_set_returning_function's EXECUTE-privilege / current-user / fmgr-hook
# gates (clauses.c:5135-5141).
types-acl = { path = "../types-acl" }
types-catalog = { path = "../types-catalog" }
backend-catalog-aclchk-seams = { path = "../backend-catalog-aclchk-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
