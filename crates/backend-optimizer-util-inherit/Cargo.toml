[package]
name = "backend-optimizer-util-inherit"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_util_inherit"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-tuple = { path = "../types-tuple" }
types-rel = { path = "../types-rel" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
types-partition = { path = "../types-partition" }

# build_simple_rel (child RelOptInfo construction) + expand_planner_arrays — direct dep.
backend-optimizer-util-relnode = { path = "../backend-optimizer-util-relnode" }
# make_append_rel_info / adjust_appendrel_attrs / add_row_identity_columns.
backend-optimizer-util-appendinfo = { path = "../backend-optimizer-util-appendinfo" }
backend-optimizer-util-appendinfo-seams = { path = "../backend-optimizer-util-appendinfo-seams" }
# make_var / make_target_entry / make_alias / make_ands_implicit / make_string node.
backend-nodes-core = { path = "../backend-nodes-core" }
# make_restrictinfo — direct dep, no cycle.
backend-optimizer-util-joininfo = { path = "../backend-optimizer-util-joininfo" }
backend-optimizer-util-joininfo-ext-seams = { path = "../backend-optimizer-util-joininfo-ext-seams" }
# eval_const_expressions / contain_volatile_functions.
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
# contain_vars_of_level.
backend-optimizer-util-vars = { path = "../backend-optimizer-util-vars" }
# get_dependent_generated_columns.
backend-optimizer-util-plancat = { path = "../backend-optimizer-util-plancat" }
# has_partition_attrs.
backend-catalog-partition = { path = "../backend-catalog-partition" }
# relids_* bitmapset primitives + rte_inh reader seam.
backend-optimizer-util-relnode-seams = { path = "../backend-optimizer-util-relnode-seams" }
backend-optimizer-rte-seams = { path = "../backend-optimizer-rte-seams" }
# find_all_inheritors (catalog scan).
backend-catalog-pg-inherits-seams = { path = "../backend-catalog-pg-inherits-seams" }
# table_open / try_table_open / Relation::close.
backend-access-table-table-seams = { path = "../backend-access-table-table-seams" }
# getRTEPermissionInfo (perminfoindex -> RTEPermissionInfo).
backend-parser-relation-seams = { path = "../backend-parser-relation-seams" }
# add_vars_to_targetlist (initsplan, cyclic owner).
backend-optimizer-path-equivclass-ext-seams = { path = "../backend-optimizer-path-equivclass-ext-seams" }
# select_rowmark_type / make_whole_row_var (planner.c, cyclic owner).
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
# RELATION_IS_OTHER_TEMP -> rd_islocaltemp (relcache, cyclic owner).
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
# PartitionDirectoryLookup (partdesc) + prune_append_rel_partitions (partprune).
backend-partitioning-core-seams = { path = "../backend-partitioning-core-seams" }
backend-partitioning-partprune-seams = { path = "../backend-partitioning-partprune-seams" }
# relids_del_members — bms_del_member over a planner Relids.
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }

# The seams this unit owns + installs (declared in consumer ext-seam crates).
backend-optimizer-plan-init-subselect-ext-seams = { path = "../backend-optimizer-plan-init-subselect-ext-seams" }
backend-optimizer-util-relnode-ext-seams = { path = "../backend-optimizer-util-relnode-ext-seams" }
