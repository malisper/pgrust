[package]
name = "backend-optimizer-util-inherit"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_util_inherit"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-tuple = { path = "../types-tuple" }
types-pathnodes = { path = "../types-pathnodes" }

# build_simple_rel (child RelOptInfo construction) — direct dep, no cycle.
backend-optimizer-util-relnode = { path = "../backend-optimizer-util-relnode" }
# relids_* bitmapset primitives + rte_inh reader seam.
backend-optimizer-util-relnode-seams = { path = "../backend-optimizer-util-relnode-seams" }
backend-optimizer-rte-seams = { path = "../backend-optimizer-rte-seams" }

# The seams this unit owns + installs (declared in consumer ext-seam crates).
backend-optimizer-plan-init-subselect-ext-seams = { path = "../backend-optimizer-plan-init-subselect-ext-seams" }
backend-optimizer-util-relnode-ext-seams = { path = "../backend-optimizer-util-relnode-ext-seams" }
