[package]
name = "backend-optimizer-util-paramassign"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_util_paramassign"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }

backend-optimizer-util-paramassign-seams = { path = "../backend-optimizer-util-paramassign-seams" }

# Owners reached by direct edge (no cycle): joininfo owns placeholder.c
# (find_placeholder_info / get_placeholder_nulling_relids); backend-rewrite-core
# owns rewriteManip.c (IncrementVarSublevelsUp).
backend-optimizer-util-joininfo = { path = "../backend-optimizer-util-joininfo" }
backend-rewrite-core = { path = "../backend-rewrite-core" }

# Seam edges for node operators / set algebra whose owners would cycle.
backend-nodes-nodeFuncs-seams = { path = "../backend-nodes-nodeFuncs-seams" }
backend-nodes-equalfuncs-seams = { path = "../backend-nodes-equalfuncs-seams" }
backend-optimizer-util-relnode-seams = { path = "../backend-optimizer-util-relnode-seams" }

[dev-dependencies]
# Install the equal_expr seam (owned by equalfuncs) so the reuse test, which
# compares a Var against the recorded NestLoopParam paramval, can run.
backend-nodes-equalfuncs = { path = "../backend-nodes-equalfuncs" }
