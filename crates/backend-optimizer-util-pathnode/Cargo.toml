[package]
name = "backend-optimizer-util-pathnode"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_util_pathnode"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
backend-optimizer-path-joinpath-seams = { path = "../backend-optimizer-path-joinpath-seams" }
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
backend-optimizer-util-relnode-seams = { path = "../backend-optimizer-util-relnode-seams" }
# create_unique_path (pathnode.c:1730) reaches lsyscache's
# get_ordering_op_for_equality_op / get_equality_op_for_ordering_op. lsyscache is
# below pathnode in the DAG — no cycle.
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-optimizer-path-costsize-seams = { path = "../backend-optimizer-path-costsize-seams" }
# apply_projection_to_path (pathnode.c) compares two PathTarget tlists with
# equal() (equalfuncs.c). Leaf seam crate — no cycle.
backend-nodes-equalfuncs-seams = { path = "../backend-nodes-equalfuncs-seams" }

[dev-dependencies]
types-tuple = { path = "../types-tuple" }
