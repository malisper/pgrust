[package]
name = "backend-optimizer-util-vars"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_optimizer_util_vars"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-optimizer-path-joinpath-seams = { path = "../backend-optimizer-path-joinpath-seams" }
backend-optimizer-util-var-seams = { path = "../backend-optimizer-util-var-seams" }
# var.c also owns the pull_var_clause/pull_var_clause_list/pull_varnos the
# equivclass-ext consumer crate declares for initsplan.c/equivclass.c.
backend-optimizer-path-equivclass-ext-seams = { path = "../backend-optimizer-path-equivclass-ext-seams" }
backend-optimizer-util-joininfo-ext-seams = { path = "../backend-optimizer-util-joininfo-ext-seams" }
# extract_lateral_references' pull_vars_of_level((Node *) ...) — declared in the
# init-subselect-ext stub crate (it cannot name a whole parse Node); var.c owns it.
backend-optimizer-plan-init-subselect-ext-seams = { path = "../backend-optimizer-plan-init-subselect-ext-seams" }
# clauses.c's root-aware NumRelids(root, clause) — declared in path-small-seams,
# owned here (the pull_varnos + outer_join_rels pair is var.c/planner-threaded).
backend-optimizer-path-small-seams = { path = "../backend-optimizer-path-small-seams" }
# cost_incremental_sort's `bms_is_member(0, pull_varnos(root, em_expr))` —
# declared in costsize-seams, owned here (var.c's pull_varnos).
backend-optimizer-path-costsize-seams = { path = "../backend-optimizer-path-costsize-seams" }
# split_pathtarget_at_srfs' set_pathtarget_cost_width on intermediate targets
# (tlist.c:1122); costsize.c does not depend back on var.c, so no cycle.
backend-optimizer-path-costsize = { path = "../backend-optimizer-path-costsize" }
backend-nodes-equalfuncs-seams = { path = "../backend-nodes-equalfuncs-seams" }
# fix_indexqual_operand reaches indxpath.c's strip_phvs_in_index_operand by a
# direct edge (indxpath depends only on var-SEAMS, not this owner, so no cycle).
backend-optimizer-path-indxpath = { path = "../backend-optimizer-path-indxpath" }
# flatten_join_alias_vars (this owner) installs the rewritemanip-seams
# `flatten_join_alias_vars` declaration and uses rewriteManip.c's
# IncrementVarSublevelsUp / checkExprHasSubLink / add_nulling_relids
# (backend-rewrite-core, which does NOT depend on this crate — verified no cycle),
# plus the prepjointree-seams `get_relids_for_join` (a seams crate — no cycle).
backend-rewrite-rewritemanip-seams = { path = "../backend-rewrite-rewritemanip-seams" }
backend-rewrite-core = { path = "../backend-rewrite-core" }
backend-optimizer-prep-prepjointree-seams = { path = "../backend-optimizer-prep-prepjointree-seams" }
# tlist.c owns create_empty_pathtarget(); relnode.c reaches it through the
# relnode-ext consumer-side seam crate (no owner dir). This is its real owner.
backend-optimizer-util-relnode-ext-seams = { path = "../backend-optimizer-util-relnode-ext-seams" }
# mark_nullable_by_grouping (this owner) wraps a variable-free flattened grouping
# expression in a PlaceHolderVar via placeholder.c's make_placeholder_expr
# (declared in placeholder-seams — a seams crate, no cycle).
backend-optimizer-util-placeholder-seams = { path = "../backend-optimizer-util-placeholder-seams" }
# flatten_group_exprs (this owner, var.c) is called with root == NULL by
# ruleutils.c deparse / check_output_expressions() through this seams crate.
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
