[package]
name = "backend-parser-analyze"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_parser_analyze"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-catalog = { path = "../types-catalog" }
types-acl = { path = "../types-acl" }
types-rel = { path = "../types-rel" }
types-tuple = { path = "../types-tuple" }
types-storage = { path = "../types-storage" }
backend-utils-error = { path = "../backend-utils-error" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-nodes-outfuncs = { path = "../backend-nodes-outfuncs" }

# Inward seam contract owned by this crate.
backend-parser-analyze-seams = { path = "../backend-parser-analyze-seams" }

# functioncmds' interpret_sql_body seam (the inline SQL-function body
# interpreter), installed by this crate — it owns transformStmt + nodeToString +
# the dependency-reference walker.
backend-commands-functioncmds-seams = { path = "../backend-commands-functioncmds-seams" }
backend-catalog-pg-proc-seams = { path = "../backend-catalog-pg-proc-seams" }
backend-catalog-dependency = { path = "../backend-catalog-dependency" }

# CreateCommandTag classification (utility.c) for the "%s is not yet supported
# in unquoted SQL function body" error message; get_command_tag_name renders it.
backend-tcop-utility-seams = { path = "../backend-tcop-utility-seams" }
backend-tcop-cmdtag = { path = "../backend-tcop-cmdtag" }

# Merged sibling owners called directly (cycle-free; they depend on the
# analyze *-seams* decls, never on this impl crate).
backend-parser-clause = { path = "../backend-parser-clause" }
backend-parser-parse-target = { path = "../backend-parser-parse-target" }
backend-parser-relation = { path = "../backend-parser-relation" }
backend-parser-cte = { path = "../backend-parser-cte" }
backend-parser-parse-expr = { path = "../backend-parser-parse-expr" }
backend-parser-func = { path = "../backend-parser-func" }
backend-parser-coerce = { path = "../backend-parser-coerce" }
backend-parser-parse-oper = { path = "../backend-parser-parse-oper" }
backend-parser-parse-collate = { path = "../backend-parser-parse-collate" }
backend-parser-agg = { path = "../backend-parser-agg" }
backend-parser-small1 = { path = "../backend-parser-small1" }
# defGetBoolean for the EXPLAIN (GENERIC_PLAN) option (transformExplainStmt).
backend-commands-define-seams = { path = "../backend-commands-define-seams" }
backend-optimizer-util-vars = { path = "../backend-optimizer-util-vars" }
# errdetail_relkind_not_supported (the MERGE relkind-not-supported detail);
# cycle-free (pg-class has no parser dep).
backend-catalog-pg-class = { path = "../backend-catalog-pg-class" }

# transformPLAssignStmt: the ISCOMPLEX composite-type test (get_typtype) and the
# datatype-mismatch error's type-name formatting (format_type_be). Reached via
# the callee seams (cycle-free; their owners do not depend on this impl crate).
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-adt-format-type-seams = { path = "../backend-utils-adt-format-type-seams" }

# The SQL-function inliner body (clauses.c inline_function) installed by this
# crate: the parser driver + the fold crate's contain_*/coercion deps. All are
# cycle-free (none depends on this impl crate).
types-parsenodes = { path = "../types-parsenodes" }
backend-parser-driver = { path = "../backend-parser-driver" }
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
backend-optimizer-util-clauses-seams = { path = "../backend-optimizer-util-clauses-seams" }

# The set-returning SQL-function inliner body
# (clauses.c inline_set_returning_function SQL leg) installed by this crate:
# the rewriter (pg_rewrite_query / AcquireRewriteLocks), IncrementVarSublevelsUp,
# get_expr_result_type, BuildDescFromLists, and a Const datum builder. All are
# cycle-free (none depends on this impl crate).
backend-rewrite-rewritehandler-seams = { path = "../backend-rewrite-rewritehandler-seams" }
backend-rewrite-core = { path = "../backend-rewrite-core" }
backend-utils-fmgr-funcapi-seams = { path = "../backend-utils-fmgr-funcapi-seams" }
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }
types-pathnodes = { path = "../types-pathnodes" }
types-datum = { path = "../types-datum" }

# Outward dependency seams (callees whose owners are not yet ported).
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }
# The per-backend query-environment home: an AFTER trigger's transition-table
# ENRs (OLD/NEW TABLE) are read off it to populate pstate->p_queryEnv.
backend-utils-misc-queryenvironment-home = { path = "../backend-utils-misc-queryenvironment-home" }
# Inward seam this crate installs: the CTAS query-jumble + post-parse-analyze
# preamble (createas.c 244-249). Owned by the queryjumble / post-parse-analyze
# layer, which lives here.
backend-commands-createas-seams = { path = "../backend-commands-createas-seams" }

[dev-dependencies]
# Focused seam owners installed by the milestone test (see tests.rs).
backend-utils-adt-format-type = { path = "../backend-utils-adt-format-type" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
backend-utils-cache-syscache = { path = "../backend-utils-cache-syscache" }
backend-utils-cache-typcache = { path = "../backend-utils-cache-typcache" }
backend-parser-parse-type = { path = "../backend-parser-parse-type" }
backend-parser-gram-core = { path = "../backend-parser-gram-core" }
