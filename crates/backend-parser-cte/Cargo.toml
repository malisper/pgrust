[package]
name = "backend-parser-cte"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_parser_cte"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-tuple = { path = "../types-tuple" }
backend-utils-error = { path = "../backend-utils-error" }
backend-nodes-core = { path = "../backend-nodes-core" }

# Merged owners called directly (cycle-free: none of these dep this crate).
backend-parser-parse-expr = { path = "../backend-parser-parse-expr" }
backend-parser-coerce = { path = "../backend-parser-coerce" }
backend-parser-parse-collate = { path = "../backend-parser-parse-collate" }
backend-utils-adt-format-type = { path = "../backend-utils-adt-format-type" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }

# Outward dependency seams.
# parse_sub_analyze: the CTE <-> analyze recursion seam (analyze.c unported).
backend-parser-analyze-seams = { path = "../backend-parser-analyze-seams" }
# lookup_type_cache_eq_opr: typcache equality-operator lookup (cross dep cycle).
backend-utils-cache-typcache-seams = { path = "../backend-utils-cache-typcache-seams" }
# parser_errposition (parse_node.c, owned by parser-small1).
backend-parser-small1-seams = { path = "../backend-parser-small1-seams" }

[dev-dependencies]
# Installs the real `parser_errposition` seam so the error-path tests resolve
# their cursor positions.
backend-parser-small1 = { path = "../backend-parser-small1" }
