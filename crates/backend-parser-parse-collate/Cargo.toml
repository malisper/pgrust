[package]
name = "backend-parser-parse-collate"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_parser_parse_collate"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-parsenodes = { path = "../types-parsenodes" }
types-cluster = { path = "../types-cluster" }
backend-utils-error = { path = "../backend-utils-error" }
backend-nodes-core = { path = "../backend-nodes-core" }
# Outward dependency seams (catalog / cache / sibling-parser callees).
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
# get_collation_name is a real ported lsyscache fn (not a seam) used only for
# error messages; called via a scratch context, like format_type_be_owned.
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
backend-parser-small1-seams = { path = "../backend-parser-small1-seams" }

[dev-dependencies]
# The real `get_collation_name` reaches the syscache `collation_name` seam;
# tests install it (and the lsyscache seams) so error paths resolve.
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
