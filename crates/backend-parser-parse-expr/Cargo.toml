[package]
name = "backend-parser-parse-expr"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_parser_parse_expr"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-tuple = { path = "../types-tuple" }
types-parsenodes = { path = "../types-parsenodes" }
types-sortsupport = { path = "../types-sortsupport" }
types-cluster = { path = "../types-cluster" }
backend-utils-error = { path = "../backend-utils-error" }
backend-nodes-core = { path = "../backend-nodes-core" }

# GUC engine variable-accessor table — parse_expr.c owns the `Transform_null_equals`
# bool GUC backing storage and installs its accessors at init_seams() time.
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# Owner of the inward seams this crate installs.
backend-parser-parse-expr-seams = { path = "../backend-parser-parse-expr-seams" }

# Outward dependency seams (catalog / cache / sibling-parser callees).
backend-parser-parse-agg-seams = { path = "../backend-parser-parse-agg-seams" }
backend-parser-clause-seams = { path = "../backend-parser-clause-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-parser-coerce-seams = { path = "../backend-parser-coerce-seams" }
backend-parser-small1-seams = { path = "../backend-parser-small1-seams" }
# parse_sub_analyze (analyze.c) — transformSubLink runs the sub-SELECT through
# the analyze owner via its seam (decl-only crate, cycle-free).
backend-parser-analyze-seams = { path = "../backend-parser-analyze-seams" }

# Merged sibling owners called directly (cycle-free).
backend-parser-small1 = { path = "../backend-parser-small1" }
backend-parser-parse-oper = { path = "../backend-parser-parse-oper" }
backend-parser-parse-type = { path = "../backend-parser-parse-type" }
backend-parser-parse-collate = { path = "../backend-parser-parse-collate" }
backend-utils-adt-format-type = { path = "../backend-utils-adt-format-type" }
backend-utils-adt-xml = { path = "../backend-utils-adt-xml" }

# Sibling parser owners now landed (downward calls; they depend only on
# backend-parser-parse-expr-seams, so these impl deps stay cycle-free).
backend-parser-relation = { path = "../backend-parser-relation" }
backend-parser-func = { path = "../backend-parser-func" }
backend-parser-parse-target = { path = "../backend-parser-parse-target" }
backend-optimizer-util-vars = { path = "../backend-optimizer-util-vars" }

# Cross-database catalog-name check in transformColumnRef (4-part name).
backend-commands-dbcommands-seams = { path = "../backend-commands-dbcommands-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }

[dev-dependencies]
