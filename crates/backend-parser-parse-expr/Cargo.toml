[package]
name = "backend-parser-parse-expr"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_parser_parse_expr"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-tuple = { path = "../types-tuple" }
types-parsenodes = { path = "../types-parsenodes" }
types-sortsupport = { path = "../types-sortsupport" }
types-cluster = { path = "../types-cluster" }
backend-utils-error = { path = "../backend-utils-error" }
backend-nodes-core = { path = "../backend-nodes-core" }

# Owner of the inward seams this crate installs.
backend-parser-parse-expr-seams = { path = "../backend-parser-parse-expr-seams" }

# Outward dependency seams (catalog / cache / sibling-parser callees).
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-parser-coerce-seams = { path = "../backend-parser-coerce-seams" }
backend-parser-small1-seams = { path = "../backend-parser-small1-seams" }

# Merged sibling owners called directly (cycle-free).
backend-parser-parse-oper = { path = "../backend-parser-parse-oper" }
backend-parser-parse-type = { path = "../backend-parser-parse-type" }
backend-parser-parse-collate = { path = "../backend-parser-parse-collate" }
backend-utils-adt-format-type = { path = "../backend-utils-adt-format-type" }

[dev-dependencies]
