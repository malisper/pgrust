[package]
name = "backend-parser-parse-utilcmd"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_parser_parse_utilcmd"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-parsenodes = { path = "../types-parsenodes" }
backend-utils-error = { path = "../backend-utils-error" }
backend-nodes-core = { path = "../backend-nodes-core" }

# Inward seam contract owned by this crate.
backend-parser-parse-utilcmd-seams = { path = "../backend-parser-parse-utilcmd-seams" }

# The tcop/utility.c ProcessUtilitySlow fan-out reaches these parse-analysis
# transforms (transformCreateStmt / transformIndexStmt / transformStatsStmt)
# through outward seams this crate installs (cycle-free: out-seams is a leaf).
backend-tcop-utility-out-seams = { path = "../backend-tcop-utility-out-seams" }

# Outward dependency seams (catalog/relcache/partcache-bound leaves).
backend-parser-parse-utilcmd-outward-seams = { path = "../backend-parser-parse-utilcmd-outward-seams" }

# SystemAttributeByName lookup for index-constraint column resolution
# (decls-only seam crate: leaf, cycle-free).
backend-optimizer-util-plancat-ext-seams = { path = "../backend-optimizer-util-plancat-ext-seams" }

# ALTER TABLE ADD CONSTRAINT ... USING INDEX validation leg
# (transformIndexConstraint): BuildIndexInfo (expression/predicate/unique probe),
# get_index_constraint (already-a-constraint check), GetDefaultOpClass (default
# sorting behavior check). Decls-only seam crates: leaves, cycle-free.
backend-catalog-index-seams = { path = "../backend-catalog-index-seams" }
backend-catalog-pg-depend-seams = { path = "../backend-catalog-pg-depend-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }

# Merged sibling owner called directly (cycle-free): node equality for the
# index-redundancy dedup (equal()).
backend-nodes-equalfuncs = { path = "../backend-nodes-equalfuncs" }

# ParseState setup (make_parsestate) — reachable owner.
backend-parser-small1 = { path = "../backend-parser-small1" }

# Relation-threading + parse-analysis substrate for the relation-carrying
# transforms (transformIndexStmt / transformStatsStmt / transformOfType /
# transformPartitionBound). Cycle-free: none of these depend on parse-utilcmd.
types-rel = { path = "../types-rel" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
backend-access-common-relation = { path = "../backend-access-common-relation" }
backend-access-table-table = { path = "../backend-access-table-table" }
backend-parser-relation = { path = "../backend-parser-relation" }
backend-parser-clause = { path = "../backend-parser-clause" }
backend-parser-parse-expr = { path = "../backend-parser-parse-expr" }
backend-parser-parse-collate = { path = "../backend-parser-parse-collate" }
backend-parser-parse-target = { path = "../backend-parser-parse-target" }
backend-parser-parse-type = { path = "../backend-parser-parse-type" }

# Creation-namespace lookup (RangeVarGetAndCheckCreationNamespace) +
# get_namespace_name. Cycle-free leaves.
backend-catalog-namespace = { path = "../backend-catalog-namespace" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }

# transformOfType: composite-type rowtype read + error formatting.
backend-utils-cache-typcache = { path = "../backend-utils-cache-typcache" }
backend-utils-adt-format-type = { path = "../backend-utils-adt-format-type" }

# quote_qualified_identifier for the SERIAL nextval('...') default text —
# cycle-free leaf.
backend-utils-adt-ruleutils = { path = "../backend-utils-adt-ruleutils" }

# generateSerialExtraStmts: ChooseRelationName for the implicit sequence name.
# Cycle-free: indexcmds does not depend on parse-utilcmd.
backend-commands-indexcmds = { path = "../backend-commands-indexcmds" }

# transformRuleStmt: rule-action parse analysis (transformStmt) and the
# OLD/NEW-usage walkers (rangeTableEntry_used / getInsertSelectQueryIndex).
# Cycle-free: neither analyze nor rewrite-core depends on parse-utilcmd.
backend-parser-analyze = { path = "../backend-parser-analyze" }
backend-rewrite-core = { path = "../backend-rewrite-core" }

# getIdentitySequence (transformAlterTableStmt ALTER COLUMN TYPE / SET IDENTITY
# identity-sequence lookup). Cycle-free leaf.
backend-catalog-pg-depend = { path = "../backend-catalog-pg-depend" }

# generateClonedIndexStmt: AM canorder (amapi), reloptions decode, pg_index /
# pg_constraint / pg_operator / pg_opclass / collation syscache projections,
# stringToNode reader, and get_tablespace_name. All cycle-free leaves.
backend-access-index-amapi = { path = "../backend-access-index-amapi" }
backend-access-common-reloptions = { path = "../backend-access-common-reloptions" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-nodes-read-seams = { path = "../backend-nodes-read-seams" }
backend-commands-tablespace = { path = "../backend-commands-tablespace" }

[dev-dependencies]
