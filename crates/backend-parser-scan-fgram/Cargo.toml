[package]
name = "backend-parser-scan-fgram"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_parser_scan"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
backend-parser-scansup = { package = "backend-parser-scansup-fgram", path = "../backend-parser-scansup-fgram" }
backend-utils-error = { package = "backend-utils-error-fgram", path = "../backend-utils-error-fgram" }
backend-utils-mb = { package = "backend-utils-mb-fgram", path = "../backend-utils-mb-fgram" }
backend-utils-mmgr = { package = "backend-utils-mmgr-fgram", path = "../backend-utils-mmgr-fgram" }
backend-utils-adt-numutils = { package = "backend-utils-adt-numutils-fgram", path = "../backend-utils-adt-numutils-fgram" }
common-keywords = { package = "common-keywords-fgram", path = "../common-keywords-fgram" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
pgrust-pg-ffi = { package = "pgrust-pg-ffi-fgram", path = "../pgrust-pg-ffi-fgram" }
libc = { version = "0.2", default-features = false }
