[package]
name = "backend-parser-scansup-fgram"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_parser_scansup"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
backend-utils-error = { package = "backend-utils-error-fgram", path = "../backend-utils-error-fgram" }
backend-utils-mmgr = { package = "backend-utils-mmgr-fgram", path = "../backend-utils-mmgr-fgram" }
backend-utils-mb = { package = "backend-utils-mb-fgram", path = "../backend-utils-mb-fgram" }
pgrust-pg-ffi = { package = "pgrust-pg-ffi-fgram", path = "../pgrust-pg-ffi-fgram" }
libc = { version = "0.2", default-features = false }

[target.'cfg(target_family = "wasm")'.dependencies]
wasm-libc-shim = { path = "../wasm-libc-shim" }
