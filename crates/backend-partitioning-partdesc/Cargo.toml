[package]
name = "backend-partitioning-partdesc"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_partitioning_partdesc"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-error = { path = "../types-error" }
types-core = { path = "../types-core" }
types-nodes = { path = "../types-nodes" }
types-rel = { path = "../types-rel" }

# Seams I install (the partition-directory + partdesc surface).
backend-partitioning-core-seams = { path = "../backend-partitioning-core-seams" }

# Real ported dependencies (no cycle): the pg_inherits child scan, the default-
# partition OID lookup, and get_rel_relkind.
backend-catalog-pg-inherits = { path = "../backend-catalog-pg-inherits" }
backend-catalog-partition = { path = "../backend-catalog-partition" }

# This unit's own inward seam crate (RelationGetPartitionDesc, installed below).
backend-partitioning-partdesc-seams = { path = "../backend-partitioning-partdesc-seams" }

# Boundary seams consumed by the build/lookup paths.
backend-partitioning-partbounds-seams = { path = "../backend-partitioning-partbounds-seams" }
backend-utils-cache-partcache-seams = { path = "../backend-utils-cache-partcache-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
backend-nodes-read-seams = { path = "../backend-nodes-read-seams" }
