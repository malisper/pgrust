[package]
name = "backend-pl-plpgsql-comp"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_pl_plpgsql_comp"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-plpgsql = { path = "../types-plpgsql" }
types-tuple = { path = "../types-tuple" }
# FunctionCallInfoBaseData for the plpgsql_compile entry signature.
types-nodes = { path = "../types-nodes" }

# Inward seams this crate installs (the scanner/grammar callbacks).
backend-pl-plpgsql-comp-seams = { path = "../backend-pl-plpgsql-comp-seams" }
# Namespace stack + tree-walker teardown (pl_funcs.c) — direct (no cycle).
backend-pl-plpgsql-funcs = { path = "../backend-pl-plpgsql-funcs" }
# The grammar this compiler runs (plpgsql_yyparse) + the scanner it drives.
backend-pl-plpgsql-gram = { path = "../backend-pl-plpgsql-gram" }
backend-pl-plpgsql-scanner = { path = "../backend-pl-plpgsql-scanner" }

# Namespace name resolution (catalog/namespace.c) — RangeVarGetRelid for
# %TYPE/%ROWTYPE over a table (plpgsql_parse_{c,}word{type,rowtype}).
backend-catalog-namespace-seams = { path = "../backend-catalog-namespace-seams" }
# typcache composite-tupdesc projection (utils/cache/typcache.c) — build_datatype
# records a named composite type's tupDesc_identifier for change detection.
backend-utils-cache-typcache-seams = { path = "../backend-utils-cache-typcache-seams" }
# Catalog / syscache reads (utils/cache/{syscache,lsyscache}.c).
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
# format_type_be (utils/adt/format_type.c) for diagnostics.
backend-utils-adt-format-type-seams = { path = "../backend-utils-adt-format-type-seams" }
# format_procedure (utils/adt/regproc.c) — fn_signature for the error-context line.
backend-utils-adt-regproc-seams = { path = "../backend-utils-adt-regproc-seams" }
# quote_identifier (utils/adt/ruleutils.c) — pl_gram.y's cursor-arg list uses it.
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
# cached_function_compile driver (utils/cache/funccache.c) — plpgsql_compile entry.
backend-utils-cache-funccache-seams = { path = "../backend-utils-cache-funccache-seams" }
# raw_parser syntax-only drive (parser/parser.c) for check_sql_expr (pl_gram.y).
backend-parser-driver-seams = { path = "../backend-parser-driver-seams" }
# typeStringToTypeName + typenameTypeIdAndMod (parser/parse_type.c) for
# parse_datatype (pl_gram.y) — the plpgsql-mode raw type-name parser.
backend-parser-parse-type = { path = "../backend-parser-parse-type" }
# check_function_bodies GUC read (guc.c) for the inline (DO) compile path.
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
