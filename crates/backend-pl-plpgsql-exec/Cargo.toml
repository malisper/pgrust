[package]
name = "backend-pl-plpgsql-exec"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_pl_plpgsql_exec"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
# The SETOF (RETURN QUERY / RETURN NEXT) materialize sink: the live
# ReturnSetInfo the executor-frame SRF dispatch threads across the dual-home
# fcinfo boundary (types_fmgr::mat_srf).
types-fmgr = { path = "../types-fmgr" }
types-plpgsql = { path = "../types-plpgsql" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
types-trigger = { path = "../types-trigger" }
types-rel = { path = "../types-rel" }
types-ri-triggers = { path = "../types-ri-triggers" }

# The expanded-record value substrate (make_/fetch_field/set_field/get_tuple).
backend-utils-adt-misc2 = { path = "../backend-utils-adt-misc2" }
# Building a transient record TupleDesc for SELECT ... INTO <record>.
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }
# coerce_function_result_tuple: declared/actual rowtype TupleDesc lookup +
# position-based tuple conversion for a composite function result.
backend-utils-cache-typcache = { path = "../backend-utils-cache-typcache" }
backend-access-common-next = { path = "../backend-access-common-next" }
backend-executor-execTuples = { path = "../backend-executor-execTuples" }
# The trigger-manager data accessors (tg_event / tg_trigtuple / tg_newtuple /
# tg_relation / tg_trigger / tg_argv / tg_nargs) + the BEFORE-trigger
# return-tuple channel (set_before_trigger_result_tuple).
backend-commands-trigger-seams = { path = "../backend-commands-trigger-seams" }
# TG_EVENT / TG_TAG promises read the event trigger's event/tag off the
# event-trigger firing side-channel.
backend-commands-event-trigger-seams = { path = "../backend-commands-event-trigger-seams" }

# Inward seam this crate installs (plpgsql_exec_get_datum_type_info).
backend-pl-plpgsql-exec-seams = { path = "../backend-pl-plpgsql-exec-seams" }
