[package]
name = "backend-pl-plpgsql-gram"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_pl_plpgsql_gram"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-plpgsql = { path = "../types-plpgsql" }
types-parsenodes = { path = "../types-parsenodes" }
backend-utils-error = { path = "../backend-utils-error" }
# The scanner this grammar drives (two-level lexer + token codes).
backend-pl-plpgsql-scanner = { path = "../backend-pl-plpgsql-scanner" }
# Non-keyword token codes shared with the core grammar (ICONST/SCONST/DOT_DOT/...).
backend-parser-scan-fgram = { path = "../backend-parser-scan-fgram" }
# Compiler builder/resolver callbacks (panic until pl_comp.c lands).
backend-pl-plpgsql-comp-seams = { path = "../backend-pl-plpgsql-comp-seams" }
# Namespace stack (pl_funcs.c) — direct (no cycle: funcs does not depend on gram).
backend-pl-plpgsql-funcs = { path = "../backend-pl-plpgsql-funcs" }
