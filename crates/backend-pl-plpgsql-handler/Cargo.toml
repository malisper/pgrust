[package]
name = "backend-pl-plpgsql-handler"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_pl_plpgsql_handler"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-plpgsql = { path = "../types-plpgsql" }
types-fmgr = { path = "../types-fmgr" }
types-parsenodes = { path = "../types-parsenodes" }

# The three plpgsql layers this handler drives.
backend-pl-plpgsql-comp = { path = "../backend-pl-plpgsql-comp" }
backend-pl-plpgsql-exec = { path = "../backend-pl-plpgsql-exec" }
backend-pl-plpgsql-funcs = { path = "../backend-pl-plpgsql-funcs" }

# SPI_connect_ext / SPI_finish bracketing (spi.c) — direct (top layer, no cycle).
backend-executor-spi = { path = "../backend-executor-spi" }

# The fmgr built-in registry: register the three handler PGFunctions so a
# C-language pg_proc row (prosrc = "plpgsql_call_handler" / ...) resolves here.
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }

# The DO-block dispatch seam this crate installs (execute_inline_handler) +
# the InlineCodeBlock carrier.
backend-commands-functioncmds-seams = { path = "../backend-commands-functioncmds-seams" }

# SplitIdentifierString for the extra_warnings/extra_errors GUC check hook
# (utils/adt/varlena.c) — direct.
backend-utils-adt-varlena = { path = "../backend-utils-adt-varlena" }
