[package]
name = "backend-pl-plpgsql-handler"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_pl_plpgsql_handler"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-plpgsql = { path = "../types-plpgsql" }
types-fmgr = { path = "../types-fmgr" }
types-parsenodes = { path = "../types-parsenodes" }

# The three plpgsql layers this handler drives.
backend-pl-plpgsql-comp = { path = "../backend-pl-plpgsql-comp" }
backend-pl-plpgsql-exec = { path = "../backend-pl-plpgsql-exec" }
backend-pl-plpgsql-exec-seams = { path = "../backend-pl-plpgsql-exec-seams" }
backend-pl-plpgsql-funcs = { path = "../backend-pl-plpgsql-funcs" }

# SPI_connect_ext / SPI_finish bracketing (spi.c) — direct (top layer, no cycle).
backend-executor-spi = { path = "../backend-executor-spi" }

# BeginInternalSubTransaction / ReleaseCurrentSubTransaction /
# RollbackAndReleaseCurrentSubTransaction (xact.c) for the exec_stmt_block
# EXCEPTION leg — direct (top layer, no cycle).
backend-access-transam-xact = { path = "../backend-access-transam-xact" }

# CurrentResourceOwner get/set for the exec_stmt_block EXCEPTION leg's
# `oldowner = CurrentResourceOwner` snapshot+restore around the internal
# subtransaction (pl_exec.c) — direct (top layer, no cycle).
backend-utils-resowner-resowner-seams = { path = "../backend-utils-resowner-resowner-seams" }

# The fmgr built-in registry: register the three handler PGFunctions so a
# C-language pg_proc row (prosrc = "plpgsql_call_handler" / ...) resolves here.
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }

# The in-process ported-library loader registry: register `$libdir/plpgsql` so
# fmgr resolves the LANGUAGE C call handler / inline handler / validator without
# the OS dynamic loader (the Rust backend exposes no C ABI).
backend-utils-fmgr-dfmgr-seams = { path = "../backend-utils-fmgr-dfmgr-seams" }

# The DO-block dispatch seam this crate installs (execute_inline_handler) +
# the InlineCodeBlock carrier.
backend-commands-functioncmds-seams = { path = "../backend-commands-functioncmds-seams" }

# SplitIdentifierString for the extra_warnings/extra_errors GUC check hook
# (utils/adt/varlena.c) — direct.
backend-utils-adt-varlena = { path = "../backend-utils-adt-varlena" }

# plpgsql_validator substrate: CheckFunctionValidatorAccess (pg_proc access
# gate), the pg_proc row read, get_typtype (pseudotype reject), format_type_be
# (error text), and the check_function_bodies GUC.
backend-catalog-pg-proc-seams = { path = "../backend-catalog-pg-proc-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }

# convert_value_to_string (getTypeOutputInfo + OidOutputFunctionCall) for RAISE
# % substitution / USING text, and the I/O-coercion exec_cast_value fallback
# (output via source typoutput + input via target typinput).
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }

# The elog report cycle (ereport / ThrowErrorData) for the RAISE statement: a
# NOTICE/WARNING/INFO/LOG is reported to the client; an ERROR is thrown.
backend-utils-error = { path = "../backend-utils-error" }
backend-utils-adt-format-type-seams = { path = "../backend-utils-adt-format-type-seams" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
types-tuple = { path = "../types-tuple" }
types-catalog = { path = "../types-catalog" }

# construct_array for the TG_ARGV text[] promise (plpgsql_fulfill_promise);
# array iteration for exec_stmt_foreach_a (foreach_iterate_via_array).
backend-utils-adt-arrayfuncs = { path = "../backend-utils-adt-arrayfuncs" }
backend-access-common-detoast-seams = { path = "../backend-access-common-detoast-seams" }
