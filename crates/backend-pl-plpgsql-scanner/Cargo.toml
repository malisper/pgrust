[package]
name = "backend-pl-plpgsql-scanner"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_pl_plpgsql_scanner"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-plpgsql = { path = "../types-plpgsql" }
# Core SQL scanner (scan.l): the plpgsql scanner is a wrapper around it.
backend-parser-scan-fgram = { path = "../backend-parser-scan-fgram" }
backend-parser-scan-seams = { path = "../backend-parser-scan-seams" }
# pg_mbstrlen_with_len (byte-offset -> character cursor for error positions).
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
# pg_strtoint32_safe — re-derive the ICONST integer value (core_yylex's ival is
# not carried across the CoreToken seam) for K_SLICE / array-subscript ICONST.
backend-utils-adt-numutils = { path = "../backend-utils-adt-numutils" }
backend-utils-error = { path = "../backend-utils-error" }
# plpgsql_parse_word/dblword/tripword (pl_comp.c — not yet ported; via seam).
backend-pl-plpgsql-comp-seams = { path = "../backend-pl-plpgsql-comp-seams" }

[dev-dependencies]
backend-parser-gram-core = { path = "../backend-parser-gram-core" }
