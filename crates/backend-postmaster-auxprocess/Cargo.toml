[package]
name = "backend-postmaster-auxprocess"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_postmaster_auxprocess"
path = "src/lib.rs"

[dependencies]
types-error = { path = "../types-error" }
types-tuple = { path = "../types-tuple" }

# Memory-context handle (TopMemoryContext for the InitAuxiliaryProcess context).
mcx = { path = "../mcx" }

# Its own inward seam (installed by init_seams).
backend-postmaster-auxprocess-seams = { path = "../backend-postmaster-auxprocess-seams" }

# Directly-callable ported crates (genuine reuse, acyclic — auxprocess sits
# above proc / procsignal in the bring-up order).
backend-storage-lmgr-proc = { path = "../backend-storage-lmgr-proc" }
backend-storage-ipc-procsignal = { path = "../backend-storage-ipc-procsignal" }

# Outward owner seam crates (calls routed through installed seams).
backend-postmaster-postmaster-seams = { path = "../backend-postmaster-postmaster-seams" }
backend-utils-misc-more-seams = { path = "../backend-utils-misc-more-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-init-postinit-seams = { path = "../backend-utils-init-postinit-seams" }
backend-utils-resowner-resowner-seams = { path = "../backend-utils-resowner-resowner-seams" }
backend-utils-activity-status-seams = { path = "../backend-utils-activity-status-seams" }
backend-utils-activity-waitevent-seams = { path = "../backend-utils-activity-waitevent-seams" }
backend-utils-mmgr-mcxt-seams = { path = "../backend-utils-mmgr-mcxt-seams" }
backend-storage-ipc-dsm-core-seams = { path = "../backend-storage-ipc-dsm-core-seams" }
backend-storage-lmgr-lwlock-seams = { path = "../backend-storage-lmgr-lwlock-seams" }
backend-storage-lmgr-condition-variable-seams = { path = "../backend-storage-lmgr-condition-variable-seams" }
