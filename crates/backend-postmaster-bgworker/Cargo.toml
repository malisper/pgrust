[package]
name = "backend-postmaster-bgworker"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_postmaster_bgworker"
path = "src/lib.rs"

[dependencies]
types-tuple = { path = "../types-tuple" }
backend-access-transam-parallel = { path = "../backend-access-transam-parallel" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-bgworker = { path = "../types-bgworker" }
types-datum = { path = "../types-datum" }
types-startup = { path = "../types-startup" }
types-storage = { path = "../types-storage" }
types-pgstat = { path = "../types-pgstat" }

# Owner -seams crates this unit calls across dependency cycles.
backend-postmaster-bgworker-seams = { path = "../backend-postmaster-bgworker-seams" }
# Parallel-worker bring-up: BackgroundWorkerInitializeConnectionByOid (parallel.c).
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-init-postinit-seams = { path = "../backend-utils-init-postinit-seams" }
backend-utils-misc-ps-status-seams = { path = "../backend-utils-misc-ps-status-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-storage-ipc-shmem-seams = { path = "../backend-storage-ipc-shmem-seams" }
backend-storage-ipc-pmsignal-seams = { path = "../backend-storage-ipc-pmsignal-seams" }
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }
backend-storage-ipc-dsm-core-seams = { path = "../backend-storage-ipc-dsm-core-seams" }
backend-storage-lmgr-lwlock-seams = { path = "../backend-storage-lmgr-lwlock-seams" }
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
backend-postmaster-postmaster-seams = { path = "../backend-postmaster-postmaster-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-libpq-pqsignal-seams = { path = "../backend-libpq-pqsignal-seams" }
port-pgsleep-seams = { path = "../port-pgsleep-seams" }

# Direct deps (acyclic): error reporting.
backend-utils-error = { path = "../backend-utils-error" }
backend-utils-error-seams = { path = "../backend-utils-error-seams" }

# BackgroundWorkerMain's inline signal-handler block (bgworker.c:775-802):
# the `pqsignal()` installer + the per-signal handler bodies it references.
# Nothing depends on this crate, so these owner deps are acyclic.
types-signal = { path = "../types-signal" }
port-pqsignal = { path = "../port-pqsignal" }
libc = "0.2"
backend-tcop-postgres = { path = "../backend-tcop-postgres" }
backend-storage-ipc-procsignal = { path = "../backend-storage-ipc-procsignal" }
backend-utils-misc-timeout = { path = "../backend-utils-misc-timeout" }
# Core bgworker entry points dispatched by `call_bgworker_entrypoint` (acyclic:
# these subsystem crates depend only on bgworker's *-seams, not this crate).
backend-replication-logical-launcher = { path = "../backend-replication-logical-launcher" }
backend-replication-logical-applyparallelworker = { path = "../backend-replication-logical-applyparallelworker" }
