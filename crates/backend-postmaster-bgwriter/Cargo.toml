[package]
name = "backend-postmaster-bgwriter"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_postmaster_bgwriter"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-startup = { path = "../types-startup" }
types-pgstat = { path = "../types-pgstat" }
types-storage = { path = "../types-storage" }

# ereport/elog and the error-report helpers (grounded leaf).
backend-utils-error = { path = "../backend-utils-error" }
# ConfigReloadPending / ShutdownRequestPending + ProcessMainLoopInterrupts.
backend-postmaster-interrupt = { path = "../backend-postmaster-interrupt" }

# Real, fully-ported owners the bgwriter genuinely drives (no cycle — the
# bgwriter is a top-level leaf process):
#   * the buffer-manager LRU pass (BgBufferSync / WritebackContextInit /
#     StrategyNotifyBgWriter) — BgBufferSyncState is designed to be owned by
#     this main loop and threaded back in each cycle.
backend-storage-buffer-bufmgr = { path = "../backend-storage-buffer-bufmgr" }
#   * FirstCallSinceLastCheckpoint (checkpointer).
backend-postmaster-checkpointer = { path = "../backend-postmaster-checkpointer" }
#   * pgstat_report_bgwriter (cumulative-stats bgwriter report).
backend-utils-activity-small = { path = "../backend-utils-activity-small" }

# GUC table/slots — bgwriter owns the `BgWriterDelay` (bgwriter.c:58) backing
# the GUC engine reads through `vars::BgWriterDelay` (`conf->variable`).
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# Its own inward seams (installed by init_seams).
backend-postmaster-bgwriter-seams = { path = "../backend-postmaster-bgwriter-seams" }

# Outward owner seam crates (panic-until-owner where the owner is unported).
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }
backend-storage-ipc-dsm-core-seams = { path = "../backend-storage-ipc-dsm-core-seams" }
backend-storage-lmgr-lwlock-seams = { path = "../backend-storage-lmgr-lwlock-seams" }
backend-storage-lmgr-condition-variable-seams = { path = "../backend-storage-lmgr-condition-variable-seams" }
backend-storage-aio-aio-seams = { path = "../backend-storage-aio-aio-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-storage-smgr-seams = { path = "../backend-storage-smgr-seams" }
backend-postmaster-auxprocess-seams = { path = "../backend-postmaster-auxprocess-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-resowner-seams = { path = "../backend-utils-resowner-seams" }
backend-utils-hash-dynahash-seams = { path = "../backend-utils-hash-dynahash-seams" }
backend-utils-activity-waitevent-seams = { path = "../backend-utils-activity-waitevent-seams" }
backend-utils-activity-pgstat-wal-seams = { path = "../backend-utils-activity-pgstat-wal-seams" }
backend-utils-adt-timestamp-seams = { path = "../backend-utils-adt-timestamp-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
port-pgsleep-seams = { path = "../port-pgsleep-seams" }
