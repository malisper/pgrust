[package]
name = "backend-postmaster-checkpointer"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_postmaster_checkpointer"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-wal = { path = "../types-wal" }
types-pgstat = { path = "../types-pgstat" }
types-condvar = { path = "../types-condvar" }
types-startup = { path = "../types-startup" }
types-tuple = { path = "../types-tuple" }

# ereport/elog and the error-report helpers.
backend-utils-error = { path = "../backend-utils-error" }
# ConfigReloadPending / ShutdownRequestPending live here (ported).
backend-postmaster-interrupt = { path = "../backend-postmaster-interrupt" }
# Real spinlock (slock_t) — a ported crate, not a seam.
backend-storage-lmgr-s-lock = { path = "../backend-storage-lmgr-s-lock" }
# pgstat checkpointer pending-stats accessor + report (acyclic: seams-only crate).
backend-utils-activity-small = { path = "../backend-utils-activity-small" }

# Its own inward seams (installed by init_seams).
backend-postmaster-checkpointer-seams = { path = "../backend-postmaster-checkpointer-seams" }

# ProcessUtility dispatch arm (installs the CHECKPOINT forwarding seam).
backend-tcop-utility-out-seams = { path = "../backend-tcop-utility-out-seams" }

# Outward owner seam crates.
backend-storage-ipc-shmem-seams = { path = "../backend-storage-ipc-shmem-seams" }
