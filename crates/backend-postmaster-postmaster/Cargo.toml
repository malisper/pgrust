[package]
name = "backend-postmaster-postmaster"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_postmaster_postmaster"
path = "src/lib.rs"

[dependencies]
# Its own inward seam crate (installed by init_seams).
backend-postmaster-postmaster-seams = { path = "../backend-postmaster-postmaster-seams" }

# Directly-callable ported crate: pmchild owns ActiveChildList + the PMChild
# slab; postmaster.c iterates/mutates those entries through its access
# primitives. Acyclic: postmaster sits above pmchild in the bring-up order.
backend-postmaster-pmchild = { path = "../backend-postmaster-pmchild" }

# Real fork()/dispatch chokepoint: postmaster_child_launch forks a child and
# dispatches to its Main function (the child path is fully wired). Acyclic:
# launch-backend depends only on the postmaster *seams* crate, not this one.
backend-postmaster-launch-backend = { path = "../backend-postmaster-launch-backend" }

# Sockets: ListenServerPort / AcceptConnection / TouchSocketFiles.
backend-libpq-pqcomm = { path = "../backend-libpq-pqcomm" }

# WaitEventSet (the postmaster main-loop poll set) + the owning wrapper.
backend-storage-ipc-waiteventset = { path = "../backend-storage-ipc-waiteventset" }
backend-storage-ipc-waiteventset-seams = { path = "../backend-storage-ipc-waiteventset-seams" }

# The postmaster's own latch (MyLatch) — set/reset, and read for the wait set.
backend-storage-ipc-latch = { path = "../backend-storage-ipc-latch" }

# pmsignal: CheckPostmasterSignal / SetQuitSignalReason / IsPostmasterChildWalSender.
backend-storage-ipc-pmsignal = { path = "../backend-storage-ipc-pmsignal" }
# pmsignal-seams: install set_postmaster_death_watch_cloexec (postmaster owns the
# death-watch fd; the cloexec set is consumed by miscinit's InitPostmasterChild).
backend-storage-ipc-pmsignal-seams = { path = "../backend-storage-ipc-pmsignal-seams" }

# ereport surface.
backend-utils-error = { path = "../backend-utils-error" }

# Shared types.
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-net = { path = "../types-net" }
types-startup = { path = "../types-startup" }
types-storage = { path = "../types-storage" }
types-bgworker = { path = "../types-bgworker" }
types-guc = { path = "../types-guc" }

# Real installed init seams (the same surface single_user.rs drives).
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
# guc_tables.c GUC variable slots — postmaster.c reads its own GUC globals
# (EnableSSL/ListenAddresses/PostPortNumber/...) through these `conf->variable`
# slots, exactly as the C postmaster reads the globals declared in postmaster.c.
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
backend-utils-init-postinit-seams = { path = "../backend-utils-init-postinit-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-storage-ipc-ipci-seams = { path = "../backend-storage-ipc-ipci-seams" }
backend-storage-ipc-ipc-seams = { path = "../backend-storage-ipc-ipc-seams" }
backend-utils-adt-timestamp-seams = { path = "../backend-utils-adt-timestamp-seams" }
backend-postmaster-pmchild-seams = { path = "../backend-postmaster-pmchild-seams" }
backend-postmaster-bgworker-seams = { path = "../backend-postmaster-bgworker-seams" }
backend-utils-activity-status-seams = { path = "../backend-utils-activity-status-seams" }
# The shared host/GUC/config/shmem bring-up seams the single-user driver also
# uses (real owners installed). Seams crate — acyclic.
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-utils-init-small = { path = "../backend-utils-init-small" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
# Postmaster-owned signal-handler + process-local-latch setup.
port-pqsignal = { path = "../port-pqsignal" }
backend-libpq-pqsignal = { path = "../backend-libpq-pqsignal" }
backend-utils-init-miscinit = { path = "../backend-utils-init-miscinit" }
types-signal = { path = "../types-signal" }
mcx = { path = "../mcx" }
backend-replication-logical-launcher = { path = "../backend-replication-logical-launcher" }

# Direct syscall chokepoint (waitpid/kill/time/close/pipe), mirroring how
# fork-process calls libc::fork directly.
libc = "0.2"

[dev-dependencies]
backend-replication-walsender-seams = { path = "../backend-replication-walsender-seams" }
backend-postmaster-autovacuum-seams = { path = "../backend-postmaster-autovacuum-seams" }
backend-postmaster-launch-backend-seams = { path = "../backend-postmaster-launch-backend-seams" }
