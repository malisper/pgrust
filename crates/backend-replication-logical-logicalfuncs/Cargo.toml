[package]
name = "backend-replication-logical-logicalfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_replication_logical_logicalfuncs"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-logical = { path = "../types-logical" }
backend-utils-error = { path = "../backend-utils-error" }

# Same-subsystem landed owner: LogLogicalMessage (message.c).
backend-replication-logical-message = { path = "../backend-replication-logical-message" }

# The decode driver + per-context output routing (#351).
backend-replication-logical-logical = { path = "../backend-replication-logical-logical" }
backend-replication-logical-logical-seams = { path = "../backend-replication-logical-logical-seams" }
backend-replication-logical-decode-seams = { path = "../backend-replication-logical-decode-seams" }

# `ctx->out` StringInfo backing store (read the decoded bytes back out).
backend-utils-mmgr-mcxt-seams = { path = "../backend-utils-mmgr-mcxt-seams" }

# Slot acquire/release + CheckSlotPermissions + ReplicationSlotMarkDirty.
backend-replication-slot = { path = "../backend-replication-slot" }

# end-of-WAL + the local-read XLogReader step.
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-xlogreader-seams = { path = "../backend-access-transam-xlogreader-seams" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }

# fmgr builtin registration (pg_logical_emit_message_{text,bytea}).
types-fmgr = { path = "../types-fmgr" }
types-datum = { path = "../types-datum" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
