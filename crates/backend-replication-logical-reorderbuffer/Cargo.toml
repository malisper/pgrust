[package]
name = "backend-replication-logical-reorderbuffer"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_replication_logical_reorderbuffer"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-snapshot = { path = "../types-snapshot" }
types-logical = { path = "../types-logical" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
mcx = { path = "../mcx" }

# cross-crate seams the snapshot-management family consumes
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }

# change-replay family deps: the k-way merge binary heap + the inval seam that
# ReorderBufferExecuteInvalidations applies decoded invalidations through.
backend-lib-binaryheap = { path = "../backend-lib-binaryheap" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }

# own inward seams
backend-replication-logical-reorderbuffer-seams = { path = "../backend-replication-logical-reorderbuffer-seams" }
