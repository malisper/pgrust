[package]
name = "backend-replication-logical-reorderbuffer"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_replication_logical_reorderbuffer"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-snapshot = { path = "../types-snapshot" }
types-logical = { path = "../types-logical" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
mcx = { path = "../mcx" }

# cross-crate seams the snapshot-management family consumes
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
# SetupHistoricSnapshot/TeardownHistoricSnapshot/HistoricSnapshotGetTupleCids —
# the snapmgr half of the historic (logical-decoding) snapshot. snapmgr owns the
# active tuplecid map; reorderbuffer installs/reads it across these seams.
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }

# change-replay family deps: the k-way merge binary heap + the inval seam that
# ReorderBufferExecuteInvalidations applies decoded invalidations through.
backend-lib-binaryheap = { path = "../backend-lib-binaryheap" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
# ReorderBufferImmediateInvalidation forces invalidations to apply outside a
# valid (sub)transaction: IsTransactionOrTransactionBlock / BeginInternalSubTransaction
# / AbortCurrentTransaction / RollbackAndReleaseCurrentSubTransaction.
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }

# spill-to-disk family deps: the slot directory + spill filename
# (ReorderBufferSerializedPath reads MyReplicationSlot's name), the fd / VFD
# layer the segment files are written/read through, and wal_segment_size for the
# LSN -> segment mapping (XLByteToSeg / XLogSegNoOffsetToRecPtr).
backend-replication-slot-seams = { path = "../backend-replication-slot-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
libc = "0.2"

# GUC slots: reorderbuffer.c owns the backing storage for the
# `logical_decoding_work_mem` / `debug_logical_replication_streaming` GUC
# variables (the `int logical_decoding_work_mem;` /
# `int debug_logical_replication_streaming;` globals), so it installs their
# `conf->variable` accessors here.
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# own inward seams
backend-replication-logical-reorderbuffer-seams = { path = "../backend-replication-logical-reorderbuffer-seams" }

# output-plugin dispatch: ReorderBufferProcessTXN re-enters logical decoding
# through this inward seam (the `rb->private_data == ctx` bridge) to drive the
# begin/commit/message/prepare/stream/update_progress output-plugin callbacks.
backend-replication-logical-logical-seams = { path = "../backend-replication-logical-logical-seams" }

# change-replay relcache resolution: ReorderBufferProcessTXN resolves each
# decoded change's relation from its relfilenumber (RelidByRelfilenumber) and
# screens it (RelationIsLogicallyLogged / IsToastRelation / relrewrite /
# relkind) before dispatching to the output plugin.
backend-utils-cache-relfilenumbermap = { path = "../backend-utils-cache-relfilenumbermap" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }

[target.'cfg(target_family = "wasm")'.dependencies]
wasm-libc-shim = { path = "../wasm-libc-shim" }
