[package]
name = "backend-replication-logical-snapbuild"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_replication_logical_snapbuild"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-snapshot = { path = "../types-snapshot" }
types-logical = { path = "../types-logical" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
types-xlog-records = { path = "../types-xlog-records" }
types-pgstat = { path = "../types-pgstat" }
types-nodes = { path = "../types-nodes" }
mcx = { path = "../mcx" }

# own inward seams (two seam crates declare snapbuild's inward seams)
backend-replication-logical-snapbuild-seams = { path = "../backend-replication-logical-snapbuild-seams" }
backend-replication-snapbuild-seams = { path = "../backend-replication-snapbuild-seams" }

# transaction-id helpers (direct deps, no cycle)
backend-access-transam-transam = { path = "../backend-access-transam-transam" }
backend-access-transam-varsup = { path = "../backend-access-transam-varsup" }

# error reporting
backend-utils-error = { path = "../backend-utils-error" }

# CRC32C for the on-disk snapshot serialization
port-crc32c-seams = { path = "../port-crc32c-seams" }

# outward owner seams
backend-replication-logical-reorderbuffer-seams = { path = "../backend-replication-logical-reorderbuffer-seams" }
backend-replication-logical-logical-seams = { path = "../backend-replication-logical-logical-seams" }
backend-replication-slot-seams = { path = "../backend-replication-slot-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-storage-ipc-procarray-seams = { path = "../backend-storage-ipc-procarray-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-replication-logical-origin-extern-seams = { path = "../backend-replication-logical-origin-extern-seams" }
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-utils-activity-waitevent-seams = { path = "../backend-utils-activity-waitevent-seams" }
backend-utils-resowner-resowner-seams = { path = "../backend-utils-resowner-resowner-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
