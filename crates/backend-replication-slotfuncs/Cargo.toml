[package]
name = "backend-replication-slotfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_replication_slotfuncs"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
backend-utils-error = { path = "../backend-utils-error" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-fmgr = { path = "../types-fmgr" }
types-nodes = { path = "../types-nodes" }
types-wal = { path = "../types-wal" }
types-logical = { path = "../types-logical" }
types-replication-slot = { path = "../types-replication-slot" }

# fmgr builtin table (by-OID dispatch registration).
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
# Same-subsystem landed owners (acyclic: none of these call slotfuncs).
backend-replication-slot = { path = "../backend-replication-slot" }
backend-replication-logical-logical = { path = "../backend-replication-logical-logical" }
backend-replication-walsender = { path = "../backend-replication-walsender" }
# Owner seam crates (calls into not-yet-installed owners panic until they land).
backend-utils-fmgr-funcapi-seams = { path = "../backend-utils-fmgr-funcapi-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-xlogrecovery-seams = { path = "../backend-access-transam-xlogrecovery-seams" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
backend-utils-fmgr-dfmgr-seams = { path = "../backend-utils-fmgr-dfmgr-seams" }
backend-replication-logical-slotsync-seams = { path = "../backend-replication-logical-slotsync-seams" }
backend-replication-libpqwalreceiver-seams = { path = "../backend-replication-libpqwalreceiver-seams" }
