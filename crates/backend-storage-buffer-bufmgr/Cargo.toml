[package]
name = "backend-storage-buffer-bufmgr"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_buffer_bufmgr"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-condvar = { path = "../types-condvar" }
# The FSM page round-trip seam materialises the page body as an owned FSMPageData.
types-fsm = { path = "../types-fsm" }
# The lazy-vacuum page-read seam returns LinePointerState (vacuumlazy.rs).
types-vacuum = { path = "../types-vacuum" }
# Lazy-vacuum driver's BufferGetPage(buffer)-over-page seams home in
# vacuumlazy-seams (re-signed off `Buffer`); the buffer manager is their owner.
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }
# F2a `BufferAlloc` tests relpersistence against RELPERSISTENCE_PERMANENT;
# F2b extend reads `rd_rel->relpersistence` (RELPERSISTENCE_TEMP/PERMANENT).
types-tuple = { path = "../types-tuple" }
# F2b: the relation-extension seams take `&Relation`; the extend path resolves
# the physical id off rd_locator/rd_backend/rd_rel->relpersistence directly.
types-rel = { path = "../types-rel" }
mcx = { path = "../mcx" }
# The per-buffer content LWLock array (one real LWLock per buffer, tranche
# LWTRANCHE_BUFFER_CONTENT) is a DIRECT dependency: LockBuffer maps a Buffer to
# `&content_locks[buf_id]` and calls `LWLockAcquire` directly (no central seam).
backend-storage-lmgr-lwlock = { path = "../backend-storage-lmgr-lwlock" }
# The per-buffer I/O ConditionVariable array (BufferIOCVArray) is a DIRECT
# dependency for ConditionVariableInit / Broadcast / Sleep on a buffer id.
backend-storage-lmgr-condition-variable = { path = "../backend-storage-lmgr-condition-variable" }
# This crate OWNS and installs the bufmgr seams (the 4 header/freelist seams in
# F1a; the rest in F1b-d).
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
# The `BufferIsLocal` read arms of BufferGetBlockNumber/BufferGetTag/
# BufferGetLSNAtomic dispatch into localbuf.c via the support-seams crate
# (declared there, installed by the buffer-support owner). Leaf seam crate —
# no cycle.
backend-storage-buffer-support-seams = { path = "../backend-storage-buffer-support-seams" }
# F2a: the buffer-mapping hash table (BufTable) + the strategy/freelist control
# block (BufferStrategyControl + ClockSweep) live in the buffer-support crate
# (buf_table.c / freelist.c). BufferManager OWNS one of each (BufferManagerShmemInit
# == InitBufTable + StrategyInitialize) and drives victim selection through them.
backend-storage-buffer-support = { path = "../backend-storage-buffer-support" }
# WakePinCountWaiter signals the parked pin-count waiter via its process latch
# (ProcSendSignal == SetLatch on procLatch) — an outward proc seam. Also
# my_proc_number / proc_wait_for_signal / my_proc_set_delay_chkpt_start (F1c).
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
# F1c `MarkBufferDirtyHint` writes the page LSN under the header lock via the
# real `PageSetLSN`/`PageMut` (a direct bufpage dep, no raw byte poke).
backend-storage-page = { path = "../backend-storage-page" }
# F1c `MarkBufferDirtyHint` hint-FPI leg: XLogHintBitIsNeeded / RecoveryInProgress
# (xlog-seams), RelFileLocatorSkippingWAL (catalog-storage-seams),
# XLogSaveBufferForHint (xloginsert-seams), and the ps-display "waiting" suffix on
# the cleanup-lock wait (ps-status-seams).
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-xloginsert-seams = { path = "../backend-access-transam-xloginsert-seams" }
backend-catalog-storage-seams = { path = "../backend-catalog-storage-seams" }
backend-utils-misc-ps-status-seams = { path = "../backend-utils-misc-ps-status-seams" }
# F2b: smgr fork primitives (nblocks / nblocks_cached / exists / create /
# zeroextend) are DIRECT calls (the smgr crate is below the buffer manager).
backend-storage-smgr-smgr = { path = "../backend-storage-smgr-smgr" }
# F2b: the relation-extension lock (LockRelationForExtension RAII guard).
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }
# F2b: MaxBackends (the proportional-pin divisor MaxBackends+NUM_AUXILIARY_PROCS)
# and HOLD_INTERRUPTS/RESUME_INTERRUPTS bracketing the direct content-lock path.
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
# F3 read path: PageIsVerified failure on RBM_ZERO_ON_ERROR emits a WARNING via
# the real ereport/errstart cycle (and the ERROR path builds a PgError).
backend-utils-error = { path = "../backend-utils-error" }
# F3 WaitReadBuffers' retry loop runs CHECK_FOR_INTERRUPTS between re-issues.
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
# InitBufferManagerAccess registers the AtProcExit_Buffers cleanup via
# on_shmem_exit (ipc.c), reached through the ipc seam crate.
backend-storage-ipc-dsm-core-seams = { path = "../backend-storage-ipc-dsm-core-seams" }
# `BufferManagerShmemInit`/`Size` (buf_init.c) carve the four named buffer-pool
# regions via `ShmemInitStruct` + the `add_size`/`mul_size` overflow-checked
# size arithmetic.
backend-storage-ipc-shmem-seams = { path = "../backend-storage-ipc-shmem-seams" }
# `BufferManagerShmemSize`/`Init` read the `NBuffers` GUC global (the C
# bufmgr.c global).
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
