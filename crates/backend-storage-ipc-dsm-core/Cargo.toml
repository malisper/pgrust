[package]
name = "backend-storage-ipc-dsm-core"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_ipc_dsm_core"
path = "src/lib.rs"

[features]
# Exposes `test_bringup::dsm_test_bringup()` for downstream unit tests (e.g.
# the real-DSM re-port of the parallel crate). Pulls in the merged
# FreePageManager owner so its real `init_seams()` can be wired.
test-bringup = ["dep:backend-utils-mmgr-freepage"]

[dependencies]
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
backend-utils-mmgr-freepage = { path = "../backend-utils-mmgr-freepage", optional = true }
backend-libpq-pqsignal = { path = "../backend-libpq-pqsignal" }
backend-storage-file-seams = { path = "../backend-storage-file-seams" }
backend-storage-ipc-dsm-core-seams = { path = "../backend-storage-ipc-dsm-core-seams" }
backend-storage-ipc-ipc-seams = { path = "../backend-storage-ipc-ipc-seams" }
backend-storage-ipc-shmem-seams = { path = "../backend-storage-ipc-shmem-seams" }
backend-storage-lmgr-lwlock = { path = "../backend-storage-lmgr-lwlock" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-utils-activity-waitevent-seams = { path = "../backend-utils-activity-waitevent-seams" }
backend-utils-error = { path = "../backend-utils-error" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-mmgr-freepage-seams = { path = "../backend-utils-mmgr-freepage-seams" }
libc = "0.2"
mcx = { path = "../mcx" }
pg-prng = { path = "../pg-prng" }
types-core = { path = "../types-core" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-error = { path = "../types-error" }
types-freepage = { path = "../types-freepage" }
types-guc = { path = "../types-guc" }
types-storage = { path = "../types-storage" }

# Available under cfg(test) so the in-crate gating test can use test_bringup
# without enabling the `test-bringup` feature; the feature pulls the same crate
# in for downstream consumers.
[dev-dependencies]
backend-utils-mmgr-freepage = { path = "../backend-utils-mmgr-freepage" }
