[package]
name = "backend-storage-ipc-sinval"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_ipc_sinval"
path = "src/lib.rs"

[dependencies]
libc = "0.2"

seam-core = { path = "../seam-core" }

types-core = { path = "../types-core" }
types-tuple = { path = "../types-tuple" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }

backend-utils-error = { path = "../backend-utils-error" }
backend-storage-lmgr-s-lock = { path = "../backend-storage-lmgr-s-lock" }

# inward seams (this crate installs them)
backend-storage-ipc-sinval-seams = { path = "../backend-storage-ipc-sinval-seams" }

# outward owner seams
backend-storage-ipc-shmem-seams = { path = "../backend-storage-ipc-shmem-seams" }
backend-storage-ipc-dsm-core-seams = { path = "../backend-storage-ipc-dsm-core-seams" }
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }
backend-storage-ipc-procsignal-seams = { path = "../backend-storage-ipc-procsignal-seams" }
backend-storage-lmgr-lwlock-seams = { path = "../backend-storage-lmgr-lwlock-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }

[target.'cfg(target_family = "wasm")'.dependencies]
wasm-libc-shim = { path = "../wasm-libc-shim" }
