[package]
name = "backend-storage-ipc-waiteventset"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_ipc_waiteventset"
path = "src/lib.rs"

[dependencies]
libc = "0.2"
backend-storage-ipc-waiteventset-seams = { path = "../backend-storage-ipc-waiteventset-seams" }
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }
backend-storage-ipc-pmsignal-seams = { path = "../backend-storage-ipc-pmsignal-seams" }
backend-storage-ipc-ipc-seams = { path = "../backend-storage-ipc-ipc-seams" }
backend-storage-file-seams = { path = "../backend-storage-file-seams" }
backend-utils-activity-waitevent-seams = { path = "../backend-utils-activity-waitevent-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
port-pqsignal-seams = { path = "../port-pqsignal-seams" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-signal = { path = "../types-signal" }
types-storage = { path = "../types-storage" }

# Linux-only (WAIT_USE_EPOLL + WAIT_USE_SIGNALFD path): the death-watch pipe fd
# and the UnBlockSig SIGURG manipulation. The kqueue build does not use these.
[target.'cfg(target_os = "linux")'.dependencies]
backend-postmaster-postmaster-seams = { path = "../backend-postmaster-postmaster-seams" }
backend-libpq-pqsignal-seams = { path = "../backend-libpq-pqsignal-seams" }
