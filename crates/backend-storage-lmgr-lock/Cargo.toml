[package]
name = "backend-storage-lmgr-lock"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_lmgr_lock"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-deadlock = { path = "../types-deadlock" }
mcx = { path = "../mcx" }

# Inward seams this unit installs.
backend-storage-lmgr-lock-seams = { path = "../backend-storage-lmgr-lock-seams" }

# proc.c owns the wait queue (JoinWaitQueue / ProcSleep / ProcWakeup /
# ProcLockWakeup) and the PGPROC array; lock.c calls these directly, lending
# &mut LOCK / &mut LOCALLOCK from its ambient table.
backend-storage-lmgr-proc = { path = "../backend-storage-lmgr-proc" }
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }

# Outward owner seams lock.c reaches.
backend-storage-lmgr-lwlock-seams = { path = "../backend-storage-lmgr-lwlock-seams" }
backend-storage-lmgr-deadlock-seams = { path = "../backend-storage-lmgr-deadlock-seams" }
backend-storage-ipc-shmem-seams = { path = "../backend-storage-ipc-shmem-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-hash-dynahash-seams = { path = "../backend-utils-hash-dynahash-seams" }
common-hashfn-seams = { path = "../common-hashfn-seams" }

# lock.c owns the max_locks_per_transaction / log_lock_failures GUC storage
# cells (installs their accessors into the GUC table).
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# resowner.c bookkeeping (RememberLock / ForgetLock / GetParent /
# CurrentResourceOwner) the LOCALLOCK grant/release paths call.
backend-utils-resowner-seams = { path = "../backend-utils-resowner-seams" }

# lmgr.c owns DescribeLockTag; lock.c's describe_lock_tag seam (proc.c's
# log path) delegates to it.
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }

# Error reporting (WARNING / LOG ereports) + my_proc_pid + recovery-state +
# DeadLockReport.
backend-utils-error = { path = "../backend-utils-error" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-xlogrecovery-seams = { path = "../backend-access-transam-xlogrecovery-seams" }

# 2PC: AtPrepare_Locks registers TWOPHASE_RM_LOCK_ID records; the recover /
# postcommit / postabort callbacks reach the prepared-xact dummy PGPROC.
backend-access-transam-twophase-seams = { path = "../backend-access-transam-twophase-seams" }
backend-access-transam-twophase-rmgr = { path = "../backend-access-transam-twophase-rmgr" }

# lock_twophase_standby_recover hands relation AccessExclusiveLocks to the
# standby lock machinery.
backend-storage-ipc-standby-seams = { path = "../backend-storage-ipc-standby-seams" }
