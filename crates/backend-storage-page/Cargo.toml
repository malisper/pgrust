[package]
name = "backend-storage-page"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_page"
path = "src/lib.rs"

[features]
# Mirrors the C build-time `CLOBBER_FREED_MEMORY` define: when enabled, freed
# regions (here: truncated line-pointer slots) are overwritten with 0x7F as a
# debugging aid. Off by default, exactly like the C `#ifdef`.
clobber_freed_memory = []

[dependencies]
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-tuple = { path = "../types-tuple" }
mcx = { path = "../mcx" }
backend-utils-error = { path = "../backend-utils-error" }
backend-storage-page-checksum = { path = "../backend-storage-page-checksum" }
backend-storage-page-seams = { path = "../backend-storage-page-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
