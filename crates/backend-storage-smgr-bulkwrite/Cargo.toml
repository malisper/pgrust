[package]
name = "backend-storage-smgr-bulkwrite"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_smgr_bulkwrite"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-rel = { path = "../types-rel" }
types-tuple = { path = "../types-tuple" }
mcx = { path = "../mcx" }
backend-utils-error = { path = "../backend-utils-error" }

# smgr is BELOW bulkwrite (bulkwrite calls smgrnblocks/extend/write/...): direct.
backend-storage-smgr-smgr = { path = "../backend-storage-smgr-smgr" }
# Page checksum (bufpage.c) is ported and below bulkwrite: direct.
backend-storage-page = { path = "../backend-storage-page" }

# Seam crates this unit OWNS (installs every decl from its own init_seams()).
backend-storage-smgr-bulkwrite-seams = { path = "../backend-storage-smgr-bulkwrite-seams" }

# Outward owner seams (calls that would cycle / cross unported neighbors).
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-xloginsert-seams = { path = "../backend-access-transam-xloginsert-seams" }
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
