[package]
name = "backend-storage-smgr-md"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_smgr_md"
path = "src/lib.rs"

[dependencies]
libc = "0.2"
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
types-pgstat = { path = "../types-pgstat" }
mcx = { path = "../mcx" }
backend-utils-error = { path = "../backend-utils-error" }
backend-common-relpath = { path = "../backend-common-relpath" }
backend-storage-file-fd = { path = "../backend-storage-file-fd" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# Seam crates this unit OWNS (installs every decl from its own init_seams()).
backend-storage-smgr-md-seams = { path = "../backend-storage-smgr-md-seams" }

# Outward owner seams (calls that would cycle / cross unported neighbors).
backend-storage-sync-seams = { path = "../backend-storage-sync-seams" }
backend-access-transam-xlogrecovery-seams = { path = "../backend-access-transam-xlogrecovery-seams" }
backend-catalog-binary-upgrade-seams = { path = "../backend-catalog-binary-upgrade-seams" }
backend-commands-tablespace-seams = { path = "../backend-commands-tablespace-seams" }
