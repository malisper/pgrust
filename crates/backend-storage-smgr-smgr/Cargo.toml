[package]
name = "backend-storage-smgr-smgr"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_smgr_smgr"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }
mcx = { path = "../mcx" }
backend-utils-error = { path = "../backend-utils-error" }

# md is BELOW smgr (fd <- md <- smgr): a direct dep, no seam.
backend-storage-smgr-md = { path = "../backend-storage-smgr-md" }

# Seam crates this unit OWNS (installs every decl from its own init_seams()).
backend-storage-smgr-seams = { path = "../backend-storage-smgr-seams" }

# Outward owner seams (calls that would cycle / cross unported neighbors).
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
backend-access-transam-xlogutils-seams = { path = "../backend-access-transam-xlogutils-seams" }

[dev-dependencies]
types-core = { path = "../types-core" }
