[package]
name = "backend-storage-sync"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_storage_sync"
path = "src/lib.rs"

[dependencies]
libc = { version = "0.2", default-features = false }
backend-utils-error = { path = "../backend-utils-error" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }

# Own inward seams (installed by init_seams()).
backend-storage-sync-seams = { path = "../backend-storage-sync-seams" }

# Outward owner seams (calls that would cycle).
backend-postmaster-checkpointer-seams = { path = "../backend-postmaster-checkpointer-seams" }
backend-storage-file-seams = { path = "../backend-storage-file-seams" }
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }
backend-storage-smgr-md-seams = { path = "../backend-storage-smgr-md-seams" }
backend-access-transam-clog-seams = { path = "../backend-access-transam-clog-seams" }
backend-access-transam-commit-ts-seams = { path = "../backend-access-transam-commit-ts-seams" }
backend-access-transam-multixact-seams = { path = "../backend-access-transam-multixact-seams" }

[dev-dependencies]
libc = { version = "0.2", default-features = false }
types-core = { path = "../types-core" }
