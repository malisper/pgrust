[package]
name = "backend-tcop-postgres"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_tcop_postgres"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
mcx = { path = "../mcx" }
backend-commands-matview-deps-seams = { path = "../backend-commands-matview-deps-seams" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-dest = { path = "../types-dest" }
types-guc = { path = "../types-guc" }
types-timeout = { path = "../types-timeout" }
types-storage = { path = "../types-storage" }
types-pgstat = { path = "../types-pgstat" }
types-stringinfo = { path = "../types-stringinfo" }
types-startup = { path = "../types-startup" }

backend-utils-error = { path = "../backend-utils-error" }
backend-utils-init-small = { path = "../backend-utils-init-small" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
backend-utils-misc-timeout = { path = "../backend-utils-misc-timeout" }

# Ported owner crates of cross-unit callees (acyclic: each depends only on
# `backend-tcop-postgres-seams`, never on this owner crate).
backend-storage-ipc-procsignal = { path = "../backend-storage-ipc-procsignal" }
backend-storage-lmgr-proc = { path = "../backend-storage-lmgr-proc" }
backend-access-transam-parallel = { path = "../backend-access-transam-parallel" }
backend-replication-logical-applyparallelworker = { path = "../backend-replication-logical-applyparallelworker" }
backend-commands-async = { path = "../backend-commands-async" }
backend-storage-ipc-sinval = { path = "../backend-storage-ipc-sinval" }
backend-libpq-pqcomm = { path = "../backend-libpq-pqcomm" }
backend-storage-ipc-pmsignal = { path = "../backend-storage-ipc-pmsignal" }
backend-libpq-pqsignal = { path = "../backend-libpq-pqsignal" }
backend-access-transam-xact = { path = "../backend-access-transam-xact" }
pg-prng = { path = "../pg-prng" }

# Owner crates of the simple-Query (F1) entry points that have no consumable
# seam: the parser driver (raw_parser), parse-analysis (parse_analyze_*,
# analyze_requires_snapshot), the portal-run driver (PortalRun /
# PortalSetResultFormat), and the command-tag classifier. Acyclic: each depends
# only on `*-seams` leaves, never on this owner crate.
backend-parser-driver = { path = "../backend-parser-driver" }
backend-parser-analyze = { path = "../backend-parser-analyze" }
backend-tcop-pquery = { path = "../backend-tcop-pquery" }
backend-tcop-cmdtag = { path = "../backend-tcop-cmdtag" }

# Vocabulary types the F1 pipeline threads.
types-nodes = { path = "../types-nodes" }
types-parsenodes = { path = "../types-parsenodes" }
types-portal = { path = "../types-portal" }
types-snapshot = { path = "../types-snapshot" }

# F0a: the main-loop drivers' owner callees (acyclic — none deps this owner).
backend-libpq-pqformat = { path = "../backend-libpq-pqformat" }
backend-tcop-fastpath = { path = "../backend-tcop-fastpath" }
backend-postmaster-interrupt = { path = "../backend-postmaster-interrupt" }
backend-utils-time-snapmgr = { path = "../backend-utils-time-snapmgr" }
backend-utils-mmgr-portalmem = { path = "../backend-utils-mmgr-portalmem" }
backend-utils-init-miscinit = { path = "../backend-utils-init-miscinit" }
backend-utils-misc-guc = { path = "../backend-utils-misc-guc" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
allocator-api2 = { version = "0.2", default-features = false, features = ["alloc"] }

# Seam crates (leaf; never create cycles).
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-executor-execParallel-support-seams = { path = "../backend-executor-execParallel-support-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-misc-guc-tables-seams = { path = "../backend-utils-misc-guc-tables-seams" }
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
backend-utils-misc-timeout-seams = { path = "../backend-utils-misc-timeout-seams" }
backend-storage-ipc-latch-seams = { path = "../backend-storage-ipc-latch-seams" }
backend-storage-ipc-ipc-seams = { path = "../backend-storage-ipc-ipc-seams" }
backend-storage-ipc-procsignal-seams = { path = "../backend-storage-ipc-procsignal-seams" }
# pathnode.c's CHECK_FOR_INTERRUPTS() is the miscadmin macro owned here; the
# optimizer reaches it through pathnode-seams' infallible () variant.
backend-optimizer-util-pathnode-seams = { path = "../backend-optimizer-util-pathnode-seams" }
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
backend-storage-lmgr-lock-seams = { path = "../backend-storage-lmgr-lock-seams" }
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
backend-utils-mmgr-mcxt-seams = { path = "../backend-utils-mmgr-mcxt-seams" }
backend-utils-activity-pgstat-seams = { path = "../backend-utils-activity-pgstat-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-postmaster-autovacuum-seams = { path = "../backend-postmaster-autovacuum-seams" }
backend-replication-logical-launcher-seams = { path = "../backend-replication-logical-launcher-seams" }
backend-utils-adt-timestamp-seams = { path = "../backend-utils-adt-timestamp-seams" }
backend-main-main-seams = { path = "../backend-main-main-seams" }
backend-commands-user-seams = { path = "../backend-commands-user-seams" }
backend-replication-walsender-seams = { path = "../backend-replication-walsender-seams" }
port-pgstrcasecmp = { path = "../port-pgstrcasecmp" }

# F1 simple-Query pipeline seams.
backend-rewrite-rewritehandler-seams = { path = "../backend-rewrite-rewritehandler-seams" }
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
backend-tcop-dest-seams = { path = "../backend-tcop-dest-seams" }
backend-tcop-utility-seams = { path = "../backend-tcop-utility-seams" }
backend-utils-activity-status-seams = { path = "../backend-utils-activity-status-seams" }
backend-utils-mmgr-portalmem-seams = { path = "../backend-utils-mmgr-portalmem-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-utils-misc-more-seams = { path = "../backend-utils-misc-more-seams" }
backend-parser-analyze-seams = { path = "../backend-parser-analyze-seams" }

# F0b: the single-user standalone bootstrap (PostgresSingleUserMain) callees.
backend-utils-init-postinit-seams = { path = "../backend-utils-init-postinit-seams" }
backend-storage-ipc-ipci-seams = { path = "../backend-storage-ipc-ipci-seams" }
backend-postmaster-pmchild-seams = { path = "../backend-postmaster-pmchild-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }

# Per-backend signal-handler install in PostgresMain (postgres.c:4213-4252):
# the `pqsignal(...)` block, in particular `pqsignal(SIGUSR1,
# procsignal_sigusr1_handler)` which lets a backend absorb its own (and
# others') ProcSignalBarrier — required for DROP DATABASE / DROP TABLESPACE
# (EmitProcSignalBarrier + WaitForProcSignalBarrier) to terminate.
port-pqsignal-seams = { path = "../port-pqsignal-seams" }
types-signal = { path = "../types-signal" }
# sigprocmask(SIG_SETMASK, &UnBlockSig) in PostgresMain (postgres.c:4264): the
# backend inherits BlockSig from InitPostmasterChild and must unblock signals
# so the self-SIGUSR1 from EmitProcSignalBarrier is actually delivered.
backend-libpq-pqsignal-seams = { path = "../backend-libpq-pqsignal-seams" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
