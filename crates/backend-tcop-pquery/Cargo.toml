backend-rewrite-rewritehandler-seams = { path = "../backend-rewrite-rewritehandler-seams" }
backend-optimizer-plan-planner-seams = { path = "../backend-optimizer-plan-planner-seams" }
backend-utils-mmgr-portalmem-seams = { path = "../backend-utils-mmgr-portalmem-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-tcop-dest-seams = { path = "../backend-tcop-dest-seams" }
backend-executor-tstorereceiver-seams = { path = "../backend-executor-tstorereceiver-seams" }
backend-executor-execTuples-seams = { path = "../backend-executor-execTuples-seams" }
backend-utils-sort-storage-seams = { path = "../backend-utils-sort-storage-seams" }
backend-tcop-utility-seams = { path = "../backend-tcop-utility-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
