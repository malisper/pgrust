[package]
name = "backend-tcop-pquery"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_tcop_pquery"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
types-error = { path = "../types-error" }
types-core = { path = "../types-core" }
types-nodes = { path = "../types-nodes" }
types-portal = { path = "../types-portal" }
types-snapshot = { path = "../types-snapshot" }
types-scan = { path = "../types-scan" }
types-slot = { path = "../types-slot" }
types-tuple = { path = "../types-tuple" }
types-dest = { path = "../types-dest" }
mcx = { path = "../mcx" }

# own inward seam crates (installed from init_seams)
backend-tcop-pquery-seams = { path = "../backend-tcop-pquery-seams" }

# direct deps (no cycle)
backend-executor-execMain = { path = "../backend-executor-execMain" }
backend-tcop-dest = { path = "../backend-tcop-dest" }
backend-tcop-cmdtag = { path = "../backend-tcop-cmdtag" }
backend-utils-mmgr-portalmem = { path = "../backend-utils-mmgr-portalmem" }

# outward seam crates (cyclic owners)
backend-commands-createas-seams = { path = "../backend-commands-createas-seams" }
