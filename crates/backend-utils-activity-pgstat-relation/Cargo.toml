[package]
name = "backend-utils-activity-pgstat-relation"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_activity_pgstat_relation"
path = "src/lib.rs"

[dependencies]
# Lazy-vacuum driver's pgstat_report_vacuum seam homes in vacuumlazy-seams;
# pgstat_relation.c owns it.
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }
# pgstat_report_analyze seam homes in analyze-rt-seams (analyze.c call site);
# pgstat_relation.c owns the body.
backend-commands-analyze-rt-seams = { path = "../backend-commands-analyze-rt-seams" }
# pgstat_count_truncate is owned here; its tablecmds caller crosses by a
# `&Relation` seam on backend-commands-tablecmds-seams (the relid/relisshared/
# pgstat_enabled adapter lives here).
backend-commands-tablecmds-seams = { path = "../backend-commands-tablecmds-seams" }
types-rel = { path = "../types-rel" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-pgstat = { path = "../types-pgstat" }
backend-utils-activity-pgstat = { path = "../backend-utils-activity-pgstat" }
backend-utils-activity-pgstat-seams = { path = "../backend-utils-activity-pgstat-seams" }
backend-utils-activity-pgstat-database = { path = "../backend-utils-activity-pgstat-database" }
backend-utils-activity-pgstat-backend = { path = "../backend-utils-activity-pgstat-backend" }
backend-utils-activity-stat-seams = { path = "../backend-utils-activity-stat-seams" }
backend-utils-activity-xact = { path = "../backend-utils-activity-xact" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }
types-tuple = { path = "../types-tuple" }
backend-utils-adt-timestamp-seams = { path = "../backend-utils-adt-timestamp-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-access-transam-twophase-seams = { path = "../backend-access-transam-twophase-seams" }
backend-access-transam-twophase-rmgr = { path = "../backend-access-transam-twophase-rmgr" }
backend-catalog-catalog-seams = { path = "../backend-catalog-catalog-seams" }
# fmgr builtin registry for the pgstatfuncs.c per-relation SQL accessors.
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
types-fmgr = { path = "../types-fmgr" }
types-datum = { path = "../types-datum" }
