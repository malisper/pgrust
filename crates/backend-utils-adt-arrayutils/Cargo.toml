[package]
name = "backend-utils-adt-arrayutils"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_arrayutils"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-datum = { path = "../types-datum" }
types-error = { path = "../types-error" }

# ereport(ERROR) builder for the SQL-facing argument/limit checks.
backend-utils-error = { path = "../backend-utils-error" }

# cstring parsing for ArrayGetIntegerTypmods.
backend-utils-adt-numutils = { path = "../backend-utils-adt-numutils" }

# Inward seams this crate OWNS and installs from init_seams().
backend-utils-adt-arrayutils-seams = { path = "../backend-utils-adt-arrayutils-seams" }

# array deconstruct / null-check for ArrayGetIntegerTypmods (no cycle:
# arrayfuncs depends only on arrayutils-seams, not on this impl crate).
backend-utils-adt-arrayfuncs = { path = "../backend-utils-adt-arrayfuncs" }

[dev-dependencies]
# ArrayType on-disk layout constant for the cstring[] roundtrip test.
types-array = { path = "../types-array" }
