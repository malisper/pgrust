[package]
name = "backend-utils-adt-datetime"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_datetime"
path = "src/lib.rs"

[dependencies]
# Lazy-vacuum driver timestamp seams (GetCurrentTimestamp / TimestampDifference /
# TimestampDifferenceExceeds) home in vacuumlazy-seams; timestamp.c is their owner.
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }
types-core = { path = "../types-core" }
types-datetime = { path = "../types-datetime" }
types-error = { path = "../types-error" }
types-pgtime = { path = "../types-pgtime" }
types-numeric = { path = "../types-numeric" }
types-tuple = { path = "../types-tuple" }
types-misc-more2 = { path = "../types-misc-more2" }
mcx = { path = "../mcx" }
backend-utils-adt-numeric = { path = "../backend-utils-adt-numeric" }
backend-utils-adt-numutils = { path = "../backend-utils-adt-numutils" }
backend-timezone-localtime = { path = "../backend-timezone-localtime" }
backend-timezone-pgtz = { path = "../backend-timezone-pgtz" }
state-pgtz = { path = "../state-pgtz" }
backend-access-transam-xact = { path = "../backend-access-transam-xact" }
common-hashfn = { path = "../common-hashfn" }
backend-utils-adt-timestamp-seams = { path = "../backend-utils-adt-timestamp-seams" }
backend-utils-adt-isoweek-seams = { path = "../backend-utils-adt-isoweek-seams" }
backend-timezone-strftime-seams = { path = "../backend-timezone-strftime-seams" }
types-fmgr = { path = "../types-fmgr" }
types-datum = { path = "../types-datum" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
backend-utils-adt-arrayutils-seams = { path = "../backend-utils-adt-arrayutils-seams" }

[dev-dependencies]
backend-access-transam-parallel = { path = "../backend-access-transam-parallel" }
# The `get_share_path` (`common/path.c`) seam, installed by the test harness
# (`test_install_seams`) so the tzdb-backed timezone tests resolve
# `<sharedir>/timezone` exactly as the server does. The production owner
# (`backend-utils-init-miscinit`) is far higher in the stack, so the unit-test
# harness installs a faithful local `get_share_path` body (a port of
# `make_relative_path`) against the build-baked `PGRUST_PGSHAREDIR`/`PGRUST_PGBINDIR`.
common-path-seams = { path = "../common-path-seams" }
# `read_dir_names_logged` (`storage/fd.c`): pgtz scans `<sharedir>/timezone`
# case-insensitively through this seam. Production owner is
# `backend-storage-file-fd`; the test harness installs a `std::fs::read_dir`
# body (the same OS call) so the tzdb scan resolves.
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
