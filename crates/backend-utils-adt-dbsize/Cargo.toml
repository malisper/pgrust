[package]
name = "backend-utils-adt-dbsize"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_dbsize"
path = "src/lib.rs"

[dependencies]
# Canonical primitive/catalog/storage types (Oid, RelFileNumber, RelFileLocator,
# ProcNumber, ForkNumber, the tablespace OIDs + PG_TBLSPC_DIR constants).
types-core = { path = "../types-core" }
types-catalog = { path = "../types-catalog" }
types-storage = { path = "../types-storage" }
types-error = { path = "../types-error" }
types-numeric = { path = "../types-numeric" }

# Memory-context allocation lane (Mcx / PgVec) for the numeric round-trips and
# the path/text result buffers.
mcx = { path = "../mcx" }

# The fmgr/Datum boundary: the call frame, by-ref payload, and the builtin-table
# registration the SQL-callable `fc_*` adapters cross.
types-datum = { path = "../types-datum" }
types-fmgr = { path = "../types-fmgr" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }

# The error spine (ereport builder / PgResult / SqlState constants).
backend-utils-error = { path = "../backend-utils-error" }

# Directly-callable leaf owners (no cycle):
#   common/relpath.c  — relpathbackend / forkname_to_number.
backend-common-relpath = { path = "../backend-common-relpath" }
#   utils/adt/numeric.c — the numeric arithmetic the size formatting rides on.
backend-utils-adt-numeric = { path = "../backend-utils-adt-numeric" }

# seam_core::seam! for the OUTBOUND backend services this file reaches but whose
# owners are not directly callable here (the runtime filesystem dir-walk + stat,
# the syscache/relcache/relmapper field-extraction touchpoints). Declared inline;
# the value-typed, acyclic owners below are installed from `init_seams()`.
seam-core = { path = "../seam-core" }

# Directly-callable seam owners (acyclic): the backend-global accessors
# (MyDatabaseId / MyDatabaseTableSpace), GetUserId, has_privs_of_role, the
# temp-namespace predicate, ProcNumberForTempRelations, and CHECK_FOR_INTERRUPTS.
backend-utils-init-small = { path = "../backend-utils-init-small" }
backend-utils-init-miscinit = { path = "../backend-utils-init-miscinit" }
backend-utils-adt-acl = { path = "../backend-utils-adt-acl" }
backend-catalog-namespace = { path = "../backend-catalog-namespace" }
backend-catalog-storage = { path = "../backend-catalog-storage" }
backend-tcop-postgres = { path = "../backend-tcop-postgres" }
