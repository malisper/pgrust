[package]
name = "backend-utils-adt-jsonbsubs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_jsonbsubs"
path = "src/lib.rs"

[dependencies]
backend-utils-adt-jsonbsubs-seams = { path = "../backend-utils-adt-jsonbsubs-seams" }
backend-utils-adt-jsonfuncs = { path = "../backend-utils-adt-jsonfuncs" }
backend-utils-adt-jsonb-util = { path = "../backend-utils-adt-jsonb-util" }
types-jsonb = { path = "../types-jsonb" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-tuple = { path = "../types-tuple" }
mcx = { path = "../mcx" }
# DatumGetJsonbP detoasts its argument (PG_DETOAST_DATUM); apply the same
# PG_DETOAST_DATUM_PACKED step before reading a (possibly toasted) jsonb
# container/replace-value off the canonical by-reference lane.
backend-access-common-detoast-seams = { path = "../backend-access-common-detoast-seams" }
