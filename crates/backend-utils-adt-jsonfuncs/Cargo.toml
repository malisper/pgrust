[package]
name = "backend-utils-adt-jsonfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_jsonfuncs"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-datum = { path = "../types-datum" }
types-error = { path = "../types-error" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
types-fmgr = { path = "../types-fmgr" }
types-json = { path = "../types-json" }
types-jsonb = { path = "../types-jsonb" }
types-jsonfuncs = { path = "../types-jsonfuncs" }
backend-utils-error = { path = "../backend-utils-error" }
backend-utils-adt-jsonb = { path = "../backend-utils-adt-jsonb" }
backend-utils-adt-jsonb-seams = { path = "../backend-utils-adt-jsonb-seams" }
backend-utils-adt-json = { path = "../backend-utils-adt-json" }
backend-utils-adt-jsonb-util = { path = "../backend-utils-adt-jsonb-util" }
backend-utils-adt-numeric = { path = "../backend-utils-adt-numeric" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
backend-utils-fmgr-funcapi = { path = "../backend-utils-fmgr-funcapi" }
# SRF entry points (json[b]_object_keys) call the funcapi seams directly
# (InitMaterializedSRF / materialized_srf_putvalues / srf_arg_varlena_bytes /
# cstring_get_text_datum), mirroring backend-backup-walsummaryfuncs.
backend-utils-fmgr-funcapi-seams = { path = "../backend-utils-fmgr-funcapi-seams" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
backend-utils-cache-typcache = { path = "../backend-utils-cache-typcache" }
backend-utils-adt-arrayfuncs = { path = "../backend-utils-adt-arrayfuncs" }
backend-utils-sort-storage = { path = "../backend-utils-sort-storage" }
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }
# json_render's array path detoasts the array varlena (DatumGetArrayTypeP).
backend-access-common-detoast-seams = { path = "../backend-access-common-detoast-seams" }
# populate_record copies the cached composite tuple descriptor.
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }
# populate_domain enforces domain constraints via domain_check.
backend-utils-adt-misc2 = { path = "../backend-utils-adt-misc2" }
# get_fn_expr_argtype for the record argument's declared type.
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
# Inward seam crate this unit owns (json/jsonb call json_categorize_type etc.)
backend-utils-adt-jsonfuncs-seams = { path = "../backend-utils-adt-jsonfuncs-seams" }
# Outward seam crates for not-yet-ported owners.
common-jsonapi-seams = { path = "../common-jsonapi-seams" }
backend-parser-coerce-seams = { path = "../backend-parser-coerce-seams" }
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }
