[package]
name = "backend-utils-adt-jsonpath-exec"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_jsonpath_exec"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
backend-utils-error = { path = "../backend-utils-error" }
types-tuple = { path = "../types-tuple" }
types-datum = { path = "../types-datum" }
types-jsonb = { path = "../types-jsonb" }
types-jsonpath = { path = "../types-jsonpath" }
# jsonpath TYPE + reader API (JsonPathItem, jsp* readers) — direct dep.
backend-utils-adt-jsonpath = { path = "../backend-utils-adt-jsonpath" }
# jsonb substrate (iterators, container search, JsonbValue<->Jsonb) — direct dep.
backend-utils-adt-jsonb-util = { path = "../backend-utils-adt-jsonb-util" }
# JsonbExtractScalar / JsonbTypeName — direct dep.
backend-utils-adt-jsonb = { path = "../backend-utils-adt-jsonb" }
# numeric ops (add/sub/mul/div/mod, abs/ceil/floor/trunc/uminus, in/out, casts).
backend-utils-adt-numeric = { path = "../backend-utils-adt-numeric" }
# Owner-seams for genuine cross-subsystem externals (route through the owner,
# not this unit's own seams): RE_compile_and_execute (regexp.c), format_type_be
# (format_type.c), pg_server_to_any/GetDatabaseEncoding (mbutils.c),
# JsonEncodeDateTime (json.c).
backend-utils-adt-regexp-seams = { path = "../backend-utils-adt-regexp-seams" }
backend-utils-adt-format-type-seams = { path = "../backend-utils-adt-format-type-seams" }
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
backend-utils-adt-json-seams = { path = "../backend-utils-adt-json-seams" }
# This unit's own jsonpath_exec-specific seams + JSON_TABLE node boundary.
backend-utils-adt-jsonpath-exec-seams = { path = "../backend-utils-adt-jsonpath-exec-seams" }

[dev-dependencies]
backend-utils-adt-jsonpath-gram-seams = { path = "../backend-utils-adt-jsonpath-gram-seams" }
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }
backend-utils-adt-numeric-seams = { path = "../backend-utils-adt-numeric-seams" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
