[package]
name = "backend-utils-adt-lsn-trigfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_lsn_trigfuncs"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-datum = { path = "../types-datum" }
types-error = { path = "../types-error" }
types-fmgr = { path = "../types-fmgr" }
types-numeric = { path = "../types-numeric" }
types-tuple = { path = "../types-tuple" }
types-ri-triggers = { path = "../types-ri-triggers" }

# fmgr builtin registry (register_builtins / BuiltinFunction / fmgr boundary).
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }

# pg_lsn arithmetic bridges into the ported numeric crate (numeric_in /
# numeric_add / numeric_sub / set_var_from_num / numericvar_to_uint64).
backend-utils-adt-numeric = { path = "../backend-utils-adt-numeric" }

# common/hashfn.c hash_uint32 / hash_uint32_extended, which hashint8 folds into.
common-hashfn = { path = "../common-hashfn" }

# trigfuncs.c reads its TriggerData context (CALLED_AS_TRIGGER, tg_event,
# tg_newtuple, tg_trigtuple) through the trigger.c owner's seam crate; that
# unit is not yet ported, so those seams panic until it lands.
backend-commands-trigger-seams = { path = "../backend-commands-trigger-seams" }
