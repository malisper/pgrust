[package]
name = "backend-utils-adt-mac"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_mac"
path = "src/lib.rs"

[dependencies]
types-error = { path = "../types-error" }
types-network = { path = "../types-network" }
# hash_any / hash_any_extended for hashmacaddr; owner ported, depend directly.
common-hashfn = { path = "../common-hashfn" }
# Outward seam for the external sortsupport substrate (node mutation +
# HyperLogLog + trace_sort), called here, installed by the unported owner.
backend-utils-adt-mac-seams = { path = "../backend-utils-adt-mac-seams" }
# fmgr-ABI wrapper layer: register the by-ref `macaddr` builtins. Their call
# frame lives in types-fmgr; by-OID dispatch resolves them in fmgr-core.
types-datum = { path = "../types-datum" }
types-fmgr = { path = "../types-fmgr" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
