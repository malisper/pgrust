[package]
name = "backend-utils-adt-misc"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_misc"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-tuple = { path = "../types-tuple" }
types-pgstat = { path = "../types-pgstat" }
types-storage = { path = "../types-storage" }
types-adt-misc = { path = "../types-adt-misc" }

# fmgr boundary: the call-frame carrier (FunctionCallInfoBaseData / RefPayload),
