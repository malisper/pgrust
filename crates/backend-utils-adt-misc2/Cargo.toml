[package]
name = "backend-utils-adt-misc2"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_misc2"
path = "src/lib.rs"

[dependencies]
# Carrier types.
types-datum = { path = "../types-datum" }
types-error = { path = "../types-error" }
types-core = { path = "../types-core" }
types-tuple = { path = "../types-tuple" }
types-stringinfo = { path = "../types-stringinfo" }
mcx = { path = "../mcx" }

# Real owners the expandedrecord family reuses (the adt-infra confirmed
# available on main): the tuple form/deform/copy core, and the typcache
# rowtype-tupdesc lookup seam.
# Composite (RECORD) I/O / compare / hash (rowtypes family) substrate crosses
# to its real owner via that owner's seam crate (typcache, fmgr, format_type,
# datum, pqformat message helpers).
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }
backend-libpq-pqformat = { path = "../backend-libpq-pqformat" }
backend-utils-cache-typcache-seams = { path = "../backend-utils-cache-typcache-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-adt-format-type-seams = { path = "../backend-utils-adt-format-type-seams" }
backend-utils-adt-datum-seams = { path = "../backend-utils-adt-datum-seams" }
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }

# Inward seam crate this unit owns (expandeddatum EOH surface consumed by
# backend-access-common-heaptuple). The keystone installs these from
# init_seams().
backend-utils-adt-misc2-seams = { path = "../backend-utils-adt-misc2-seams" }

# Outward seam crate for the per-type ExpandedObjectMethods table that the
# keystone EOH_get_flat_size / EOH_flatten_into dispatch through. Owned by the
# concrete expanded types (expanded record / expanded array), still unported.
backend-utils-adt-expanded-methods-seams = { path = "../backend-utils-adt-expanded-methods-seams" }
