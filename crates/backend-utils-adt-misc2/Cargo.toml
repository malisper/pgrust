[package]
name = "backend-utils-adt-misc2"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_misc2"
path = "src/lib.rs"

[dependencies]
# Carrier types.
types-core = { path = "../types-core" }
types-cache = { path = "../types-cache" }
types-datum = { path = "../types-datum" }
types-error = { path = "../types-error" }
types-tuple = { path = "../types-tuple" }
types-stringinfo = { path = "../types-stringinfo" }
types-storage = { path = "../types-storage" }
# The fmgr call-frame boundary + builtin-table registry (fmgr_builtins layer).
types-fmgr = { path = "../types-fmgr" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
types-nodes = { path = "../types-nodes" }
mcx = { path = "../mcx" }

# Real owners the expandedrecord family reuses (the adt-infra confirmed
# available on main): the tuple form/deform/copy core, and the typcache
# rowtype-tupdesc lookup seam.
# Composite (RECORD) I/O / compare / hash (rowtypes family) substrate crosses
# to its real owner via that owner's seam crate (typcache, fmgr, format_type,
# datum, pqformat message helpers). The `domains` family reaches the typcache
# domain-constraint engine and the base type's fmgr I/O via those same seams.
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }
# detoast / heaptoast owners reached by expandedrecord's flatten path (real
# seams, signature-identical).
backend-access-common-detoast-seams = { path = "../backend-access-common-detoast-seams" }
backend-access-heap-heaptoast-seams = { path = "../backend-access-heap-heaptoast-seams" }
backend-libpq-pqformat = { path = "../backend-libpq-pqformat" }
# hashtid/hashtidextended hash the ItemPointer byte image via the merged
# common/hashfn owner (pure, no-alloc; no seam install needed).
common-hashfn = { path = "../common-hashfn" }
backend-utils-cache-typcache-seams = { path = "../backend-utils-cache-typcache-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
# `domains` family: the typcache->domains.c outward seams this unit OWNS and
# installs (catalog scan / planner / context lifecycle for domain CHECK
# constraints), plus the string_to_node + value-typed expression_planner seams
# `plan_check_expr` composes (thin seam crates, no cycle).
backend-utils-adt-domains-seams = { path = "../backend-utils-adt-domains-seams" }
backend-nodes-read-seams = { path = "../backend-nodes-read-seams" }
backend-optimizer-plan-planner-pc-seams = { path = "../backend-optimizer-plan-planner-pc-seams" }
backend-utils-adt-format-type-seams = { path = "../backend-utils-adt-format-type-seams" }
backend-utils-adt-datum-seams = { path = "../backend-utils-adt-datum-seams" }
backend-utils-misc-stack-depth-seams = { path = "../backend-utils-misc-stack-depth-seams" }

# Inward seam crates this unit owns. The expandeddatum EOH surface (consumed
# by backend-access-common-heaptuple) and the regproc.c printable-name /
# name-parsing helpers (consumed by funcapi etc.); both installed from
# init_seams().
backend-utils-adt-misc2-seams = { path = "../backend-utils-adt-misc2-seams" }
backend-utils-adt-regproc-seams = { path = "../backend-utils-adt-regproc-seams" }

# Outward seam crate for the per-type ExpandedObjectMethods table that the
# keystone EOH_get_flat_size / EOH_flatten_into dispatch through. Owned by the
# concrete expanded types (expanded record / expanded array), still unported.
backend-utils-adt-expanded-methods-seams = { path = "../backend-utils-adt-expanded-methods-seams" }

# Outward seams the regproc family reaches its (genuinely-unported or
# cross-unit-cycle) catalog / type / role owners through.
backend-catalog-namespace-seams = { path = "../backend-catalog-namespace-seams" }
# SystemAttributeByName (catalog/heap.c) for record system-column field refs.
backend-catalog-heap-seams = { path = "../backend-catalog-heap-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
backend-utils-adt-acl-seams = { path = "../backend-utils-adt-acl-seams" }
backend-utils-adt-oid-seams = { path = "../backend-utils-adt-oid-seams" }
# The reg* binary wire codecs (reg*recv/reg*send) are byte-for-byte oidrecv /
# oidsend (regproc.c: `return oidrecv/oidsend(fcinfo)`); we register them under
# the reg* OIDs pointing at the real oid.c value cores (no cycle — oid.c does
# not depend on this unit).
backend-utils-adt-oid = { path = "../backend-utils-adt-oid" }
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
# currtid_byrelname (tid.c) reaches table-AM open/scan, snapshot mgr, acl,
# objectaddress, and the view rewrite-rule reader. No cycle: cargo tree -i shows
# this unit is absent from the table-AM crates' dependency trees.
backend-access-table-table = { path = "../backend-access-table-table" }
backend-access-table-tableam = { path = "../backend-access-table-tableam" }
backend-catalog-aclchk-seams = { path = "../backend-catalog-aclchk-seams" }
backend-catalog-objectaddress-seams = { path = "../backend-catalog-objectaddress-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-parser-relation = { path = "../backend-parser-relation" }
types-rel = { path = "../types-rel" }
types-acl = { path = "../types-acl" }
types-tableam = { path = "../types-tableam" }
types-snapshot = { path = "../types-snapshot" }
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
backend-parser-parse-type-seams = { path = "../backend-parser-parse-type-seams" }
port-pgstrcasecmp = { path = "../port-pgstrcasecmp" }

# Outward seams the `admin` family consumes (real owners; genuinely-unported
# owners panic until they land).
backend-common-path-seams = { path = "../backend-common-path-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-storage-lmgr-lock-seams = { path = "../backend-storage-lmgr-lock-seams" }
backend-utils-fmgr-funcapi-seams = { path = "../backend-utils-fmgr-funcapi-seams" }
backend-utils-adt-arrayfuncs-seams = { path = "../backend-utils-adt-arrayfuncs-seams" }
backend-catalog-partition-seams = { path = "../backend-catalog-partition-seams" }
backend-catalog-binary-upgrade-seams = { path = "../backend-catalog-binary-upgrade-seams" }
backend-libpq-hba-seams = { path = "../backend-libpq-hba-seams" }
backend-replication-slot-seams = { path = "../backend-replication-slot-seams" }
backend-utils-init-small = { path = "../backend-utils-init-small" }
