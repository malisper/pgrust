[package]
name = "backend-utils-adt-misc2"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_misc2"
path = "src/lib.rs"

[dependencies]
# Carrier types.
types-datum = { path = "../types-datum" }
types-error = { path = "../types-error" }
mcx = { path = "../mcx" }

# Inward seam crate this unit owns (expandeddatum EOH surface consumed by
# backend-access-common-heaptuple). The keystone installs these from
# init_seams().
backend-utils-adt-misc2-seams = { path = "../backend-utils-adt-misc2-seams" }

# Outward seam crate for the per-type ExpandedObjectMethods table that the
# keystone EOH_get_flat_size / EOH_flatten_into dispatch through. Owned by the
# concrete expanded types (expanded record / expanded array), still unported.
backend-utils-adt-expanded-methods-seams = { path = "../backend-utils-adt-expanded-methods-seams" }
