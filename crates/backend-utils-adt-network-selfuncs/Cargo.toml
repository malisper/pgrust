[package]
name = "backend-utils-adt-network-selfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_network_selfuncs"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
# Canonical unified `Datum` (the by-reference inet varlena image) carried into
# the detoast + element-comparison edges.
types-tuple = { path = "../types-tuple" }
types-network = { path = "../types-network" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
types-selfuncs = { path = "../types-selfuncs" }
backend-utils-adt-network = { path = "../backend-utils-adt-network" }
backend-utils-adt-network-seams = { path = "../backend-utils-adt-network-seams" }
backend-utils-adt-selfuncs-seams = { path = "../backend-utils-adt-selfuncs-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
# Node construction (make_const / make_opclause) for the network_subset_support
# index-condition `OpExpr` trees; owner ported, depend directly. No cycle:
# backend-nodes-core does not depend on the network crates.
backend-nodes-core = { path = "../backend-nodes-core" }
# The OID-keyed `SupportRequestIndexCondition` registry where this crate
# registers `network_subset_support`'s decomposed kernel + installs the dispatch.
backend-utils-fmgr-support-seams = { path = "../backend-utils-fmgr-support-seams" }
