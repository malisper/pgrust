[package]
name = "backend-utils-adt-network"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_network"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-error = { path = "../types-error" }
types-network = { path = "../types-network" }
# Outward seams for the external substrate of inet_client_addr / sortsupport /
# planner support; called here, installed by the (unported) owner subsystems.
backend-utils-adt-network-seams = { path = "../backend-utils-adt-network-seams" }
# pg_strtoint32 (numutils.c, int4in path): owner ported, depend directly.
backend-utils-adt-numutils = { path = "../backend-utils-adt-numutils" }
# fmgr builtin table registration (C: fmgr_builtins[]) for the SQL-callable
# session-info functions; their call frame lives in types-fmgr.
types-datum = { path = "../types-datum" }
types-fmgr = { path = "../types-fmgr" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
# hash_any / hash_any_extended for hashinet (network.c hashes VARDATA_ANY);
# owner ported, depend directly.
common-hashfn = { path = "../common-hashfn" }
