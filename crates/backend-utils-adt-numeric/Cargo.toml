[package]
name = "backend-utils-adt-numeric"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_numeric"
path = "src/lib.rs"

[dependencies]
# Keystone carrier: on-disk ABI + in-memory NumericVar<'mcx> + agg states.
types-numeric = { path = "../types-numeric" }
mcx = { path = "../mcx" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-error = { path = "../types-error" }

# Externals this crate REACHES OUT to (real, already-ported owners): the
# Jenkins/lookup3 byte hashers (hashfn.c hash_any/hash_any_extended) used by
# hash_numeric/hash_numeric_extended.
common-hashfn = { path = "../common-hashfn" }

# The HyperLogLog cardinality estimator (hyperloglog.c). numeric_sortsupport's
# abbreviated-key state (NumericSortSupport.abbr_card) holds the counter by
# value, exactly as C holds `hyperLogLogState abbr_card` inline; the
# init/add/estimate ops are called directly on it (mirrors varlena's sort state).
backend-lib-hyperloglog = { path = "../backend-lib-hyperloglog" }

# The int8[2] {count,sum} transition array of avg(int2)/avg(int4) is built and
# read back with construct_array / ARR_* over the real arrayfuncs foundation
# (mirrors backend-utils-adt-float's float8[] aggregate model).
backend-utils-adt-arrayfuncs = { path = "../backend-utils-adt-arrayfuncs" }

# numerictypmodin's cstring[] arg is decoded via ArrayGetIntegerTypmods, which
# lives in arrayutils; reached through its seam to avoid a dependency cycle.
backend-utils-adt-arrayutils-seams = { path = "../backend-utils-adt-arrayutils-seams" }

# Inward seams this crate OWNS and installs from init_seams().
backend-utils-adt-numeric-seams = { path = "../backend-utils-adt-numeric-seams" }

# The numeric->integer cast boundary (numeric_int2/4/8) is a numeric.c function
# that jsonb.c reaches; the slots are declared in jsonb-seams but numeric.c is
# their true owner, so this crate installs them cross-crate from init_seams().
backend-utils-adt-jsonb-seams = { path = "../backend-utils-adt-jsonb-seams" }

# make_const's numeric (T_Float oversize) arm reaches numeric_in via a seam slot
# declared in parser-small1-seams (parse_node.c is the consumer); numeric.c owns
# and installs it cross-crate from init_seams().
backend-parser-small1-seams = { path = "../backend-parser-small1-seams" }

# The real backend PRNG (xoroshiro128**) for random_numeric/random_var. The
# `pg_prng_state` threaded in by the SQL random() setup is `pg_prng::PgPrng`.
pg-prng = { path = "../pg-prng" }

# seam_core::seam! for the OUTBOUND, owner-unported call frames the SRF /
# planner-support / sort-support setup reach (the planner Node vocabulary, the
# SRF FuncCallContext / multi-call context, and the tuplesort abbreviation
# slots). Declared inline; NOT installed here (no owned X-seams crate -> they do
# not trip the recurrence guard; they panic until each owner lands).
seam-core = { path = "../seam-core" }

# The real (merged) trimmed SortSupportData node numeric_sortsupport fills.
types-sortsupport = { path = "../types-sortsupport" }

# The fmgr Datum/call-frame boundary + the builtin table registration: each
# SQL-callable numeric.c function is registered here as a `fc_<name>` adapter.
types-fmgr = { path = "../types-fmgr" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }

# The real planner node vocabulary the numeric()/generate_series() planner
# support fns run over (Expr/Const/PlannerInfo) + the real exprTypmod /
# relabel_to_typmod (nodeFuncs.c) and estimate_expression_value (clauses.c)
# owners they call directly (acyclic: none of these depend on numeric).
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
backend-nodes-core = { path = "../backend-nodes-core" }
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
