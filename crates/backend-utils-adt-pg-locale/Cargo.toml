[package]
name = "backend-utils-adt-pg-locale"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_pg_locale"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-locale = { path = "../types-locale" }
types-cash = { path = "../types-cash" }
types-tuple = { path = "../types-tuple" }
common-string = { path = "../common-string" }
backend-utils-error = { path = "../backend-utils-error" }
libc = "0.2"

# Inward seams this crate owns + installs.
backend-utils-adt-pg-locale-seams = { path = "../backend-utils-adt-pg-locale-seams" }

# Outward seams (unported owners; panic until they land).
backend-utils-adt-pg-locale-builtin-seams = { path = "../backend-utils-adt-pg-locale-builtin-seams" }
backend-utils-adt-pg-locale-libc-seams = { path = "../backend-utils-adt-pg-locale-libc-seams" }
backend-utils-adt-pg-locale-catalog-seams = { path = "../backend-utils-adt-pg-locale-catalog-seams" }
backend-utils-adt-pg-locale-env-seams = { path = "../backend-utils-adt-pg-locale-env-seams" }
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }

# ICU provider: merged (returns FEATURE_NOT_SUPPORTED in the ICU-disabled
# profile). Called directly — acyclic (icu depends only on types-*).
backend-utils-adt-pg-locale-icu = { path = "../backend-utils-adt-pg-locale-icu" }
