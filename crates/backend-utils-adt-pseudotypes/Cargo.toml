[package]
name = "backend-utils-adt-pseudotypes"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_pseudotypes"
path = "src/lib.rs"

[dependencies]
# Carrier types + memory contexts.
mcx = { path = "../mcx" }
types-datum = { path = "../types-datum" }
types-error = { path = "../types-error" }
types-rangetypes = { path = "../types-rangetypes" }

# libpq wire format for cstring/void recv/send (non-cyclic, direct dep).
backend-libpq-pqformat = { path = "../backend-libpq-pqformat" }
types-stringinfo = { path = "../types-stringinfo" }

# Delegating output/send targets (real type I/O functions). None of these
# units depend on this one, so a direct cargo edge is acyclic.
backend-utils-adt-arrayfuncs = { path = "../backend-utils-adt-arrayfuncs" }
backend-utils-adt-varlena = { path = "../backend-utils-adt-varlena" }
backend-utils-adt-multirangetypes = { path = "../backend-utils-adt-multirangetypes" }

# range_out crosses a dependency cycle (rangetypes), so it is a seam.
backend-utils-adt-rangetypes-seams = { path = "../backend-utils-adt-rangetypes-seams" }

# enum_out: real enum.c port (direct dep, acyclic).
backend-utils-adt-enum = { path = "../backend-utils-adt-enum" }

[dev-dependencies]
# Identity encoding-conversion mocks for the cstring recv/send ASCII paths.
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
