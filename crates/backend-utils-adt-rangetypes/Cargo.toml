[package]
name = "backend-utils-adt-rangetypes"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_rangetypes"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-scan = { path = "../types-scan" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-fmgr = { path = "../types-fmgr" }
types-cache = { path = "../types-cache" }
types-rangetypes = { path = "../types-rangetypes" }
types-nodes = { path = "../types-nodes" }
types-pathnodes = { path = "../types-pathnodes" }
# Planner-support up-call owners (range-planner-support seam wiring): the range
# `<@`/`@>` support functions fabricate/analyze planner nodes through these
# already-real owners (makefuncs / clauses / costsize / lsyscache). The same
# direct-dep-on-optimizer pattern `backend-utils-adt-selfuncs` already uses.
backend-nodes-core = { path = "../backend-nodes-core" }
backend-optimizer-util-clauses = { path = "../backend-optimizer-util-clauses" }
backend-optimizer-path-costsize = { path = "../backend-optimizer-path-costsize" }
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
allocator-api2 = { version = "0.2", default-features = false, features = ["alloc"] }
backend-utils-adt-rangetypes-seams = { path = "../backend-utils-adt-rangetypes-seams" }
backend-access-common-detoast-seams = { path = "../backend-access-common-detoast-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-cache-typcache-seams = { path = "../backend-utils-cache-typcache-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-executor-nodeAgg-aggapi-seams = { path = "../backend-executor-nodeAgg-aggapi-seams" }
backend-utils-adt-format-type-seams = { path = "../backend-utils-adt-format-type-seams" }
backend-utils-adt-numeric-seams = { path = "../backend-utils-adt-numeric-seams" }
common-hashfn-seams = { path = "../common-hashfn-seams" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
backend-utils-adt-varlena-seams = { path = "../backend-utils-adt-varlena-seams" }
