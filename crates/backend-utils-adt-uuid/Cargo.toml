[package]
name = "backend-utils-adt-uuid"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_uuid"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-fmgr = { path = "../types-fmgr" }
types-uuid = { path = "../types-uuid" }
types-datetime = { path = "../types-datetime" }
types-stringinfo = { path = "../types-stringinfo" }
backend-utils-error = { path = "../backend-utils-error" }
# fmgr builtin registry (fmgr.c) — by-OID dispatch table for the by-ref wrappers.
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
# Hashing (common/hashfn.c) — ported leaf, depend directly.
common-hashfn = { path = "../common-hashfn" }
# HyperLogLog (lib/hyperloglog.c) — ported, depend directly.
backend-lib-hyperloglog = { path = "../backend-lib-hyperloglog" }
# pqformat (libpq/pqformat.c) recv/send framing — ported, depend directly.
backend-libpq-pqformat = { path = "../backend-libpq-pqformat" }
# pg_strong_random + CLOCK_REALTIME read (port/) — owner unported, seam.
port-pg-strong-random-seams = { path = "../port-pg-strong-random-seams" }
# timestamptz_pl_interval (timestamp.c) — owner unported, seam.
backend-utils-adt-timestamp-seams = { path = "../backend-utils-adt-timestamp-seams" }
