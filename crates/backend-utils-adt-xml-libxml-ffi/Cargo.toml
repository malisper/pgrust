[package]
name = "backend-utils-adt-xml-libxml-ffi"
version = "0.0.0"
edition.workspace = true
publish.workspace = true
build = "build.rs"

[lib]
name = "backend_utils_adt_xml_libxml_ffi"
path = "src/lib.rs"

[features]
# Mirrors PostgreSQL's `--with-libxml` configure option (`#ifdef USE_LIBXML`).
# When OFF, this crate binds nothing and installs only `have_libxml` (returning
# `false`), so the in-crate xml.c bodies raise `NO_XML_SUPPORT()` and never
# touch the parse/serialize seams. When ON, `init_seams` binds the system
# libxml2 and installs every libxml2 FFI seam.
default = ["with-libxml"]
with-libxml = ["dep:backend-utils-error-elog-seams"]

[dependencies]
libc = "0.2"
# WARNING channel for buffered libxml warnings (xml_errorHandler ereport(WARNING),
# xml.c:2253); only needed when the libxml provider is compiled.
backend-utils-error-elog-seams = { path = "../backend-utils-error-elog-seams", optional = true }
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-nodes = { path = "../types-nodes" }
types-xml = { path = "../types-xml" }

# The outward libxml2 FFI seams this provider binds + installs.
backend-utils-adt-xml-libxml-seams = { path = "../backend-utils-adt-xml-libxml-seams" }

# The ported pure-logic owner whose helpers (escape_xml, xml_doctype_in_content,
# parse_xml_decl) the libxml2 parse/serialize paths must reuse to stay faithful
# to xml.c's CONTENT/DOCUMENT detection and node-to-text escaping.
backend-utils-adt-xml = { path = "../backend-utils-adt-xml" }
