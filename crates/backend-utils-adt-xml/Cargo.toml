[package]
name = "backend-utils-adt-xml"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_adt_xml"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-datetime = { path = "../types-datetime" }
types-pgtime = { path = "../types-pgtime" }
types-tuple = { path = "../types-tuple" }
types-wchar = { path = "../types-wchar" }
types-nodes = { path = "../types-nodes" }
types-xml = { path = "../types-xml" }
types-fmgr = { path = "../types-fmgr" }
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }
backend-utils-adt-datetime = { path = "../backend-utils-adt-datetime" }
common-encnames-seams = { path = "../common-encnames-seams" }
backend-utils-error-elog-seams = { path = "../backend-utils-error-elog-seams" }
backend-utils-adt-xml-seams = { path = "../backend-utils-adt-xml-seams" }
backend-utils-adt-xml-libxml-seams = { path = "../backend-utils-adt-xml-libxml-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-adt-arrayfuncs-seams = { path = "../backend-utils-adt-arrayfuncs-seams" }
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

# Real owners of the cross-subsystem (non-libxml2) dependency seams xml.c
# reaches: the syscache/lsyscache lookups, the namespace resolution, and the
# utils/mb encoding conversions. These are installed from `init_seams()` below
# (the `xml.c` consumer is the only crate that deps the libxml-seams contract,
# so it is the natural wiring point; verified no dependency cycle).
backend-utils-cache-lsyscache = { path = "../backend-utils-cache-lsyscache" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-catalog-namespace = { path = "../backend-catalog-namespace" }
backend-access-table-table = { path = "../backend-access-table-table" }
types-storage = { path = "../types-storage" }
backend-utils-mb-mbutils = { path = "../backend-utils-mb-mbutils" }
