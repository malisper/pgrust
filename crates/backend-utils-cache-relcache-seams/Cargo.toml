[package]
name = "backend-utils-cache-relcache-seams"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_cache_relcache_seams"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-rel = { path = "../types-rel" }
types-storage = { path = "../types-storage" }
types-tableam = { path = "../types-tableam" }
mcx = { path = "../mcx" }
types-nodes = { path = "../types-nodes" }
types-partition = { path = "../types-partition" }
types-tuple = { path = "../types-tuple" }
# F0': the owned relcache entry-store type family, so this seam crate can name
# `RelationData` (+ companions) for the forthcoming cross-crate shared-Rc seam.
types-relcache-entry = { path = "../types-relcache-entry" }
# Hash AM's rd_amcache stores a HashMetaPageData; the relcache owns that slot.
types-hash = { path = "../types-hash" }
# SP-GiST's rd_amcache stores a SpGistCache; the relcache owns that slot.
types-spgist = { path = "../types-spgist" }
