[package]
name = "backend-utils-cache-relcache"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_cache_relcache"
path = "src/lib.rs"

[dependencies]
pgrust-trace = { path = "../pgrust-trace" }
# Inward seam crate this unit owns + installs.
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
# Lazy-vacuum driver's relcache-field read seams (RelationGetNamespace /
# RelationGetRelationName / relisshared / reltuples / RelationNeedsWAL /
# RelationUsesLocalBuffers / RelationGetNumberOfBlocks) home in vacuumlazy-seams
# (re-signed off `&Relation<'mcx>`); the relcache is their real owner.
backend-access-heap-vacuumlazy-seams = { path = "../backend-access-heap-vacuumlazy-seams" }
# hio.c's RelationGetTargetPageFreeSpace (heap insertion target-page free-space
# lookup) reads the relcache entry's rd_options fillfactor; the relcache is its
# real owner. Re-signed off the relation OID.
backend-access-heap-hio-seams = { path = "../backend-access-heap-hio-seams" }

# freespace.c FSM seams (&Relation-keyed); relcache projects a transient read
# handle off the owned entry to bridge the OID-keyed hio-seam to the FSM owner.
backend-storage-freespace-seams = { path = "../backend-storage-freespace-seams" }

# tablecmds.c's CheckTableNotInUse / truncate read rel.h fields
# (rd_isnailed / rd_refcnt / rd_createSubid) declared on `&Relation` in
# tablecmds-seams; the relcache is their real owner (resolves off the owned
# entry by OID).
backend-commands-tablecmds-seams = { path = "../backend-commands-tablecmds-seams" }

# bufmgr / visibilitymap &Relation-keyed seams: relcache projects a transient
# read handle off the owned entry to bridge the OID-keyed hio.c seams (the heap
# insertion read/extend buffer path) to their real owners.
backend-storage-buffer-bufmgr-seams = { path = "../backend-storage-buffer-bufmgr-seams" }
backend-access-heap-visibilitymap-seams = { path = "../backend-access-heap-visibilitymap-seams" }

# The RelationIdCache is a real dynahash table (merged C-faithful raw-pointer
# dynahash) — the substrate, not a stand-in. Acyclic: dynahash depends only on
# types/error/storage/core.
backend-utils-hash-dynahash = { path = "../backend-utils-hash-dynahash" }

# Memory contexts (CacheMemoryContext analog) + allocation.
mcx = { path = "../mcx" }

# Error / ereport surface.
backend-utils-error = { path = "../backend-utils-error" }
types-error = { path = "../types-error" }

# Type vocabulary embedded in the owned RelationData entry / crossed at seams.
types-core = { path = "../types-core" }
# pg_class / pg_class_oid_index OIDs used by the RelationCacheInvalidate
# two-phase rebuild ordering.
types-catalog = { path = "../types-catalog" }
types-rel = { path = "../types-rel" }
# `rd_trigdesc` value types (Trigger / TriggerDesc) built by RelationBuildTriggers.
types-trigger = { path = "../types-trigger" }
# The owned relcache entry-store type family (`RelationData` + companions),
# relocated to its own crate in F0' so the relcache seams crate can name it.
types-relcache-entry = { path = "../types-relcache-entry" }
types-tuple = { path = "../types-tuple" }
types-storage = { path = "../types-storage" }
types-tableam = { path = "../types-tableam" }
types-nodes = { path = "../types-nodes" }
# Named (not constructed) in the plancat-ext `get_index_expressions`/
# `get_index_predicate` installs: `&mut PlannerInfo` + arena `NodeId`. A pure
# types crate (no backend deps), so no cycle.
types-pathnodes = { path = "../types-pathnodes" }
types-partition = { path = "../types-partition" }
types-reloptions = { path = "../types-reloptions" }
types-hash = { path = "../types-hash" }
types-spgist = { path = "../types-spgist" }
types-cache = { path = "../types-cache" }
types-wal = { path = "../types-wal" }

# Tuple-descriptor construction (access/common/tupdesc.c) — a lower-level
# utility relcache layers on (CreateTupleDesc / populate_compact_attribute when
# materializing the cross-unit rd_att slice). Acyclic: tupdesc does not depend
# on relcache.
backend-access-common-tupdesc = { path = "../backend-access-common-tupdesc" }

# Outward seams for the genuine cross-unit catalog primitives the index family
# routes through their owners (panic until each owner installs them).
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-access-index-amapi-seams = { path = "../backend-access-index-amapi-seams" }
backend-access-index-genam-seams = { path = "../backend-access-index-genam-seams" }
backend-access-index-indexam-seams = { path = "../backend-access-index-indexam-seams" }
backend-access-common-reloptions-seams = { path = "../backend-access-common-reloptions-seams" }

# `stringToNode` for the rule-tree build (`RelationBuildRuleLock` parses
# `pg_rewrite.ev_qual`/`ev_action` into `Query<'static>` in the cache arena).
# Seam crate (leaf): acyclic.
backend-nodes-read-seams = { path = "../backend-nodes-read-seams" }
# `checkExprHasSubLink` (rewriteManip.c) for RelationBuildRowSecurity's
# RowSecurityPolicy.hassublinks. Seam crate (leaf): acyclic.
backend-rewrite-rewritemanip-seams = { path = "../backend-rewrite-rewritemanip-seams" }
backend-access-table-tableam-seams = { path = "../backend-access-table-tableam-seams" }
backend-utils-cache-relmapper-seams = { path = "../backend-utils-cache-relmapper-seams" }
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }
backend-access-transam-xlog-seams = { path = "../backend-access-transam-xlog-seams" }
backend-access-transam-parallel = { path = "../backend-access-transam-parallel" }
backend-catalog-catalog-seams = { path = "../backend-catalog-catalog-seams" }
backend-catalog-namespace-seams = { path = "../backend-catalog-namespace-seams" }
backend-catalog-binary-upgrade-seams = { path = "../backend-catalog-binary-upgrade-seams" }
backend-catalog-storage-seams = { path = "../backend-catalog-storage-seams" }
backend-storage-smgr-seams = { path = "../backend-storage-smgr-seams" }
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }

# initfile xunit cross-unit primitives (relcache bring-up + init-file IO):
# bootstrap/DatabasePath/MyProcPid (miscinit), IsCatalogNamespace (namespace),
# the RelCacheInitLock LWLock (lwlock), LockRelationOid (lmgr),
# InitCatalogCachePhase2 (syscache, already a dep), AcceptInvalidationMessages
# (inval), the AllocateFile/AllocateDir file API (fd), and the temp-rel proc
# number (parallel-rt). Each panics until its owner installs the seam.
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }
backend-storage-lmgr-lmgr-seams = { path = "../backend-storage-lmgr-lmgr-seams" }
backend-storage-lmgr-lwlock-seams = { path = "../backend-storage-lmgr-lwlock-seams" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }
# smgr (RelationGetNumberOfBlocks) is already declared above; bitmapset encode
# (identity key), fmgr resolve (index_getprocinfo lazy init), ruleutils (opclass
# name in the missing-options error).
backend-nodes-core-seams = { path = "../backend-nodes-core-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
# Genuine cross-unit primitives the derived family routes through their owners
# (panic until each owner installs them): the genam catalog scans
# (RelationGetIndexList/StatExtList/FKeyList/ExclusionInfo) and the raw
# rd_indextuple node-tree transforms (index expressions/predicate/dummy-Consts,
# attribute-bitmap index_open + pull_varattnos, publication/rule build,
# opclass per-column index options). genam-seams is already declared above.
backend-utils-cache-relcache-nodexform-seams = { path = "../backend-utils-cache-relcache-nodexform-seams" }

# Consumer-side seam crate for the externals `optimizer/util/plancat.c`'s
# `get_relation_info` calls; relcache OWNS the relcache reads in that family
# (RelationGetParallelWorkers / RelationGetIndexList / the per-index catalog
# detoast / index block count) and installs them here. No owner directory exists
# for this crate; each relcache read installs from this crate's real owner.
backend-optimizer-util-plancat-ext-seams = { path = "../backend-optimizer-util-plancat-ext-seams" }
