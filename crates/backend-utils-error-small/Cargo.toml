[package]
name = "backend-utils-error-small"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_error_small"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
types-error = { path = "../types-error" }
backend-utils-error = { path = "../backend-utils-error" }
backend-utils-error-small-seams = { path = "../backend-utils-error-small-seams" }
backend-postmaster-syslogger-seams = { path = "../backend-postmaster-syslogger-seams" }

[target.'cfg(target_family = "wasm")'.dependencies]
# wasm64: std process::id/stderr don't work; the Assert handler uses the shim.
wasm-libc-shim = { path = "../wasm-libc-shim" }
