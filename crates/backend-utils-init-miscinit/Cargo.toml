backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
# Delegation installs for the mis-homed slot-sync worker bootstrap group
# (declared on miscinit's seam crate by the slotsync consumer, but bodied in
# these owners; miscinit installs them by ::calling the real owner's seam,
# mirroring the WAL-summarizer/my_proc_pid delegation pattern below).
backend-utils-init-postinit-seams = { path = "../backend-utils-init-postinit-seams" }
backend-tcop-postgres-seams = { path = "../backend-tcop-postgres-seams" }
backend-utils-misc-more-seams = { path = "../backend-utils-misc-more-seams" }
