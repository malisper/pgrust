[package]
name = "backend-utils-init-miscinit"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_init_miscinit"
path = "src/lib.rs"

[dependencies]
libc = "0.2"
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-error = { path = "../types-error" }
types-storage = { path = "../types-storage" }

backend-utils-error = { path = "../backend-utils-error" }
backend-utils-init-small = { path = "../backend-utils-init-small" }
backend-storage-ipc-latch = { path = "../backend-storage-ipc-latch" }

# Inward seams (this crate installs them).
backend-utils-init-miscinit-seams = { path = "../backend-utils-init-miscinit-seams" }

# Outward seams into owners that would cycle or are not yet ported.
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
backend-utils-cache-syscache-seams = { path = "../backend-utils-cache-syscache-seams" }
backend-utils-cache-inval-seams = { path = "../backend-utils-cache-inval-seams" }
backend-utils-misc-guc-seams = { path = "../backend-utils-misc-guc-seams" }
