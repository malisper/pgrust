backend-storage-ipc-pmsignal-seams = { path = "../backend-storage-ipc-pmsignal-seams" }
backend-storage-ipc-waiteventset-seams = { path = "../backend-storage-ipc-waiteventset-seams" }
backend-storage-file-fileperm-seams = { path = "../backend-storage-file-fileperm-seams" }
backend-access-transam-parallel-seams = { path = "../backend-access-transam-parallel-seams" }
backend-port-path-seams = { path = "../backend-port-path-seams" }
