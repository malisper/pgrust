[package]
name = "backend-utils-mb-mbutils"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_mb_mbutils"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
mcx = { path = "../mcx" }
seam-core = { path = "../seam-core" }

types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-wchar = { path = "../types-wchar" }
types-tuple = { path = "../types-tuple" }
types-fmgr = { path = "../types-fmgr" }
types-datum = { path = "../types-datum" }

# fmgr builtin-table registration (C: fmgr_builtins[]) for this crate's
# SQL-callable encoding functions.
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }

common-wchar = { path = "../common-wchar" }
backend-utils-error = { path = "../backend-utils-error" }

# FindDefaultConversionProc owner (acyclic: namespace deps only seam crates).
backend-catalog-namespace = { path = "../backend-catalog-namespace" }
# OidFunctionCall6 conversion-proc dispatch via the fmgr-owned seam.
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
# namein, for the name-returning SQL entry points (acyclic: name deps only the seam crate).
backend-utils-adt-name = { path = "../backend-utils-adt-name" }

# inward seams this crate owns + installs
backend-utils-mb-mbutils-seams = { path = "../backend-utils-mb-mbutils-seams" }
# libpq's get_database_encoding_name resolves through the encoding subsystem
# (mbutils) — install that seam here, its authoritative owner.
interfaces-libpq-fe-seams = { path = "../interfaces-libpq-fe-seams" }
# SetMessageEncoding/pg_any_to_server are mbutils.c routines, but pg_locale.c's
# seam crate homes their declarations; this crate (their real owner) installs them.
backend-utils-adt-pg-locale-env-seams = { path = "../backend-utils-adt-pg-locale-env-seams" }
# Parallel-worker bring-up: GetDatabaseEncoding/SetClientEncoding (parallel.c).
backend-access-transam-parallel-rt-seams = { path = "../backend-access-transam-parallel-rt-seams" }

# outward seam crates (callees; panic until owners land)
common-encnames-seams = { path = "../common-encnames-seams" }
backend-access-transam-xact-seams = { path = "../backend-access-transam-xact-seams" }

[dev-dependencies]
