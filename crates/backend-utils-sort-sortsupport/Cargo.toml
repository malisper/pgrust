[package]
name = "backend-utils-sort-sortsupport"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_sort_sortsupport"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-datum = { path = "../types-datum" }
types-error = { path = "../types-error" }
types-fmgr = { path = "../types-fmgr" }
types-rel = { path = "../types-rel" }
types-sortsupport = { path = "../types-sortsupport" }
types-tuple = { path = "../types-tuple" }

# fmgr machinery (the comparison-shim FunctionCallInvoke / fmgr_info_cxt /
# OidFunctionCall1) — direct dep, no cycle.
backend-utils-fmgr-core = { path = "../backend-utils-fmgr-core" }

# inward seam crate (this unit installs these)
backend-utils-sort-sortsupport-seams = { path = "../backend-utils-sort-sortsupport-seams" }

# nbtcompare's `*sortsupport` seam crate: this substrate calls `run_sortsupport`
# (INWARD to nbtcompare) and installs the substrate-owned `install_sortsupport_*`
# seams declared there. Seam crate only — no cycle with nbtcompare's impl.
backend-access-nbt-compare-seams = { path = "../backend-access-nbt-compare-seams" }
backend-access-gist-proc-seams = { path = "../backend-access-gist-proc-seams" }
# GiST opclass-support typed dispatch (by-OID): the sorted index-build path
# (`PrepareSortSupportFromGistIndexRel`) reaches the opclass GIST_SORTSUPPORT_PROC
# through this dispatch seam (the owned `Datum` cannot carry the live SortSupport
# pointer through fmgr). Seam crate only — no cycle with the gist-proc impl.
backend-access-gist-dispatch-seams = { path = "../backend-access-gist-dispatch-seams" }

# outward seam crates (callees; panic until owners land)
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }

[dev-dependencies]
seam-core = { path = "../seam-core" }
