[package]
name = "backend-utils-sort-tuplesort"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_sort_tuplesort"
path = "src/lib.rs"

[dependencies]
seam-core = { path = "../seam-core" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-tuple = { path = "../types-tuple" }
types-nodes = { path = "../types-nodes" }
types-rel = { path = "../types-rel" }
types-slot = { path = "../types-slot" }
types-sortsupport = { path = "../types-sortsupport" }
# `SK_BT_NULLS_FIRST` / `SK_BT_DESC` (the btree index begin variant reads these
# from the `_bt_mkscankey` scankey `sk_flags`).
types-scan = { path = "../types-scan" }
mcx = { path = "../mcx" }
# Direct dependency on the now-landed real LogicalTapeSet engine (logtape.c).
# `backend-utils-sort-storage` does NOT depend on tuplesort, so this edge is
# acyclic; tuplesort calls `logtape::*` directly (no new tape seams needed).
backend-utils-sort-storage = { path = "../backend-utils-sort-storage" }
# Re-exports the `LogicalTapeSet` / `LogicalTape` vocabulary types (the owner
# `backend-utils-sort-storage` implements the ops over them).
backend-utils-sort-storage-seams = { path = "../backend-utils-sort-storage-seams" }
# The sort-support comparator-invocation seams (ApplySortComparator etc.).
backend-utils-sort-sortsupport-seams = { path = "../backend-utils-sort-sortsupport-seams" }
# MinimalTuple flat-blob codec (writetup_heap/readtup_heap byte serialization +
# heap_deform_minimal_tuple_flat for the readtup_heap datum1 re-extraction).
# This crate does NOT depend on sort-storage/tuplesort, so the edge is acyclic.
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }
# This unit's inward seams (the `tuplesort_*` access method): begin_heap/datum,
# set_bound, put*/get*, performsort, end, rescan/markpos/restorepos, get_stats.
# Installed from `init_seams()`.
backend-utils-sort-tuplesort-seams = { path = "../backend-utils-sort-tuplesort-seams" }
# `get_typlenbyval` (tuplesort_begin_datum's datum-type length/byval lookup).
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
# Index-tuple ops for the index sort variants (F3b): index_form_tuple (put),
# index_deform_tuple / nocache_index_getattr (datum1 + tiebreak extraction).
backend-access-common-indextuple-seams = { path = "../backend-access-common-indextuple-seams" }
# `_bt_mkscankey` — the btree-index begin variant's per-column sort-key source.
backend-access-nbtree-core-seams = { path = "../backend-access-nbtree-core-seams" }
# `BuildIndexValueDescription` — the unique-violation error detail (cold path).
backend-access-index-genam-seams = { path = "../backend-access-index-genam-seams" }
# The GUC variable slots (`trace_sort` / `optimize_bounded_sort`): tuplesort.c
# owns these two `bool` config variables; `init_seams()` installs their
# `GucVarAccessors` so the GUC machinery reaches the backing store here.
backend-utils-misc-guc-tables = { path = "../backend-utils-misc-guc-tables" }

[dev-dependencies]
# An in-memory BufFile provider for the external-merge tape tests (a leaf-crate
# test binary cannot install the workspace's real buffile/fd seams).
backend-storage-file-buffile-seams = { path = "../backend-storage-file-buffile-seams" }
types-storage = { path = "../types-storage" }
