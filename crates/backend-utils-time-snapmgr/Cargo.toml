[package]
name = "backend-utils-time-snapmgr"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "backend_utils_time_snapmgr"
path = "src/lib.rs"

[dependencies]
backend-utils-error = { path = "../backend-utils-error" }
# Its own outward seams, installed from init_seams().
backend-utils-time-snapmgr-seams = { path = "../backend-utils-time-snapmgr-seams" }
# plancache/xact/standby/subtrans's split slice of snapmgr's active-snapshot +
# TransactionXmin contract — same inward seams, installed from init_seams().
backend-utils-time-snapmgr-pc-seams = { path = "../backend-utils-time-snapmgr-pc-seams" }
# Transaction-state predicates snapmgr consults directly (acyclic: xact depends
# on snapmgr-seams, not on snapmgr itself), plus GetCurrentCommandId.
backend-access-transam-xact = { path = "../backend-access-transam-xact" }
# RelationInvalidatesSnapshotsOnly / RelationHasSysCache (ported, acyclic).
backend-utils-cache-syscache = { path = "../backend-utils-cache-syscache" }
# Per-backend identity globals (MyProcPid / MyDatabaseId).
backend-utils-init-small-seams = { path = "../backend-utils-init-small-seams" }
# Not-yet-ported owners snapmgr calls across (panic until they land).
backend-access-transam-subtrans-seams = { path = "../backend-access-transam-subtrans-seams" }
backend-storage-ipc-procarray-seams = { path = "../backend-storage-ipc-procarray-seams" }
backend-storage-lmgr-predicate-seams = { path = "../backend-storage-lmgr-predicate-seams" }
backend-storage-lmgr-proc-seams = { path = "../backend-storage-lmgr-proc-seams" }
backend-storage-file-fd-seams = { path = "../backend-storage-file-fd-seams" }

types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
# Owns the historic-snapshot tuplecid map types (`ReorderBufferTupleCidKey/Ent`,
# `TupleCidHash`) — the real owned value behind C's `static HTAB *tuplecid_data`,
# homed in `types-logical` so snapmgr can store it without depending on the
# reorderbuffer crate (which depends on snapmgr, not the reverse).
types-logical = { path = "../types-logical" }
types-snapshot = { path = "../types-snapshot" }
types-storage = { path = "../types-storage" }
