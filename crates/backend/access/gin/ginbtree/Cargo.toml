[package]
name = "ginbtree"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "ginbtree"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
rel = { path = "../../../../_support/types/rel" }
types_storage = { path = "../../../../_support/types/types_storage" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
gin = { path = "../../../../_support/types/gin" }
page = { path = "../../../storage/page" }
utils_error = { path = "../../../utils/utils_error" }
# bufmgr (bufmgr.c) — pin / lock / page access / mark-dirty.
bufmgr_seams = { path = "../../../storage/buffer/bufmgr_seams" }
# relcache (utils/rel.h) — RelationNeedsWAL / RelationGetRelationName.
relcache_seams = { path = "../../../utils/cache/relcache_seams" }
# xloginsert (xloginsert.c) — XLogBeginInsert / XLogRegister* / XLogInsert.
xloginsert_seams = { path = "../../transam/xloginsert_seams" }
# predicate (predicate.c) — CheckForSerializableConflictIn / PredicateLockPageSplit.
predicate_seams = { path = "../../../storage/lmgr/predicate_seams" }
# ginutil (ginutil.c) — GinNewBuffer (gin_new_buffer seam).
ginutil_seams = { path = "../ginutil_seams" }

[dev-dependencies]
