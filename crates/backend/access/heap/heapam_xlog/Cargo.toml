[package]
name = "heapam_xlog"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "heapam_xlog"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
