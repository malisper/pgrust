[package]
name = "rewriteheap"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "rewriteheap"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
libc = "0.2"
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
rel = { path = "../../../../_support/types/rel" }
types_storage = { path = "../../../../_support/types/types_storage" }
wal = { path = "../../../../_support/types/wal" }
types_pgstat = { path = "../../../../_support/types/types_pgstat" }

utils_error = { path = "../../../utils/utils_error" }

# Direct (ported leaf) deps — acyclic, rewriteheap sits above all of these.
bulkwrite = { path = "../../../storage/smgr/bulkwrite" }
bulkwrite_seams = { path = "../../../storage/smgr/bulkwrite_seams" }
smgr = { path = "../../../storage/smgr/smgr" }
page = { path = "../../../storage/page" }
fd = { path = "../../../storage/file/fd" }
fd_seams = { path = "../../../storage/file/fd_seams" }
heaptoast = { path = "../heaptoast" }
heapam = { path = "../heapam" }
heapam_visibility = { path = "../heapam_visibility" }

# Seam (unported / cross-cycle) deps.
transam_xact_seams = { path = "../../transam/transam_xact_seams" }
transam_xlog_seams = { path = "../../transam/transam_xlog_seams" }
xloginsert_seams = { path = "../../transam/xloginsert_seams" }
procarray_seams = { path = "../../../storage/ipc/procarray_seams" }
slot_seams = { path = "../../../replication/slot_seams" }
init_small_seams = { path = "../../../utils/init/init_small_seams" }
relcache_seams = { path = "../../../utils/cache/relcache_seams" }
catalog_seams = { path = "../../../catalog/catalog_seams" }

# Inward seam crate this unit owns.
rewriteheap_seams = { path = "../rewriteheap_seams" }
