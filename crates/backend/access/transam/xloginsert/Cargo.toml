pglz = { path = "../../../../common/pglz" }
crc32c = { path = "../../../../port/crc32c" }

xloginsert_seams = { path = "../xloginsert_seams" }
transam_xlog_seams = { path = "../transam_xlog_seams" }
transam_xact_seams = { path = "../transam_xact_seams" }
