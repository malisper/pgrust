[package]
name = "pg_aggregate"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "pg_aggregate"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
mcx = { path = "../../../_support/mcx" }
utils_error = { path = "../../utils/utils_error" }

types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
types_acl = { path = "../../../_support/types/types_acl" }
types_tuple = { path = "../../../_support/types/types_tuple" }
types_catalog = { path = "../../../_support/types/types_catalog" }
parsenodes = { path = "../../../_support/types/parsenodes" }
types_storage = { path = "../../../_support/types/types_storage" }

# Own inward seam (AggregateCreate), installed from init_seams().
pg_aggregate_seams = { path = "../pg_aggregate_seams" }

# Foundation crates called directly (no cycle).
table = { path = "../../access/table/table" }
dependency = { path = "../dependency" }

# Cross-owner seams (loud-panic until the owner lands).
indexing_seams = { path = "../indexing_seams" }
aclchk_seams = { path = "../aclchk_seams" }
functioncmds_seams = { path = "../../commands/functioncmds_seams" }
parse_func_seams = { path = "../../parser/parse_func_seams" }
parse_oper_seams = { path = "../../parser/parse_oper_seams" }
coerce_seams = { path = "../../parser/coerce_seams" }
format_type_seams = { path = "../../utils/adt/format_type_seams" }
lsyscache_seams = { path = "../../utils/cache/lsyscache_seams" }
syscache_seams = { path = "../../utils/cache/syscache_seams" }
