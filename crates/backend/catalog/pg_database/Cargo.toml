[package]
name = "pg_database"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "pg_database"
path = "src/lib.rs"

[dependencies]
seam_core = { path = "../../../_support/seam/seam_core" }
mcx = { path = "../../../_support/mcx" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
rel = { path = "../../../_support/types/rel" }
types_tuple = { path = "../../../_support/types/types_tuple" }
types_catalog = { path = "../../../_support/types/types_catalog" }
types_scan = { path = "../../../_support/types/types_scan" }
types_storage = { path = "../../../_support/types/types_storage" }

# Own inward-seam declarations (installed by this crate's init_seams()).
pg_database_seams = { path = "../pg_database_seams" }

# The catalog-mutation engine (F0, indexing.c) is consumed as `pub` functions,
# exactly as the indexing F1 family does — no cycle (indexing does not depend on
# this crate).
indexing = { path = "../indexing" }

# heap_form_tuple / heap_deform_tuple (forming + decoding the pg_database tuple)
# — direct calls into the common heaptuple unit, as the indexing F1 family does.
heaptuple = { path = "../../access/common/heaptuple" }
scankey = { path = "../../access/common/scankey" }

# SearchSysCache1(DATABASEOID, ...) for the syscache read seam — direct dep on
# the syscache owner (no cycle; syscache does not depend on this crate).
cache_syscache = { path = "../../utils/cache/cache_syscache" }
types_syscache = { path = "../../../_support/types/types_syscache" }
cache = { path = "../../../_support/types/cache" }
datum = { path = "../../../_support/types/datum" }

# Outward callees crossed as seams.
table_seams = { path = "../../access/table/table_seams" }
genam_seams = { path = "../../access/index/genam_seams" }
lmgr_seams = { path = "../../storage/lmgr/lmgr_seams" }
lock_seams = { path = "../../storage/lmgr/lock_seams" }
varlena_seams = { path = "../../utils/adt/varlena_seams" }
transam_xlog_seams = { path = "../../access/transam/transam_xlog_seams" }
# criticalSharedRelcachesBuilt — GetDatabaseTuple/ByOid force a heap scan (no
# index) until the critical shared relcache entries are nailed (postinit.c).
relcache_seams = { path = "../../utils/cache/relcache_seams" }
# SetDatabaseHasLoginEventTriggers: MyDatabaseId + CommandCounterIncrement.
tablespace_globals_seams = { path = "../../commands/tablespace_globals_seams" }
transam_xact = { path = "../../access/transam/transam_xact" }
