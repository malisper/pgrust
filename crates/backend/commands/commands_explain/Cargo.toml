[package]
name = "commands_explain"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "commands_explain"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../_support/mcx" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
types_explain = { path = "../../../_support/types/types_explain" }
nodes = { path = "../../../_support/types/nodes" }
types_scan = { path = "../../../_support/types/types_scan" }
snapshot = { path = "../../../_support/types/snapshot" }
types_tuple = { path = "../../../_support/types/types_tuple" }

# Sibling EXPLAIN crates (emitters + option parsing).
explain_format = { path = "../explain_format" }

# make_ands_explicit for the qual `Filter:` line (show_scan_qual).
nodes_core = { path = "../../nodes/nodes_core" }

# Catalog name lookups + identifier quoting for the scan/modify target relation
# names (ExplainTargetRel / explain_get_index_name). No expression deparse, no
# cycle (neither crate depends on explain).
lsyscache = { path = "../../utils/cache/lsyscache" }
ruleutils = { path = "../../utils/adt/ruleutils" }

# Inward seam crate this unit installs.
explain_seams = { path = "../explain_seams" }

# ExplainOneUtility CTAS leg: CreateTableAsRelExists (createas-seams).
createas_seams = { path = "../createas_seams" }

# ExplainResultDesc: tcop-utility out-seam this unit installs + the tupdesc
# constructor + the format-option string accessor.
utility_out_seams = { path = "../../tcop/utility_out_seams" }
tupdesc = { path = "../../access/common/tupdesc" }
define_seams = { path = "../define_seams" }

# SQL-EXPLAIN driver: option parsing (state crate), rewriter + planner entries,
# and the tuple-output sink that writes the plan text to the dest receiver.
explain_state = { path = "../explain_state" }
rewritehandler_seams = { path = "../../rewrite/rewritehandler_seams" }
planner_seams = { path = "../../optimizer/plan/planner_seams" }
execTuples = { path = "../../executor/execTuples" }
# tuplesort_method_name / tuplesort_space_type_name for show_incremental_sort_info.
tuplesort = { path = "../../utils/sort/tuplesort" }
# tuplesort_get_stats seam for show_sort_info (plain Sort node EXPLAIN ANALYZE).
tuplesort_seams = { path = "../../utils/sort/tuplesort_seams" }
# tuplestore_get_stats seam for show_windowagg_info / show_material_info storage line.
sort_storage_seams = { path = "../../utils/sort/sort_storage_seams" }
varlena_seams = { path = "../../utils/adt/varlena_seams" }
utils_error = { path = "../../utils/utils_error" }
types_slot = { path = "../../../_support/types/types_slot" }

# es->memory: planner-context create/switch + MemoryContextMemConsumed
# (commands/explain.c ExplainOnePlan's mem_counters leg). The fgram mmgr unit
# carries its own (fgram) error world, bridged to this crate's PgError at the
# call sites.
mmgr_fgram = { path = "../../utils/mmgr/mmgr_fgram" }
error_fgram = { path = "../../utils/error/error_fgram" }

# Owner seam crates (calls into other owners; panic until installed).
execMain_seams = { path = "../../executor/execMain_seams" }
instrument = { path = "../../executor/instrument" }
guc_tables = { path = "../../utils/misc/guc_tables" }
snapmgr_seams = { path = "../../utils/time/snapmgr_seams" }
transam_xact_seams = { path = "../../access/transam/transam_xact_seams" }
ruleutils_seams = { path = "../../utils/adt/ruleutils_seams" }
# EXPLAIN (SERIALIZE): CreateExplainSerializeDestReceiver / GetSerializationMetrics
# live in printtup (explain_dr.c's serialization machinery mirrors printtup).
printtup_seams = { path = "../../access/common/printtup_seams" }
# IsQueryIdEnabled() + JumbleQuery for the EXPLAIN (compute_query_id) Query Identifier.
queryjumble_seams = { path = "../../nodes/queryjumble_seams" }
instr_time = { path = "../../../_support/portability/instr_time" }
