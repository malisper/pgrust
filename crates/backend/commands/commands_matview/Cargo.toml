[package]
name = "commands_matview"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "commands_matview"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../_support/mcx" }
seam_core = { path = "../../../_support/seam/seam_core" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
types_storage = { path = "../../../_support/types/types_storage" }
types_tuple = { path = "../../../_support/types/types_tuple" }
types_catalog = { path = "../../../_support/types/types_catalog" }
types_matview = { path = "../../../_support/types/types_matview" }
portal = { path = "../../../_support/types/portal" }
types_dest = { path = "../../../_support/types/types_dest" }
nodes = { path = "../../../_support/types/nodes" }
rel = { path = "../../../_support/types/rel" }
types_tableam = { path = "../../../_support/types/types_tableam" }
utils_error = { path = "../../utils/utils_error" }

# The DR_transientrel receiver is owned in-crate (mirroring createas's
# DR_intorel): the tcop-dest value-router + the real table-AM / heap
# bulk-insert / xact owners its callbacks reach directly.
tcop_dest = { path = "../../tcop/tcop_dest" }
table = { path = "../../access/table/table" }
table_tableam = { path = "../../access/table/table_tableam" }
indexam = { path = "../../access/index/indexam" }
heapam = { path = "../../access/heap/heapam" }
transam_xact = { path = "../../access/transam/transam_xact" }

# The relcache/index-AM/catalog read-bundle de-tokenization: real owners the
# matview body reads off its open relations (no OID-token re-resolution).
relcache = { path = "../../utils/cache/relcache" }
lsyscache = { path = "../../utils/cache/lsyscache" }
pgstat_relation = { path = "../../utils/activity/pgstat_relation" }

# ruleutils (quote_qualified_identifier) — unported, seam panics until it lands;
# tablecmds (CheckTableNotInUse) — a real ported owner (takes the real Relation).
ruleutils_seams = { path = "../../utils/adt/ruleutils_seams" }
tablecmds_seams = { path = "../tablecmds_seams" }

# matview's own inward seams (it installs every one of these)
matview_seams = { path = "../matview_seams" }

# the utility dispatcher reaches ExecRefreshMatView via this out-seam
utility_out_seams = { path = "../../tcop/utility_out_seams" }

# outward seams into the (mostly unported) owners matview drives
matview_deps_seams = { path = "../matview_deps_seams" }
snapmgr_seams = { path = "../../utils/time/snapmgr_seams" }
guc_seams = { path = "../../utils/misc/guc_seams" }
