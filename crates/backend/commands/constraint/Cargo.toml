[package]
name = "constraint"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "constraint"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
mcx = { path = "../../../_support/mcx" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
rel = { path = "../../../_support/types/rel" }
nodes = { path = "../../../_support/types/nodes" }
types_tuple = { path = "../../../_support/types/types_tuple" }
datum = { path = "../../../_support/types/datum" }
types_tableam = { path = "../../../_support/types/types_tableam" }
snapshot = { path = "../../../_support/types/snapshot" }
types_storage = { path = "../../../_support/types/types_storage" }
types_ri_triggers = { path = "../../../_support/types/types_ri_triggers" }
fmgr = { path = "../../../_support/types/fmgr" }

utils_error = { path = "../../utils/utils_error" }
fmgr_core = { path = "../../utils/fmgr/fmgr_core" }

# Ported owners called directly (acyclic: nothing depends on constraint).
table_tableam = { path = "../../access/table/table_tableam" }
indexam = { path = "../../access/index/indexam" }
execUtils = { path = "../../executor/execUtils" }
execIndexing = { path = "../../executor/execIndexing" }
execTuples_seams = { path = "../../executor/execTuples_seams" }

# Unported owners reached through their seam crates (panic until owner lands).
trigger_seams = { path = "../trigger_seams" }
index_seams = { path = "../../catalog/index_seams" }
