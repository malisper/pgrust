parser_relation = { path = "../../parser/parser_relation" }
clause = { path = "../../parser/clause" }
parse_collate = { path = "../../parser/parse_collate" }
rewrite_core = { path = "../../rewrite/rewrite_core" }
arrayfuncs = { path = "../../utils/adt/arrayfuncs" }
inval = { path = "../../utils/cache/inval" }
miscinit = { path = "../../utils/init/miscinit" }

# Inward seams owned by this unit.
policy_seams = { path = "../policy_seams" }
# ProcessUtilitySlow dispatch entry points (CREATE/ALTER POLICY) installed here.
utility_out_seams = { path = "../../tcop/utility_out_seams" }

# Cross-subsystem externals via their owners' -seams crates.
detoast_seams = { path = "../../access/common/detoast_seams" }
genam_seams = { path = "../../access/index/genam_seams" }
aclchk_seams = { path = "../../catalog/aclchk_seams" }
