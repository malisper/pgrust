common_reloptions = { path = "../../access/common/common_reloptions" }
reloptions_seams = { path = "../../access/common/reloptions_seams" }
table_seams = { path = "../../access/table/table_seams" }
table_tableam = { path = "../../access/table/table_tableam" }
heapam = { path = "../../access/heap/heapam" }
heaptuple = { path = "../../access/common/heaptuple" }
scankey = { path = "../../access/common/scankey" }
indexing = { path = "../../catalog/indexing" }
define_seams = { path = "../define_seams" }
arrayfuncs_seams = { path = "../../utils/adt/arrayfuncs_seams" }
types_scan = { path = "../../../_support/types/types_scan" }
types_tableam = { path = "../../../_support/types/types_tableam" }
rel = { path = "../../../_support/types/rel" }
checkpointer_seams = { path = "../../postmaster/checkpointer_seams" }
pg_tablespace_seams = { path = "../../catalog/pg_tablespace_seams" }
tblspc_fs_seams = { path = "../../storage/file/tblspc_fs_seams" }
tablespace_globals_seams = { path = "../tablespace_globals_seams" }
