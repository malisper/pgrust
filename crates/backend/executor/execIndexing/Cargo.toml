[package]
name = "execIndexing"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "execIndexing"
path = "src/lib.rs"

[dependencies]
# Inward seams this crate owns + installs (incl. ExecCheckIndexConstraints).
execIndexing_seams = { path = "../execIndexing_seams" }
# build_index_info / build_speculative_index_info / form_index_datum.
index_seams = { path = "../../catalog/index_seams" }

# Direct (acyclic) callees.
indexam = { path = "../../access/index/indexam" }
indexam_seams = { path = "../../access/index/indexam_seams" }
table_tableam = { path = "../../access/table/table_tableam" }
scankey = { path = "../../access/common/scankey" }
execUtils = { path = "../execUtils" }
execTuples_seams = { path = "../execTuples_seams" }
nodes_core = { path = "../../nodes/nodes_core" }

# Outward seams (cyclic / unported owners).
execExpr_seams = { path = "../execExpr_seams" }
genam_seams = { path = "../../access/index/genam_seams" }
relcache_seams = { path = "../../utils/cache/relcache_seams" }
typcache_seams = { path = "../../utils/cache/typcache_seams" }
fmgr_seams = { path = "../../utils/fmgr/fmgr_seams" }
rangetypes_seams = { path = "../../utils/adt/rangetypes_seams" }
multirangetypes_seams = { path = "../../utils/adt/multirangetypes_seams" }
lmgr_seams = { path = "../../storage/lmgr/lmgr_seams" }
transam_seams = { path = "../../access/transam/transam_seams" }
transam_xact_seams = { path = "../../access/transam/transam_xact_seams" }
# IndexCheckExclusion: RegisterSnapshot(GetLatestSnapshot()) over the heap rescan.
snapmgr_seams = { path = "../../utils/time/snapmgr_seams" }

utils_error = { path = "../../utils/utils_error" }
mcx = { path = "../../../_support/mcx" }
seam_core = { path = "../../../_support/seam/seam_core" }
types_core = { path = "../../../_support/types/types_core" }
datum = { path = "../../../_support/types/datum" }
types_error = { path = "../../../_support/types/types_error" }
nodes = { path = "../../../_support/types/nodes" }
rel = { path = "../../../_support/types/rel" }
types_scan = { path = "../../../_support/types/types_scan" }
snapshot = { path = "../../../_support/types/snapshot" }
