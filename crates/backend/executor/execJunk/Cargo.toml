[package]
name = "execJunk"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "execJunk"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../_support/mcx" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
types_tuple = { path = "../../../_support/types/types_tuple" }
nodes = { path = "../../../_support/types/nodes" }
# execTuples owns the cleaned-descriptor computation (ExecCleanTypeFromTL); a
# direct dep is acyclic (execTuples does not reach execJunk).
execTuples = { path = "../execTuples" }
# execTuples owns the slot pool ops (ExecSetSlotDescriptor, the virtual-slot
# alloc/fill/store, slot_getattr); reached through its seam crate (pool-id
# payload ops are still seam-and-panic until the slot payload model is wired
# into the EState pool).
execTuples_seams = { path = "../execTuples_seams" }
