[package]
name = "execParallel"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "execParallel"
path = "src/lib.rs"

[dependencies]
seam_core = { path = "../../../_support/seam/seam_core" }
mcx = { path = "../../../_support/mcx" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
nodes = { path = "../../../_support/types/nodes" }
types_storage = { path = "../../../_support/types/types_storage" }
types_scan = { path = "../../../_support/types/types_scan" }
execparallel = { path = "../../../_support/types/execparallel" }

execParallel_seams = { path = "../execParallel_seams" }
execParallel_support_seams = { path = "../execParallel_support_seams" }
transam_parallel = { path = "../../access/transam/transam_parallel" }
shm_mq_seams = { path = "../../storage/ipc/shm_mq_seams" }
dsa_seams = { path = "../../utils/mmgr/dsa_seams" }
tqueue_seams = { path = "../tqueue_seams" }
instrument_seams = { path = "../instrument_seams" }

# Executor driver + recursive-teardown/tuple-bound (called directly — owned).
execMain = { path = "../execMain" }
execProcnode = { path = "../execProcnode" }

# Per-node parallel methods — called directly on the owned node-state structs
# (the F0a owned parallel fns), mirroring execProcnode's direct ExecEnd* calls.
nodeSeqscan = { path = "../nodeSeqscan" }
nodeIndexscan = { path = "../nodeIndexscan" }
nodeIndexonlyscan = { path = "../nodeIndexonlyscan" }
nodeBitmapIndexscan = { path = "../nodeBitmapIndexscan" }
nodeAppend = { path = "../nodeAppend" }
nodeBitmapHeapscan = { path = "../nodeBitmapHeapscan" }
nodeHashjoin = { path = "../nodeHashjoin" }
nodeHash = { path = "../nodeHash" }
nodeSort = { path = "../nodeSort" }
nodeIncrementalSort = { path = "../nodeIncrementalSort" }
nodeAgg = { path = "../nodeAgg" }
nodeMemoize = { path = "../nodeMemoize" }
