[package]
name = "instrument"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "instrument"
path = "src/lib.rs"

[dependencies]
instrument_seams = { path = "../instrument_seams" }
execParallel_support_seams = { path = "../execParallel_support_seams" }
# Lazy-vacuum driver's pgBufferUsage/pgWalUsage snapshot read seams home in
# vacuumlazy-seams; instrument.c owns those backend-global counters.
vacuumlazy_seams = { path = "../../access/heap/vacuumlazy_seams" }
mcx = { path = "../../../_support/mcx" }
instr_time = { path = "../../../_support/portability/instr_time" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
