[package]
name = "nodeCtescan"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "nodeCtescan"
path = "src/lib.rs"

[dependencies]
# Outward calls through per-owner seam crates (owners not yet ported / cyclic).
# The leader-aliased operations (Param-slot leader handshake, shared tuplestore
# reached via the leader link, CTE subplan dispatch) are owned by execMain,
# which holds the live node graph + es_param_exec_vals / es_subplanstates.
execMain_seams = { path = "../execMain_seams" }
execScan_seams = { path = "../execScan_seams" }
execTuples_seams = { path = "../execTuples_seams" }
execUtils_seams = { path = "../execUtils_seams" }
execExpr_seams = { path = "../execExpr_seams" }

# Shared type stack + allocator + error.
types_error = { path = "../../../_support/types/types_error" }
nodes = { path = "../../../_support/types/nodes" }
types_tuple = { path = "../../../_support/types/types_tuple" }
mcx = { path = "../../../_support/mcx" }

[dev-dependencies]
seam_core = { path = "../../../_support/seam/seam_core" }
