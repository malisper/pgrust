[package]
name = "tqueue"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "tqueue"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
seam_core = { path = "../../../_support/seam/seam_core" }
mcx = { path = "../../../_support/mcx" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
types_dest = { path = "../../../_support/types/types_dest" }
types_tuple = { path = "../../../_support/types/types_tuple" }
nodes = { path = "../../../_support/types/nodes" }
execparallel = { path = "../../../_support/types/execparallel" }
types_parallel = { path = "../../../_support/types/types_parallel" }
utils_error = { path = "../../utils/utils_error" }
tqueue_seams = { path = "../tqueue_seams" }
shm_mq_seams = { path = "../../storage/ipc/shm_mq_seams" }
execTuples_seams = { path = "../execTuples_seams" }
# The TupleQueue DestReceiver registers its vtable into the single tcop-dest
# router (mirroring copyto's `CreateCopyDestReceiver`), so the executor's
# `dest->receiveSlot` dispatch reaches `tqueueReceiveSlot`. (No cycle:
# backend-tcop-dest depends only on owner *-seams crates, not on tqueue.)
tcop_dest = { path = "../../tcop/tcop_dest" }
