[package]
name = "node_support"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "node_support"
path = "src/lib.rs"

[dependencies]
# `Mcx`/`PgVec`/`PgBox`/`PgString` — the charged node-tree containers and the
# TARGET memory context every fallible `copy_node_in` allocates into (the C
# `copyObject` allocates against `CurrentMemoryContext`; here we thread the
# destination context explicitly). `mcx` is `#![no_std]` and depends on neither
# `types-nodes` nor this crate, so it cannot form a dependency cycle (the central
# `Node` enum is generated INTO `types-nodes`, which is what lets `types-nodes`
# depend on this leaf without a cycle).
mcx = { path = "../../../_support/mcx" }
# `PgResult`/`PgError` — `copy_node_in` is fallible (allocating into the target
# context can OOM), matching the existing ~42 hand-written `clone_in` methods
# that return `PgResult`. `types-error` is `#![no_std]` and a pure leaf.
types_error = { path = "../../../_support/types/types_error" }
# `double_to_shortest_decimal_buf` / `float_to_shortest_decimal_buf` — the Ryū
# shortest round-trip serializer (faithful port of src/common/{d2s,f2s}.c). This
# is exactly what `outDouble` (WRITE_FLOAT_FIELD, outfuncs.c) emits, so the f64/
# f32 leaf OUT impls below are byte-identical to PostgreSQL's node text stream.
# A pure dependency-free leaf; cannot form a cycle.
ryu = { path = "../../../common/ryu" }
