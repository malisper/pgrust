[package]
name = "readfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "readfuncs"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../_support/mcx" }
types_error = { path = "../../../_support/types/types_error" }
nodes = { path = "../../../_support/types/nodes" }
types_tuple = { path = "../../../_support/types/types_tuple" }
# The tokenizer / nodeRead driver lives in the `read` family of
# `backend-nodes-core` (`read.c`): `parseNodeString` reads the node body off the
# shared `pg_strtok` cursor and recurses back through `node_read` for sub-fields.
# Depending on the OWNER crate (not its seam crate) is the sanctioned direct edge
# — and it is acyclic: `backend-nodes-core` depends on `backend-nodes-readfuncs-seams`
# (the seam crate), never on this owner crate.
nodes_core = { path = "../nodes_core" }
readfuncs_seams = { path = "../readfuncs_seams" }

[dev-dependencies]
# The OUT side, so the round-trip tests can serialize a value/list node with
# `nodeToString` and reparse it with `string_to_node`.
outfuncs = { path = "../outfuncs" }
