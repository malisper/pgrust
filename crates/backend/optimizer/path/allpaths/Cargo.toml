[package]
name = "allpaths"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "allpaths"
path = "src/lib.rs"

[dependencies]
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
nodes = { path = "../../../../_support/types/nodes" }
pathnodes = { path = "../../../../_support/types/pathnodes" }
# PARTITION_STRATEGY_* constants for partitions_are_ordered.
types_partition = { path = "../../../../_support/types/types_partition" }
mcx = { path = "../../../../_support/mcx" }
seam_core = { path = "../../../../_support/seam/seam_core" }

# Sibling optimizer owners + their seam crates.
pathnode_seams = { path = "../../util/pathnode_seams" }
relnode_seams = { path = "../../util/relnode_seams" }
appendinfo_seams = { path = "../../util/appendinfo_seams" }
costsize = { path = "../costsize" }
costsize_seams = { path = "../costsize_seams" }
pathkeys = { path = "../pathkeys" }
path_pathkeys_seams = { path = "../path_pathkeys_seams" }
equivclass = { path = "../equivclass" }
equivclass_seams = { path = "../equivclass_seams" }
equivclass_ext_seams = { path = "../equivclass_ext_seams" }
joinrels = { path = "../joinrels" }
indxpath = { path = "../indxpath" }
path_small = { path = "../path_small" }
rte_seams = { path = "../../rte_seams" }
# TABLESAMPLE method dispatch: the pure SampleScanGetSampleSize estimation
# bodies + the GetTsmRoutine(handlerOid) registry live here (access AM owner).
tablesample_core = { path = "../../../access/tablesample/tablesample_core" }
tablesample_core_seams = { path = "../../../access/tablesample/tablesample_core_seams" }
geqo_all = { path = "../../../geqo_all" }
geqo_all_seams = { path = "../../../geqo_all_seams" }
postgres_seams = { path = "../../../tcop/postgres_seams" }
guc_tables = { path = "../../../utils/misc/guc_tables" }
# allpaths.c owns the `min_parallel_index_scan_size` GUC; vacuumparallel reads
# it through this accessor seam, which allpaths installs in `init_seams`.
vacuum_seams = { path = "../../../commands/vacuum_seams" }
setrefs_seams = { path = "../../plan/setrefs_seams" }
# `set_subquery_pathlist` plans a FROM-subquery into a subroot via the
# planner-owned `subquery_planner_for_fromsubquery` seam.
planner_seams = { path = "../../plan/planner_seams" }

# Subquery pushdown-safety cluster (pushdown.rs): expression/var/clause helpers,
# the rewrite var-replacer, and the lsyscache support-function lookups.
nodes_core = { path = "../../../nodes/nodes_core" }
vars = { path = "../../util/vars" }
clauses = { path = "../../util/clauses" }
rewrite_core = { path = "../../../rewrite/rewrite_core" }
clause = { path = "../../../parser/clause" }
lsyscache_seams = { path = "../../../utils/cache/lsyscache_seams" }
