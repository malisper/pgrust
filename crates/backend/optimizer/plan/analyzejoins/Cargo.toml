[package]
name = "analyzejoins"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "analyzejoins"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
nodes = { path = "../../../../_support/types/nodes" }
pathnodes = { path = "../../../../_support/types/pathnodes" }
# pathnode.c `create_unique_path` reaches the subquery-distinctness probe via the
# pathnode-side outward seam. pathnode-seams is a leaf seam crate — no cycle.
pathnode_seams = { path = "../../util/pathnode_seams" }
nodes_core = { path = "../../../nodes/nodes_core" }
rewrite_core = { path = "../../../rewrite/rewrite_core" }
relnode = { path = "../../util/relnode" }
joininfo = { path = "../../util/joininfo" }
equivclass = { path = "../../path/equivclass" }

# Seam crates we INSTALL into (inward seams owned by analyzejoins.c):
init_subselect_seams = { path = "../init_subselect_seams" }
joinpath_seams = { path = "../../path/joinpath_seams" }

# Seam crates we CALL (outward deps, real owner elsewhere):
nodeFuncs_seams = { path = "../../../nodes/nodeFuncs_seams" }
indxpath = { path = "../../path/indxpath" }
lsyscache = { path = "../../../utils/cache/lsyscache" }
vars = { path = "../../util/vars" }
joininfo_ext_seams = { path = "../../util/joininfo_ext_seams" }
equivclass_ext_seams = { path = "../../path/equivclass_ext_seams" }
rte_seams = { path = "../../rte_seams" }
plancat_ext_seams = { path = "../../util/plancat_ext_seams" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
plan_small_seams = { path = "../plan_small_seams" }
guc_tables = { path = "../../../utils/misc/guc_tables" }
