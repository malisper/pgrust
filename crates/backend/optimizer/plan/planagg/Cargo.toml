[package]
name = "planagg"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "planagg"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
nodes = { path = "../../../../_support/types/nodes" }
pathnodes = { path = "../../../../_support/types/pathnodes" }

# Already-ported subsystems called directly (no cycle, no seam):
# nodeFuncs (expr_type), clauses (contain_mutable_functions).
nodes_core = { path = "../../../nodes/nodes_core" }
clauses = { path = "../../util/clauses" }

# Cross-unit catalog seams this unit consumes (installed by their owners):
# type_is_rowtype (lsyscache), agg_form_by_oid -> aggsortop (syscache).
lsyscache_seams = { path = "../../../utils/cache/lsyscache_seams" }
syscache_seams = { path = "../../../utils/cache/syscache_seams" }
