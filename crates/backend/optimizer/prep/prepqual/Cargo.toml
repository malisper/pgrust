[package]
name = "prepqual"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "prepqual"
path = "src/lib.rs"

[dependencies]
seam_core = { path = "../../../../_support/seam/seam_core" }
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
nodes = { path = "../../../../_support/types/nodes" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
nodes_core = { path = "../../../nodes/nodes_core" }

# Inward seams this unit owns + installs (declared in the clauses.c consumer's
# per-file seam crate; this unit is the prepqual.c C-source owner).
prepqual_seams = { path = "../prepqual_seams" }

# Outward seams this unit calls.
lsyscache_seams = { path = "../../../utils/cache/lsyscache_seams" }
equalfuncs_seams = { path = "../../../nodes/equalfuncs_seams" }
