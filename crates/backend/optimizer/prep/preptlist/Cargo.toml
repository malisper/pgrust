[package]
name = "preptlist"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "preptlist"
path = "src/lib.rs"

[dependencies]
seam_core = { path = "../../../../_support/seam/seam_core" }
mcx = { path = "../../../../_support/mcx" }
appendinfo_seams = { path = "../../util/appendinfo_seams" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
nodes = { path = "../../../../_support/types/nodes" }
pathnodes = { path = "../../../../_support/types/pathnodes" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
rel = { path = "../../../../_support/types/rel" }

# expand_insert_targetlist INSERT leg: open the target relation and build
# missing-column NULL Consts / TargetEntries.
table = { path = "../../../access/table/table" }
nodes_core = { path = "../../../nodes/nodes_core" }
# Domain / generated-column legs route through the owners' seams.
coerce_seams = { path = "../../../parser/coerce_seams" }
lsyscache_seams = { path = "../../../utils/cache/lsyscache_seams" }
vars = { path = "../../util/vars" }
equalfuncs_seams = { path = "../../../nodes/equalfuncs_seams" }

# Inward seam this unit owns + installs (preprocess_targetlist).
preptlist_seams = { path = "../preptlist_seams" }

# Cross-unit seam this unit owns (get_plan_rowmark, consumed by indxpath as
# `has_plan_rowmark`).
restrictinfo_seams = { path = "../../util/restrictinfo_seams" }
