[package]
name = "rte_seams"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "rte_seams"
path = "src/lib.rs"

[features]
# Exposes `synthetic::install_synthetic_rte_table` to non-test downstream
# crates that want to drive the optimizer against a hand-built RT space (the
# real planner-entry install is unported). Always on inside this crate's own
# `cargo test`.
synthetic = []

[dependencies]
seam_core = { path = "../../../_support/seam/seam_core" }
types_core = { path = "../../../_support/types/types_core" }
pathnodes = { path = "../../../_support/types/pathnodes" }
# The init-subselect-ext `rte_kind_inh_relkind` is one RTE projection; this
# resolver crate installs it through `planner_rt_fetch` (its real RTE store).
init_subselect_ext_seams = { path = "../plan/init_subselect_ext_seams" }
# costsize.c `set_rel_width` reads `rte->relid` via a RelOptInfo handle; this
# resolver crate installs that projection through the same `planner_rt_fetch`
# RTE store (the seam declares it `(run, root, rel)` with no ported owner).
costsize_seams = { path = "../path/costsize_seams" }
# plancat.c `get_relation_foreign_keys` + analyzejoins.c
# `remove_useless_self_joins` read `parse->resultRelation`; installed here
# through the same `run.resolve(root.parse)` query store.
plancat_ext_seams = { path = "../util/plancat_ext_seams" }
# relnode.c `build_simple_rel` sizes its attr arrays from
# `list_length(rte->eref->colnames)`; this resolver installs that projection
# through the same `planner_rt_fetch` RTE store (the relnode-ext seam declares it
# with no ported owner directory).
relnode_ext_seams = { path = "../util/relnode_ext_seams" }
# costsize.c set_function_size_estimates / cost_functionscan / cost_tablefuncscan
# read the FUNCTION/TABLEFUNC RTE's funcexprs (rte->functions / rte->tablefunc) —
# only reachable through this resolver's planner_rt_fetch RTE store. The row /
# qual-cost reductions over those owned funcexprs are computed here via
# clauses.c's expression_returns_set_rows and costsize.c's cost_qual_eval_expr.
clauses = { path = "../util/clauses" }
costsize = { path = "../path/costsize" }
nodes = { path = "../../../_support/types/nodes" }
types_error = { path = "../../../_support/types/types_error" }
# infer_arbiter_indexes' `parse_onconflict` flattens the arbiter-WHERE inference
# predicate to the implicit-AND `List` via make_ands_implicit before interning.
nodes_core = { path = "../../nodes/nodes_core" }
# infer_arbiter_indexes' `node_equal` resolves two arena handles and delegates to
# equalfuncs' `equal_expr`.
equalfuncs_seams = { path = "../../nodes/equalfuncs_seams" }

[dev-dependencies]
# Needed by the synthetic fixture's tests to build an (empty) PlannerRun in an
# Mcx so the re-signed `(run, root, rti)` seams can be called.
mcx = { path = "../../../_support/mcx" }
