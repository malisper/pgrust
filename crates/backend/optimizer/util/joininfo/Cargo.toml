[package]
name = "joininfo"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "joininfo"
path = "src/lib.rs"

[dependencies]
seam_core = { path = "../../../../_support/seam/seam_core" }
mcx = { path = "../../../../_support/mcx" }
init_subselect_ext_seams = { path = "../../plan/init_subselect_ext_seams" }
