# Outward seams this unit calls.
relnode_seams = { path = "../relnode_seams" }
relnode_ext_seams = { path = "../relnode_ext_seams" }
pathnode_seams = { path = "../pathnode_seams" }
equivclass_seams = { path = "../../path/equivclass_seams" }
lsyscache_seams = { path = "../../../utils/cache/lsyscache_seams" }
