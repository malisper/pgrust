[package]
name = "parse_collate"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "parse_collate"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../_support/mcx" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
nodes = { path = "../../../_support/types/nodes" }
parsenodes = { path = "../../../_support/types/parsenodes" }
types_cluster = { path = "../../../_support/types/types_cluster" }
utils_error = { path = "../../utils/utils_error" }
nodes_core = { path = "../../nodes/nodes_core" }
# Outward dependency seams (catalog / cache / sibling-parser callees).
lsyscache_seams = { path = "../../utils/cache/lsyscache_seams" }
# get_collation_name is a real ported lsyscache fn (not a seam) used only for
# error messages; called via a scratch context, like format_type_be_owned.
lsyscache = { path = "../../utils/cache/lsyscache" }
small1_seams = { path = "../small1_seams" }

[dev-dependencies]
# The real `get_collation_name` reaches the syscache `collation_name` seam;
# tests install it (and the lsyscache seams) so error paths resolve.
syscache_seams = { path = "../../utils/cache/syscache_seams" }
