[package]
name = "parse_target"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "parse_target"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../_support/mcx" }
seam_core = { path = "../../../_support/seam/seam_core" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
nodes = { path = "../../../_support/types/nodes" }
types_tuple = { path = "../../../_support/types/types_tuple" }
rel = { path = "../../../_support/types/rel" }
parsenodes = { path = "../../../_support/types/parsenodes" }
types_acl = { path = "../../../_support/types/types_acl" }

utils_error = { path = "../../utils/utils_error" }
nodes_core = { path = "../../nodes/nodes_core" }

# Merged sibling owners called directly (cycle-free): parse_relation,
# parse_coerce, parse_type, plus the parse_node.c helpers in small1 and the
# funcapi / lsyscache / format-type catalog support.
parser_relation = { path = "../parser_relation" }
coerce = { path = "../coerce" }
parse_type = { path = "../parse_type" }
small1 = { path = "../small1" }
funcapi = { path = "../../utils/fmgr/funcapi" }
adt_format_type = { path = "../../utils/adt/adt_format_type" }
tupdesc = { path = "../../access/common/tupdesc" }

# Owner of the inward seams this crate installs.
target_seams = { path = "../target_seams" }
# expandRecordVariable's C body lives in parse_target.c (this crate); the seam
# is declared in relation-seams because parse_func.c is its caller.
parser_relation_seams = { path = "../parser_relation_seams" }

# Outward dependency seams.
parse_expr_seams = { path = "../parse_expr_seams" }
small1_seams = { path = "../small1_seams" }
lsyscache_seams = { path = "../../utils/cache/lsyscache_seams" }
dbcommands_seams = { path = "../../commands/dbcommands_seams" }
init_small_seams = { path = "../../utils/init/init_small_seams" }

[dev-dependencies]
