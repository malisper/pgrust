[package]
name = "logicalfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "logicalfuncs"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
types_logical = { path = "../../../../_support/types/types_logical" }
utils_error = { path = "../../../utils/utils_error" }

# Same-subsystem landed owner: LogLogicalMessage (message.c).
message = { path = "../message" }

# The decode driver + per-context output routing (#351).
logical_logical = { path = "../logical_logical" }
logical_seams = { path = "../logical_seams" }
decode_seams = { path = "../decode_seams" }

# `ctx->out` StringInfo backing store (read the decoded bytes back out).
mcxt_seams = { path = "../../../utils/mmgr/mcxt_seams" }

# Slot acquire/release + CheckSlotPermissions + ReplicationSlotMarkDirty.
replication_slot = { path = "../../replication_slot" }

# end-of-WAL + the local-read XLogReader step.
transam_xlog_seams = { path = "../../../access/transam/transam_xlog_seams" }
xlogreader_seams = { path = "../../../access/transam/xlogreader_seams" }
inval_seams = { path = "../../../utils/cache/inval_seams" }
postgres_seams = { path = "../../../tcop/postgres_seams" }

# fmgr builtin registration (pg_logical_emit_message_{text,bytea}).
fmgr = { path = "../../../../_support/types/fmgr" }
datum = { path = "../../../../_support/types/datum" }
fmgr_core = { path = "../../../utils/fmgr/fmgr_core" }
