types_walreceiver = { path = "../../../../_support/types/types_walreceiver" }
types_startup = { path = "../../../../_support/types/types_startup" }
mcx = { path = "../../../../_support/mcx" }

# own inward seams
slotsync_seams = { path = "../slotsync_seams" }

# spinlock + shmem for the SlotSyncCtx control area (owned here)
