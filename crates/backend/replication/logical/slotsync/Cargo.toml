error_seams = { path = "../../../utils/error/error_seams" }
quote_seams = { path = "../../../utils/adt/quote_seams" }
procsignal_seams = { path = "../../../storage/ipc/procsignal_seams" }

# signal-handler install block (ReplSlotSyncWorkerMain, slotsync.c:1413-1421)
