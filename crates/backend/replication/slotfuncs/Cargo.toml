[package]
name = "slotfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "slotfuncs"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
mcx = { path = "../../../_support/mcx" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
utils_error = { path = "../../utils/utils_error" }
datum = { path = "../../../_support/types/datum" }
types_tuple = { path = "../../../_support/types/types_tuple" }
fmgr = { path = "../../../_support/types/fmgr" }
nodes = { path = "../../../_support/types/nodes" }
wal = { path = "../../../_support/types/wal" }
types_logical = { path = "../../../_support/types/types_logical" }
replication_slot_2 = { path = "../../../_support/types/replication_slot_2" }

# fmgr builtin table (by-OID dispatch registration).
fmgr_core = { path = "../../utils/fmgr/fmgr_core" }
# Same-subsystem landed owners (acyclic: none of these call slotfuncs).
replication_slot = { path = "../replication_slot" }
logical_logical = { path = "../logical/logical_logical" }
walsender = { path = "../walsender" }
# Owner seam crates (calls into not-yet-installed owners panic until they land).
funcapi_seams = { path = "../../utils/fmgr/funcapi_seams" }
transam_xlog_seams = { path = "../../access/transam/transam_xlog_seams" }
xlogrecovery_seams = { path = "../../access/transam/xlogrecovery_seams" }
miscinit_seams = { path = "../../utils/init/miscinit_seams" }
init_small_seams = { path = "../../utils/init/init_small_seams" }
guc_seams = { path = "../../utils/misc/guc_seams" }
dfmgr_seams = { path = "../../utils/fmgr/dfmgr_seams" }
slotsync_seams = { path = "../logical/slotsync_seams" }
replication_libpqwalreceiver = { path = "../replication_libpqwalreceiver" }
