[package]
name = "freespace"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "freespace"
path = "src/lib.rs"

[dependencies]
# Lazy-vacuum driver FSM seams (RecordPageWithFreeSpace / GetRecordedFreeSpace /
# FreeSpaceMapVacuumRange) home in vacuumlazy-seams; freespace.c is their owner.
vacuumlazy_seams = { path = "../../access/heap/vacuumlazy_seams" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
types_storage = { path = "../../../_support/types/types_storage" }
rel = { path = "../../../_support/types/rel" }
fsm = { path = "../../../_support/types/fsm" }
utils_error = { path = "../../utils/utils_error" }
freespace_seams = { path = "freespace_seams" }
bufmgr_seams = { path = "../buffer/bufmgr_seams" }
smgr_seams = { path = "../smgr/smgr_seams" }
xloginsert_seams = { path = "../../access/transam/xloginsert_seams" }
xlogutils_seams = { path = "../../access/transam/xlogutils_seams" }
transam_xlog_seams = { path = "../../access/transam/transam_xlog_seams" }
relcache_seams = { path = "../../utils/cache/relcache_seams" }
miscinit_seams = { path = "../../utils/init/miscinit_seams" }
