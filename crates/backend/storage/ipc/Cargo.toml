[package]
name = "ipc"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "ipc"
path = "src/lib.rs"

[dependencies]
seam_core = { path = "../../../_support/seam/seam_core" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
types_guc = { path = "../../../_support/types/types_guc" }
types_storage = { path = "../../../_support/types/types_storage" }
utils_error = { path = "../../utils/utils_error" }
# shmem index sizing type/constant (no cycle: shmem.c does not call ipci.c)
ipc_shmem = { path = "ipc_shmem" }
# IsUnderPostmaster (globals.c) — the !IsUnderPostmaster InitProcGlobal gate
init_small_seams = { path = "../../utils/init/init_small_seams" }
# this unit's own inward seam declarations (ipci.c), installed by init_seams()
ipci_seams = { path = "ipci_seams" }

# ipci-core boundary owners
sysv_shmem_seams = { path = "../../port/sysv/sysv_shmem_seams" }
pg_sema_seams = { path = "../../port/pg_sema_seams" }
