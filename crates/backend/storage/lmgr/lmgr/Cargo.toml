[package]
name = "lmgr"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "lmgr"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
user_seams = { path = "../../../commands/user_seams" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
types_storage = { path = "../../../../_support/types/types_storage" }
stringinfo = { path = "../../../../_support/types/stringinfo" }
rel = { path = "../../../../_support/types/rel" }
types_tuple = { path = "../../../../_support/types/types_tuple" }

# Inward seams this crate owns and installs.
lmgr_seams = { path = "../lmgr_seams" }
lmgr_pc_seams = { path = "../lmgr_pc_seams" }
# Lazy-vacuum driver's relation-lock seams (UnlockRelation / ConditionalLockRelation
# / LockHasWaitersRelation, re-signed off `&Relation`) home in vacuumlazy-seams;
# the LockRelId is resolved off the relcache entry by OID.
vacuumlazy_seams = { path = "../../../access/heap/vacuumlazy_seams" }
relcache_seams = { path = "../../../utils/cache/relcache_seams" }

# Outward seams (owners not yet ported, or cyclic).
lock_seams = { path = "../lock_seams" }
inval_seams = { path = "../../../utils/cache/inval_seams" }
procarray_seams = { path = "../../ipc/procarray_seams" }
subtrans_seams = { path = "../../../access/transam/subtrans_seams" }
postgres_seams = { path = "../../../tcop/postgres_seams" }
pgsleep_seams = { path = "../../../../port/pgsleep_seams" }
init_small_seams = { path = "../../../utils/init/init_small_seams" }
catalog_seams = { path = "../../../catalog/catalog_seams" }

# Direct (acyclic) dep: progress reporting owner.
activity_small = { path = "../../../utils/activity/activity_small" }
