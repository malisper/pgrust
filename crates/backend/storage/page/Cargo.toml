[package]
name = "page"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "page"
path = "src/lib.rs"

[features]
# Mirrors the C build-time `CLOBBER_FREED_MEMORY` define: when enabled, freed
# regions (here: truncated line-pointer slots) are overwritten with 0x7F as a
# debugging aid. Off by default, exactly like the C `#ifdef`.
clobber_freed_memory = []

[dependencies]
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
types_storage = { path = "../../../_support/types/types_storage" }
types_tuple = { path = "../../../_support/types/types_tuple" }
mcx = { path = "../../../_support/mcx" }
utils_error = { path = "../../utils/utils_error" }
checksum = { path = "checksum" }
page_seams = { path = "page_seams" }
transam_xlog_seams = { path = "../../access/transam/transam_xlog_seams" }
guc_tables = { path = "../../utils/misc/guc_tables" }
