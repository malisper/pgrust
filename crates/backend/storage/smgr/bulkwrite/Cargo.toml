[package]
name = "bulkwrite"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "bulkwrite"
path = "src/lib.rs"

[dependencies]
seam_core = { path = "../../../../_support/seam/seam_core" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
types_storage = { path = "../../../../_support/types/types_storage" }
rel = { path = "../../../../_support/types/rel" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
mcx = { path = "../../../../_support/mcx" }
utils_error = { path = "../../../utils/utils_error" }

# smgr is BELOW bulkwrite (bulkwrite calls smgrnblocks/extend/write/...): direct.
smgr = { path = "../smgr" }
# Page checksum (bufpage.c) is ported and below bulkwrite: direct.
page = { path = "../../page" }

# Seam crates this unit OWNS (installs every decl from its own init_seams()).
bulkwrite_seams = { path = "../bulkwrite_seams" }

# Outward owner seams (calls that would cycle / cross unported neighbors).
transam_xlog_seams = { path = "../../../access/transam/transam_xlog_seams" }
xloginsert_seams = { path = "../../../access/transam/xloginsert_seams" }
lmgr_proc_seams = { path = "../../lmgr/lmgr_proc_seams" }
