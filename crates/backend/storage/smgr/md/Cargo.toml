[package]
name = "md"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "md"
path = "src/lib.rs"

[dependencies]
libc = "0.2"
seam_core = { path = "../../../../_support/seam/seam_core" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
types_storage = { path = "../../../../_support/types/types_storage" }
types_pgstat = { path = "../../../../_support/types/types_pgstat" }
mcx = { path = "../../../../_support/mcx" }
utils_error = { path = "../../../utils/utils_error" }
relpath = { path = "../../../common/relpath" }
fd = { path = "../../file/fd" }
guc_tables = { path = "../../../utils/misc/guc_tables" }

# Seam crates this unit OWNS (installs every decl from its own init_seams()).
md_seams = { path = "../md_seams" }

# Outward owner seams (calls that would cycle / cross unported neighbors).
sync_seams = { path = "../../sync/sync_seams" }
xlogrecovery_seams = { path = "../../../access/transam/xlogrecovery_seams" }
binary_upgrade_seams = { path = "../../../catalog/binary_upgrade_seams" }
tablespace_seams = { path = "../../../commands/tablespace_seams" }
