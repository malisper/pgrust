types_storage = { path = "../../../../_support/types/types_storage" }
types_pgstat = { path = "../../../../_support/types/types_pgstat" }
datum = { path = "../../../../_support/types/datum" }
fmgr = { path = "../../../../_support/types/fmgr" }
fmgr_core = { path = "../../fmgr/fmgr_core" }
activity_small_seams = { path = "../activity_small_seams" }
backend_progress_seams = { path = "../backend_progress_seams" }
transam_parallel = { path = "../../../access/transam/transam_parallel" }
# Parallel-worker progress forwarding (parallel.c pgstat_progress_incr_param).
parallel_rt_seams = { path = "../../../access/transam/parallel_rt_seams" }
pqcomm_seams = { path = "../../../libpq/pqcomm_seams" }
pqformat = { path = "../../../libpq/pqformat" }
