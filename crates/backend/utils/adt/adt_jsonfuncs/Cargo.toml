# (InitMaterializedSRF / materialized_srf_putvalues / srf_arg_varlena_bytes /
# cstring_get_text_datum), mirroring backend-backup-walsummaryfuncs.
funcapi_seams = { path = "../../fmgr/funcapi_seams" }
lsyscache = { path = "../../cache/lsyscache" }
cache_typcache = { path = "../../cache/cache_typcache" }
arrayfuncs = { path = "../arrayfuncs" }
sort_storage = { path = "../../sort/sort_storage" }
heaptuple = { path = "../../../access/common/heaptuple" }
# json_render's array path detoasts the array varlena (DatumGetArrayTypeP).
detoast_seams = { path = "../../../access/common/detoast_seams" }
# populate_record copies the cached composite tuple descriptor.
tupdesc = { path = "../../../access/common/tupdesc" }
# populate_domain enforces domain constraints via domain_check.
misc2 = { path = "../misc2" }
# get_fn_expr_argtype for the record argument's declared type.
fmgr_seams = { path = "../../fmgr/fmgr_seams" }
# Inward seam crate this unit owns (json/jsonb call json_categorize_type etc.)
jsonfuncs_seams = { path = "../jsonfuncs_seams" }
# Outward seam crates for not-yet-ported owners.
jsonapi_seams = { path = "../../../../common/jsonapi_seams" }
coerce_seams = { path = "../../../parser/coerce_seams" }
stack_depth_seams = { path = "../../misc/stack_depth_seams" }
