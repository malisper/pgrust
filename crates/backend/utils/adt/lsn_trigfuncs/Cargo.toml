[package]
name = "lsn_trigfuncs"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "lsn_trigfuncs"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
datum = { path = "../../../../_support/types/datum" }
types_error = { path = "../../../../_support/types/types_error" }
fmgr = { path = "../../../../_support/types/fmgr" }
types_numeric = { path = "../../../../_support/types/types_numeric" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
types_ri_triggers = { path = "../../../../_support/types/types_ri_triggers" }

# fmgr builtin registry (register_builtins / BuiltinFunction / fmgr boundary).
fmgr_core = { path = "../../fmgr/fmgr_core" }

# pg_lsn arithmetic bridges into the ported numeric crate (numeric_in /
# numeric_add / numeric_sub / set_var_from_num / numericvar_to_uint64).
adt_numeric = { path = "../adt_numeric" }

# common/hashfn.c hash_uint32 / hash_uint32_extended, which hashint8 folds into.
hashfn = { path = "../../../../common/hashfn" }

# trigfuncs.c reads its TriggerData context (CALLED_AS_TRIGGER, tg_event,
# tg_newtuple, tg_trigtuple) through the trigger.c owner's seam crate; that
# unit is not yet ported, so those seams panic until it lands.
trigger_seams = { path = "../../../commands/trigger_seams" }
