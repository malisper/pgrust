[package]
name = "pg_locale"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "pg_locale"
path = "src/lib.rs"

[features]
# `icu` mirrors PostgreSQL's `--with-icu` (`#ifdef USE_ICU`). It gates the live
# ICU collator construction in the cache and forwards to the ICU provider crate's
# `with-icu`. On by default; turn off to build without the system ICU.
default = ["icu"]
icu = ["pg_locale_icu/with-icu"]

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
locale = { path = "../../../../_support/types/locale" }
types_cash = { path = "../../../../_support/types/types_cash" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
string = { path = "../../../../common/string" }
utils_error = { path = "../../utils_error" }
guc_tables = { path = "../../misc/guc_tables" }
types_guc = { path = "../../../../_support/types/types_guc" }
types_wchar = { path = "../../../../_support/types/types_wchar" }
pgstrcasecmp = { path = "../../../../port/pgstrcasecmp" }
collationcmds_seams = { path = "../../../commands/collationcmds_seams" }
libc = "0.2"

# Inward seams this crate owns + installs.
pg_locale_seams = { path = "../pg_locale_seams" }

# Outward seams (unported owners; panic until they land).
pg_locale_builtin_seams = { path = "../pg_locale_builtin_seams" }
pg_locale_libc_seams = { path = "../pg_locale_libc_seams" }
pg_locale_catalog_seams = { path = "../pg_locale_catalog_seams" }
pg_locale_env_seams = { path = "../pg_locale_env_seams" }
mbutils_seams = { path = "../../mb/mbutils_seams" }

# ICU provider: merged (returns FEATURE_NOT_SUPPORTED in the ICU-disabled
# profile). Called directly — acyclic (icu depends only on types-*).
pg_locale_icu = { path = "../pg_locale_icu" }
