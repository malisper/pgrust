[package]
name = "pg_locale_icu"
version = "0.0.0"
edition.workspace = true
publish.workspace = true
build = "build.rs"

[lib]
name = "pg_locale_icu"
path = "src/lib.rs"

[features]
# Mirrors PostgreSQL's `--with-icu` configure option (`#ifdef USE_ICU`). When ON,
# the crate binds the system ICU (`-licui18n -licuuc -licudata`) and implements
# the live ICU collation path. When OFF, only the `#else` of
# `create_pg_locale_icu` is compiled (`FEATURE_NOT_SUPPORTED`).
default = ["with-icu"]
with-icu = []

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
locale = { path = "../../../../_support/types/locale" }
pg_locale_icu_seams = { path = "../pg_locale_icu_seams" }
