[package]
name = "varbit"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "varbit"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
datum = { path = "../../../../_support/types/datum" }
fmgr = { path = "../../../../_support/types/fmgr" }
stringinfo = { path = "../../../../_support/types/stringinfo" }
fmgr_core = { path = "../../fmgr/fmgr_core" }
pqformat = { path = "../../../libpq/pqformat" }
arrayutils = { path = "../arrayutils" }
mbutils_seams = { path = "../../mb/mbutils_seams" }
# make_const's T_BitString arm reaches bit_in via a seam slot declared in
# parser-small1-seams (parse_node.c is the consumer); varbit.c owns and installs
# it cross-crate from init_seams().
small1_seams = { path = "../../../parser/small1_seams" }
