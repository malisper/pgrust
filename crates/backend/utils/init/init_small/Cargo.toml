[package]
name = "init_small"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "init_small"
path = "src/lib.rs"

[dependencies]
# Lazy-vacuum driver's MyDatabaseId / AmAutoVacuumWorkerProcess reads home in
# vacuumlazy-seams; globals.c owns both process globals.
vacuumlazy_seams = { path = "../../../access/heap/vacuumlazy_seams" }
postmaster_seams = { path = "../../../postmaster/postmaster_seams" }
# IsBinaryUpgrade startup flag (owned by globals.c here) is read by these
# consumers' seam bundles. Seam crates -> no cycle.
binary_upgrade_seams = { path = "../../../catalog/binary_upgrade_seams" }
tablecmds_seams = { path = "../../../commands/tablecmds_seams" }
tablespace_globals_seams = { path = "../../../commands/tablespace_globals_seams" }
postgres_seams = { path = "../../../tcop/postgres_seams" }
acl_seams = { path = "../../adt/acl_seams" }
utils_error = { path = "../../utils_error" }
miscinit_seams = { path = "../miscinit_seams" }
init_small_seams = { path = "../init_small_seams" }
collationcmds_seams = { path = "../../../commands/collationcmds_seams" }
guc_seams = { path = "../../misc/guc_seams" }
guc_tables = { path = "../../misc/guc_tables" }
# InitProcessGlobals: GetCurrentTimestamp / timestamptz_to_time_t (datetime owner)
timestamp_seams = { path = "../../adt/timestamp_seams" }
# InitProcessGlobals: seed the backend-private global PRNG state
prng = { path = "../../../../_support/pg/prng" }
# InitProcessGlobals: pg_prng_strong_seed -> pg_strong_random (port CSPRNG)
pg_strong_random_seams = { path = "../../../../port/pg_strong_random_seams" }
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
net = { path = "../../../../_support/types/net" }
types_storage = { path = "../../../../_support/types/types_storage" }
