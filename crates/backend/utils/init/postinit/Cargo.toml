[package]
name = "postinit"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "postinit"
path = "src/lib.rs"

[dependencies]
# allocation + error + shared vocabulary
mcx = { path = "../../../../_support/mcx" }
# this unit's own inward seams (installed by init_seams)
postinit_seams = { path = "../postinit_seams" }
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
datum = { path = "../../../../_support/types/datum" }
