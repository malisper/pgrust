[package]
name = "more"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "more"
path = "src/lib.rs"

[dependencies]
# Own inward seams (installed from init_seams).
more_seams = { path = "../more_seams" }
ps_status_seams = { path = "../ps_status_seams" }
superuser_seams = { path = "../superuser_seams" }
# LOAD '<file>' (utility.c) restricts library names via superuser().
utility_out_seams = { path = "../../../tcop/utility_out_seams" }

# Shared vocabulary.
types_core = { path = "../../../../_support/types/types_core" }
types_error = { path = "../../../../_support/types/types_error" }
control = { path = "../../../../_support/types/control" }
types_syscache = { path = "../../../../_support/types/types_syscache" }
types_storage = { path = "../../../../_support/types/types_storage" }

# Direct deps (no cycle): pure globals / GUC tables.
utils_error = { path = "../../utils_error" }
init_small = { path = "../../init/init_small" }
init_small_seams = { path = "../../init/init_small_seams" }
guc_tables = { path = "../guc_tables" }

# Outward seams (cross-cycle owners not ported yet, or callers that would cycle).
miscinit_seams = { path = "../../init/miscinit_seams" }
syscache_seams = { path = "../../cache/syscache_seams" }
inval_seams = { path = "../../cache/inval_seams" }
lsyscache_seams = { path = "../../cache/lsyscache_seams" }
acl_seams = { path = "../../adt/acl_seams" }
aclchk_seams = { path = "../../../catalog/aclchk_seams" }
namespace_seams = { path = "../../../catalog/namespace_seams" }
transam_xlog_seams = { path = "../../../access/transam/transam_xlog_seams" }
controldata_utils_seams = { path = "../../../../common/controldata_utils_seams" }

# Datum/Mcx/types needed for name resolution + control-file projection.
datum = { path = "../../../../_support/types/datum" }
types_acl = { path = "../../../../_support/types/types_acl" }
mcx = { path = "../../../../_support/mcx" }

# fmgr builtin registration (the SQL-callable `Datum fn(PG_FUNCTION_ARGS)` layer).
fmgr = { path = "../../../../_support/types/fmgr" }
types_tuple = { path = "../../../../_support/types/types_tuple" }
fmgr_core = { path = "../../fmgr/fmgr_core" }
# Composite/record result build (pg_control_* return composite rows): the
# anonymous-record `Datum` builder (CreateTemplateTupleDesc + BlessTupleDesc +
# heap_form_tuple + HeapTupleGetDatum) and the `text` column value builder,
# reached through their thin seam crates (no cycle).
funcapi_seams = { path = "../../fmgr/funcapi_seams" }
varlena_seams = { path = "../../adt/varlena_seams" }

[target.'cfg(any(target_os = "macos", target_os = "linux"))'.dependencies]
libc = "0.2"
