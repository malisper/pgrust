[package]
name = "sort_sortsupport"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "sort_sortsupport"
path = "src/lib.rs"

[dependencies]
mcx = { path = "../../../../_support/mcx" }
types_core = { path = "../../../../_support/types/types_core" }
datum = { path = "../../../../_support/types/datum" }
types_error = { path = "../../../../_support/types/types_error" }
fmgr = { path = "../../../../_support/types/fmgr" }
rel = { path = "../../../../_support/types/rel" }
types_sortsupport = { path = "../../../../_support/types/types_sortsupport" }
types_tuple = { path = "../../../../_support/types/types_tuple" }

# fmgr machinery (the comparison-shim FunctionCallInvoke / fmgr_info_cxt /
# OidFunctionCall1) — direct dep, no cycle.
fmgr_core = { path = "../../fmgr/fmgr_core" }

# inward seam crate (this unit installs these)
sortsupport_seams = { path = "../sortsupport_seams" }

# nbtcompare's `*sortsupport` seam crate: this substrate calls `run_sortsupport`
# (INWARD to nbtcompare) and installs the substrate-owned `install_sortsupport_*`
# seams declared there. Seam crate only — no cycle with nbtcompare's impl.
compare_seams = { path = "../../../access/nbtree/compare_seams" }
gist_proc_seams = { path = "../../../access/gist/gist_proc_seams" }
# GiST opclass-support typed dispatch (by-OID): the sorted index-build path
# (`PrepareSortSupportFromGistIndexRel`) reaches the opclass GIST_SORTSUPPORT_PROC
# through this dispatch seam (the owned `Datum` cannot carry the live SortSupport
# pointer through fmgr). Seam crate only — no cycle with the gist-proc impl.
dispatch_seams = { path = "../../../access/gist/dispatch_seams" }

# varlena's native `text` SortSupport comparator seam (`bttext_image_cmp`): the
# substrate installs the native text comparator that calls this instead of the
# old-style `bttextcmp` fmgr shim. Seam crate only — no cycle with varlena's impl.
varlena_seams = { path = "../../adt/varlena_seams" }

# outward seam crates (callees; panic until owners land)
lsyscache_seams = { path = "../../cache/lsyscache_seams" }
relcache_seams = { path = "../../cache/relcache_seams" }

[dev-dependencies]
seam_core = { path = "../../../../_support/seam/seam_core" }
