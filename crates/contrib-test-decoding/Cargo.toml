[package]
name = "contrib-test-decoding"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "contrib_test_decoding"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
seam-core = { path = "../seam-core" }
mcx = { path = "../mcx" }
types-core = { path = "../types-core" }
types-error = { path = "../types-error" }
types-datum = { path = "../types-datum" }
types-logical = { path = "../types-logical" }
types-tuple = { path = "../types-tuple" }
types-rel = { path = "../types-rel" }
types-storage = { path = "../types-storage" }
backend-utils-error = { path = "../backend-utils-error" }

# The builtin output-plugin registry (Phase 0) we register into.
backend-utils-fmgr-dfmgr-seams = { path = "../backend-utils-fmgr-dfmgr-seams" }

# `ctx->out` StringInfo backing store (appendStringInfo / resetStringInfo).
backend-utils-mmgr-mcxt-seams = { path = "../backend-utils-mmgr-mcxt-seams" }

# Output-plugin helpers driven from logical.c (OutputPluginPrepareWrite/Write).
backend-replication-logical-logical = { path = "../backend-replication-logical-logical" }

# Resolve the change/txn/relation/message handles the callback carries.
backend-replication-logical-reorderbuffer-seams = { path = "../backend-replication-logical-reorderbuffer-seams" }

# Tuple deform / column formatting substrate.
backend-access-common-heaptuple = { path = "../backend-access-common-heaptuple" }
backend-access-common-relation-seams = { path = "../backend-access-common-relation-seams" }
backend-access-common-detoast-seams = { path = "../backend-access-common-detoast-seams" }
backend-utils-cache-relcache-seams = { path = "../backend-utils-cache-relcache-seams" }
backend-utils-cache-lsyscache-seams = { path = "../backend-utils-cache-lsyscache-seams" }
backend-utils-adt-format-type-seams = { path = "../backend-utils-adt-format-type-seams" }
backend-utils-adt-ruleutils-seams = { path = "../backend-utils-adt-ruleutils-seams" }
backend-utils-fmgr-fmgr-seams = { path = "../backend-utils-fmgr-fmgr-seams" }
backend-utils-adt-timestamp-seams = { path = "../backend-utils-adt-timestamp-seams" }
