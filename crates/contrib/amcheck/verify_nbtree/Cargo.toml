[package]
name = "verify_nbtree"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "verify_nbtree"
path = "src/lib.rs"

[dependencies]
seam_core = { path = "../../../_support/seam/seam_core" }
types_core = { path = "../../../_support/types/types_core" }
types_error = { path = "../../../_support/types/types_error" }
rel = { path = "../../../_support/types/rel" }
types_storage = { path = "../../../_support/types/types_storage" }
types_scan = { path = "../../../_support/types/types_scan" }
types_tuple = { path = "../../../_support/types/types_tuple" }
datum = { path = "../../../_support/types/datum" }
types_nbtree = { path = "../../../_support/types/types_nbtree" }
nodes = { path = "../../../_support/types/nodes" }
types_tableam = { path = "../../../_support/types/types_tableam" }
mcx = { path = "../../../_support/mcx" }

# Seam crates this unit OWNS (installs every decl from its own init_seams()).
verify_nbtree_seams = { path = "../verify_nbtree_seams" }

# Seam crates for UNPORTED neighbors (calls panic loudly until the owner lands).
verify_common_seams = { path = "../verify_common_seams" }
nbtree_core_seams = { path = "../../../backend/access/nbtree/nbtree_core_seams" }

# Already-landed seam crates / libraries consumed by the verifier.
table_tableam = { path = "../../../backend/access/table/table_tableam" }
datum_seams = { path = "../../../backend/utils/adt/datum_seams" }
indextuple_seams = { path = "../../../backend/access/common/indextuple_seams" }
bloomfilter_seams = { path = "../../../backend/lib/bloomfilter_seams" }
bufmgr_seams = { path = "../../../backend/storage/buffer/bufmgr_seams" }
smgr_seams = { path = "../../../backend/storage/smgr/smgr_seams" }
relcache_seams = { path = "../../../backend/utils/cache/relcache_seams" }
snapmgr_seams = { path = "../../../backend/utils/time/snapmgr_seams" }
index_seams = { path = "../../../backend/catalog/index_seams" }
snapshot = { path = "../../../_support/types/snapshot" }
