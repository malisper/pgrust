[package]
name = "injection_points"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "injection_points"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
types_core = { path = "../../_support/types/types_core" }
types_error = { path = "../../_support/types/types_error" }
datum = { path = "../../_support/types/datum" }
types_tuple = { path = "../../_support/types/types_tuple" }
fmgr = { path = "../../_support/types/fmgr" }
utils_error = { path = "../../backend/utils/utils_error" }

# The core injection-point infrastructure (Attach/Detach/Run/wait/wakeup).
injection_point = { path = "../../backend/utils/misc/injection_point" }

# Builtin-library registration (the ported-`.so` symbol registry).
dfmgr_seams = { path = "../../backend/utils/fmgr/dfmgr_seams" }

# before_shmem_exit for set_local cleanup.
dsm_core = { path = "../../backend/storage/ipc/dsm_core" }

# MyProcPid for the PID runtime condition.
init_small_seams = { path = "../../backend/utils/init/init_small_seams" }
