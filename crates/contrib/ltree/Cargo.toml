[package]
name = "ltree"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "ltree"
path = "src/lib.rs"

[dependencies]
# Boundary / support types:
mcx = { path = "../../_support/mcx" }
datum = { path = "../../_support/types/datum" }
fmgr = { path = "../../_support/types/fmgr" }
types_core = { path = "../../_support/types/types_core" }
types_error = { path = "../../_support/types/types_error" }
types_tuple = { path = "../../_support/types/types_tuple" }

# ltree core services:
crc32c = { path = "../../port/crc32c" }
mbutils = { path = "../../backend/utils/mb/mbutils" }
hashfn = { path = "../../common/hashfn" }

# Seams (consulted, not owned):
dfmgr_seams = { path = "../../backend/utils/fmgr/dfmgr_seams" }
ts_locale_seams = { path = "../../backend/tsearch/ts_locale_seams" }
formatting_seams = { path = "../../backend/utils/adt/formatting_seams" }
