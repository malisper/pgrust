[package]
name = "pgrust-gram-c2rust-fgram"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "pgrust_gram_c2rust"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
backend-nodes-types = { package = "backend-nodes-types-fgram", path = "../backend-nodes-types-fgram" }
backend-nodes-list = { package = "backend-nodes-list-fgram", path = "../backend-nodes-list-fgram" }
backend-nodes-value = { package = "backend-nodes-value-fgram", path = "../backend-nodes-value-fgram" }
backend-parser-scan = { package = "backend-parser-scan-fgram", path = "../backend-parser-scan-fgram" }
backend-parser-driver = { package = "backend-parser-driver-fgram", path = "../backend-parser-driver-fgram" }
pgrust-pg-ffi = { package = "pgrust-pg-ffi-fgram", path = "../pgrust-pg-ffi-fgram" }
libc = "0.2"

[target.'cfg(target_family = "wasm")'.dependencies]
wasm-libc-shim = { path = "../wasm-libc-shim" }
