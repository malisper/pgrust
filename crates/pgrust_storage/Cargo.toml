[package]
name = "pgrust_storage"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
libc = "0.2"
parking_lot = "0.12"
pgrust_core = { path = "../pgrust_core" }
pgrust_nodes = { path = "../pgrust_nodes" }
rustc-hash = "2"
serde = { version = "1", features = ["derive"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1"
