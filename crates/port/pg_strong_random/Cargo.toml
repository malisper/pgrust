[package]
name = "pg_strong_random"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "pg_strong_random"
path = "src/lib.rs"

[dependencies]
pg_strong_random_seams = { path = "../pg_strong_random_seams" }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
libc = "0.2"

[target.'cfg(target_family = "wasm")'.dependencies]
# wasm64 clock: std SystemTime panics on wasm64; RNG seed realtime read routes to host clock.
wasm-libc-shim = { path = "../../wasm-libc-shim" }
