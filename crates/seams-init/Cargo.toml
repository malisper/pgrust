[package]
name = "seams-init"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "seams_init"
path = "src/lib.rs"

# The `postgres` executable entry shell (mirrors src/backend/main/main.c's
# `main()`): create the top memory context, install every seam, then dispatch
# through backend_main_main::pg_main.
[[bin]]
name = "postgres"
path = "src/bin/postgres.rs"

# Every ported crate that exposes init_seams() gets a dependency line here.
