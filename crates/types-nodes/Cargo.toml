[package]
name = "types-nodes"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "types_nodes"
path = "src/lib.rs"

[features]
# Node-opaque migration P3 pre-flip codegen (docs/proposals/node-opaque-migration.md
# ¬ß6.5 step 1). When enabled, compiles the generated `NodePayload` adapter + impl
# set (`$OUT_DIR/node_payload_impls.rs`, emitted by `build.rs::emit_node_payload_impls`)
# into the `node_payload_gen` module. OFF BY DEFAULT: the normal build
# (`cargo build --bin postgres`) leaves the live `Node` enum byte-untouched; this
# feature only exists to validate that the codegen compiles ahead of the atomic
# flip. At the flip the gate is removed and the module becomes the live rep.
node_payload_codegen = []

[dependencies]
types-core = { path = "../types-core" }
types-acl = { path = "../types-acl" }
types-error = { path = "../types-error" }
types-scan = { path = "../types-scan" }
types-snapshot = { path = "../types-snapshot" }
types-datum = { path = "../types-datum" }
types-resowner = { path = "../types-resowner" }
types-sortsupport = { path = "../types-sortsupport" }
types-rel = { path = "../types-rel" }
types-trigger = { path = "../types-trigger" }
types-tuple = { path = "../types-tuple" }
types-slot = { path = "../types-slot" }
mcx = { path = "../mcx" }
types-storage = { path = "../types-storage" }
types-opclass = { path = "../types-opclass" }
types-condvar = { path = "../types-condvar" }
types-execparallel = { path = "../types-execparallel" }
types-parallel = { path = "../types-parallel" }
types-tidbitmap = { path = "../types-tidbitmap" }
# Table-AM scan-descriptor vocabulary (`TableScanDesc`), named by the relocated
# `TidScanState` / `BitmapHeapScanState` node-state structs (their
# `ss_currentScanDesc` field). `types-tableam` deps only the leaf type crates
# (core/error/tuple/slot/rel/scan/snapshot/storage/tidbitmap) ‚Äî none of which
# reach `types-nodes` ‚Äî so this edge is acyclic (the slot-vocab F0 "Edge A").
types-tableam = { path = "../types-tableam" }
# JSON column-IO coercion cache (`ColumnIOData`) carried by the
# `EEOP_JSONEXPR_COERCION` step's persistent `json_coercion_cache`
# (`JsonCoercionCache` in execExpr.h). `types-jsonfuncs` deps only leaf type
# crates (core/fmgr/tuple/json/jsonb/datum) ‚Äî none reach `types-nodes` ‚Äî so the
# edge is acyclic.
types-jsonfuncs = { path = "../types-jsonfuncs" }
# Node-support runtime traits + the `#[derive(PgNode)]` proc-macro consumed by
# the leaf node families (value.h / bitmapset / list) and by the central
# build.rs-generated `node_tree` dispatch. `node-support` is a LEAF crate
# (depends only on `mcx` + `types-error`), so this introduces no cycle.
backend-nodes-node-support = { path = "../backend-nodes-node-support" }
backend-nodes-macros = { path = "../backend-nodes-macros" }
