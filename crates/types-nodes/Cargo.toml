[package]
name = "types-nodes"
version = "0.0.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "types_nodes"
path = "src/lib.rs"

[dependencies]
types-core = { path = "../types-core" }
types-acl = { path = "../types-acl" }
types-error = { path = "../types-error" }
types-scan = { path = "../types-scan" }
types-snapshot = { path = "../types-snapshot" }
types-datum = { path = "../types-datum" }
types-sortsupport = { path = "../types-sortsupport" }
types-rel = { path = "../types-rel" }
types-tuple = { path = "../types-tuple" }
types-slot = { path = "../types-slot" }
mcx = { path = "../mcx" }
types-storage = { path = "../types-storage" }
types-opclass = { path = "../types-opclass" }
types-condvar = { path = "../types-condvar" }
types-execparallel = { path = "../types-execparallel" }
types-parallel = { path = "../types-parallel" }
types-tidbitmap = { path = "../types-tidbitmap" }
# Table-AM scan-descriptor vocabulary (`TableScanDesc`), named by the relocated
# `TidScanState` / `BitmapHeapScanState` node-state structs (their
# `ss_currentScanDesc` field). `types-tableam` deps only the leaf type crates
# (core/error/tuple/slot/rel/scan/snapshot/storage/tidbitmap) — none of which
# reach `types-nodes` — so this edge is acyclic (the slot-vocab F0 "Edge A").
types-tableam = { path = "../types-tableam" }
# Node-support runtime traits + the `#[derive(PgNode)]` proc-macro consumed by
# the leaf node families (value.h / bitmapset / list) and by the central
# build.rs-generated `node_tree` dispatch. `node-support` is a LEAF crate
# (depends only on `mcx` + `types-error`), so this introduces no cycle.
backend-nodes-node-support = { path = "../backend-nodes-node-support" }
backend-nodes-macros = { path = "../backend-nodes-macros" }
