    <style>
      :root {
        color-scheme: dark;
        --page-bg: #1f232b;
        --terminal-bg: #2b303b;
        --terminal-2: #313742;
        --ink: #f4f6fa;
        --muted: #c8ced9;
        --accent: #dce4f0;
        --accent-dim: #414856;
        --warn: #ffb4bd;
        --border: #454c59;
        --prompt: #8bff87;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:

          "IBM Plex Mono",
          "SFMono-Regular",
          Menlo,
          Consolas,

        color: var(--ink);
        background: var(--page-bg);

      main {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0;
      }

      .terminal {
        background: var(--terminal-bg);
      }

      .site-links {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 16px;
        background: #181b22;
        border-bottom: 1px solid var(--border);
      }

      .site-mark {
        color: var(--prompt);
        font-size: 12px;
      }

      .site-link-list {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .site-link {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 6px 10px;
        border: 1px solid #596173;
        border-radius: 4px;
        color: var(--ink);
        background: #252a34;
        font-size: 12px;
        text-decoration: none;
      }

      .site-link:hover {
        filter: brightness(1.08);
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 12px 16px;
        background: var(--terminal-2);
        border-bottom: 1px solid var(--border);
      }

      .title {
        font-size: 12px;
        color: var(--muted);
        margin-right: auto;
      }

      label {
        font-size: 12px;
        color: var(--muted);
      }

      select,
      button {
        font: inherit;
      }

      select {
        color: var(--ink);
        background: #252a34;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 7px 10px;
      }

      .example-note {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 7px 12px;
        cursor: pointer;
        background: #252a34;
        color: var(--ink);
      }

      button.primary {
        background: var(--accent-dim);
        border-color: #596173;
      }

      button:hover {
        filter: brightness(1.08);
      }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      .status strong {
        color: var(--accent);
      }

      .session {
        padding: 8px 10px 12px;
      }

      .transcript {
        margin: 0;
        min-height: 0;
        overflow: visible;
        padding: 0;
        line-height: 1.33;
        white-space: pre-wrap;
      }

      .live-console {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        align-items: start;
        padding: 0;
        margin-top: 2px;
      }

      .live-prompt {
        padding-top: 2px;
        color: var(--prompt);
        white-space: nowrap;
      }

      .live-input {
        min-height: 96px;
        resize: none;
        overflow: hidden;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--ink);
        line-height: 1.33;
        outline: none;
        box-shadow: none;
        width: 100%;
      }

      .prompt {
        color: var(--prompt);
      }

      .error {
        color: var(--warn);
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 16px 12px;
      }

      @media (max-width: 720px) {
        .site-links {
          align-items: flex-start;
          flex-direction: column;
        }

        .site-link-list {
          justify-content: flex-start;
        }

        .footer {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="terminal">
        <div class="site-links">
          <div class="site-mark">pgrust</div>
          <nav class="site-link-list" aria-label="pgrust links">
            <a class="site-link" href="https://github.com/malisper/pgrust" target="_blank" rel="noreferrer">GitHub</a>
            <a class="site-link" href="https://malisper.me/pgrust-update-at-67-postgres-compatibility-and-accelerating/" target="_blank" rel="noreferrer">Latest post</a>
          </nav>
        </div>
        <div class="toolbar">
          <div class="title">pgrust wasm demo</div>
          <label for="example-select">example</label>
          <select id="example-select"></select>
          <button id="run-live" class="primary">Run</button>
          <button id="reset">Reset Database</button>
          <button id="clear">Clear Screen</button>
          <div class="status">status: <strong id="status">booting</strong></div>
        </div>
        <div class="session">
          <pre id="output" class="transcript">Loading wasm...</pre>
          <div class="live-console">
            <div class="live-prompt">pgrust=#</div>
            <textarea
              id="live-sql"
              class="live-input"
              spellcheck="false"
              placeholder="select 1;"
            ></textarea>
          </div>
        </div>
        <div class="footer">
          <p id="example-note" class="example-note"></p>
          <div class="status">`Enter` runs. `Shift+Enter` adds a new line.</div>
        </div>
      </section>
    </main>
